              <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14 }}>
                Upload semua data yang sudah ada di app ini ({inventory.length} produk, {transactions.length} transaksi) ke Supabase.
                Lakukan sekali saja saat pertama konek.
              </div>
              <button style={{ ...s.btn("primary"), background: COLORS.success }} onClick={handleUploadLocal} disabled={sbSyncing}>
                {sbSyncing ? "Mengupload..." : `⬆ Upload ${inventory.length} produk ke database`}
              </button>
            </div>
          )}
        </div>
      );
    },

    kasir: () => {
      const activeInventory = inventory.filter(i => !i.discontinued);
      const searchResults = kasirSearch.length > 1
        ? activeInventory.filter(i => i.nama.toLowerCase().includes(kasirSearch.toLowerCase()) || i.sku.toLowerCase().includes(kasirSearch.toLowerCase())).slice(0, 6)
        : [];
      const subtotal = cart.reduce((a, c) => a + c.harga * c.qty, 0);
      const diskonNilai = kasirDiskonTipe === "persen"
        ? Math.round(subtotal * (parseFloat(kasirDiskonNilai) || 0) / 100)
        : (parseInt(kasirDiskonNilai) || 0);
      const total = Math.max(0, subtotal - diskonNilai);
      const kembalian = kasirPayMethod === "cash" ? (parseInt(kasirBayar) || 0) - total : 0;

      if (kasirReceipt) {
        const r = kasirReceipt;
        return (
          <div style={{ maxWidth: 420, margin: "0 auto" }}>
            <div style={{ background: COLORS.success + "20", border: `2px solid ${COLORS.success}`, borderRadius: 16, padding: 24, textAlign: "center", marginBottom: 20 }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: COLORS.success }}>Pembayaran Berhasil!</div>
              {r.payMethod === "cash" && r.kembalian > 0 && (
                <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.cream, marginTop: 8 }}>Kembalian: {fmt(r.kembalian)}</div>
              )}
            </div>
            <div style={{ ...s.card, marginBottom: 16 }}>
              <div style={{ fontWeight: 700, color: COLORS.aqua, fontSize: 15, marginBottom: 4 }}>🧾 Struk — {r.waktu}</div>
              {r.invoiceId && <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 12 }}>{r.invoiceId}</div>}
              {r.items.map(item => (
                <div key={item.sku} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${COLORS.brownLight}`, fontSize: 13 }}>
                  <div>
                    <div style={{ color: COLORS.cream, fontWeight: 500 }}>{item.nama}</div>
                    <div style={{ color: COLORS.textMuted, fontSize: 11 }}>{item.qty} × {fmt(item.harga)}</div>
                  </div>
                  <div style={{ color: COLORS.cream, fontWeight: 600 }}>{fmt(item.harga * item.qty)}</div>
                </div>
              ))}
              <div style={{ marginTop: 12, fontSize: 13 }}>
                <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted, marginBottom: 4 }}>
                  <span>Subtotal</span><span>{fmt(r.subtotal)}</span>
                </div>
                {r.diskonNilai > 0 && (
                  <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.warning, marginBottom: 4 }}>
                    <span>Diskon</span><span>− {fmt(r.diskonNilai)}</span>
                  </div>
                )}
                {r.shipping === "plai" && r.shippingCost > 0 && (
                  <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.danger, marginBottom: 4 }}>
                    <span>💸 Shipping (Plai)</span><span>+ {fmt(r.shippingCost)}</span>
                  </div>
                )}
                {r.shipping === "pelanggan" && (
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted, marginBottom: 2, fontSize: 11 }}>
                      <span>📦 Shipping (Pelanggan){r.marketplace ? " — Marketplace" : ""}</span>
                      <span>{r.pelangganShipCost > 0 ? fmt(r.pelangganShipCost) : "—"}</span>
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 800, fontSize: 16, color: COLORS.cream, borderTop: `1px solid ${COLORS.brownLight}`, paddingTop: 8, marginTop: 4 }}>
                  <span>Total</span><span>{fmt(r.total)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted, marginTop: 8, fontSize: 12 }}>
                  <span>Bayar ({r.payMethod.toUpperCase()})</span><span>{fmt(r.bayar)}</span>
                </div>
                {r.payMethod === "cash" && r.kembalian > 0 && (
                  <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.success, fontWeight: 700, marginTop: 4 }}>
                    <span>Kembalian</span><span>{fmt(r.kembalian)}</span>
                  </div>
                )}
              </div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 12 }}>
                {r.tanggal && <div style={{ marginBottom: 2 }}>📅 {r.tanggal}</div>}
                {r.keterangan && <div style={{ marginBottom: 2, color: COLORS.aqua }}>📝 {r.keterangan}</div>}
                <div>Staff: {r.staff} · Plai Sports Club</div>
              </div>
            </div>
            <button onClick={() => { setKasirReceipt(null); setTimeout(() => kasirScanRef.current?.focus(), 100); }}
              style={{ ...s.btn("primary"), width: "100%", padding: 14, fontSize: 15 }}>
              🛒 Transaksi Baru
            </button>
          </div>
        );
      }

      return (
        <div style={{ display: "flex", gap: 20, height: "100%", maxWidth: 900 }}>
          {/* Left — scan + cart */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 14, minWidth: 0 }}>
            {/* Scan / search */}
            <div style={{ position: "relative" }}>
              <div style={{ background: COLORS.brownDark, border: `2px solid ${COLORS.aqua}`, borderRadius: 10, padding: "10px 14px", display: "flex", gap: 10, alignItems: "center" }}>
                <span style={{ fontSize: 18 }}>📷</span>
                <input
                  ref={kasirScanRef}
                  style={{ ...s.input, flex: 1, border: "none", background: "transparent", padding: 0, fontSize: 14 }}
                  placeholder="Scan barcode atau cari nama produk..."
                  value={kasirSearch}
                  onChange={e => setKasirSearch(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === "Enter") {
                      const q = kasirSearch.toLowerCase().trim();
                      const exact = activeInventory.find(i => i.sku.toLowerCase() === q);
                      if (exact) addToCart(exact.sku);
                      else if (searchResults.length >= 1) addToCart(searchResults[0].sku);
                    }
                  }}
                />
                <button onClick={() => { setCameraTarget("kasir"); setCameraOpen(true); }}
                  style={{ background: COLORS.warning, border: "none", borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer", fontWeight: 700, color: COLORS.brownDark, flexShrink: 0 }}>
                  📸
                </button>
              </div>
              {searchResults.length > 0 && (
                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: COLORS.brown, border: `1px solid ${COLORS.brownLight}`, borderRadius: 8, zIndex: 100, marginTop: 4, boxShadow: "0 4px 20px #0006" }}>
                  {searchResults.map(item => (
                    <div key={item.sku} onClick={() => addToCart(item.sku)}
                      style={{ padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${COLORS.brownLight}` }}
                      onMouseEnter={e => e.currentTarget.style.background = COLORS.brownLight}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.cream }}>{item.nama}</div>
                        <div style={{ fontSize: 11, color: COLORS.textMuted }}>{item.sku} · Stok: {item.stok}</div>
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.aqua }}>{fmt(item.harga)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Cart */}
            <div style={{ ...s.card, flex: 1, overflow: "auto" }}>
              {cart.length === 0 ? (
                <div style={{ textAlign: "center", padding: "30px 0", color: COLORS.textMuted }}>
                  <div style={{ fontSize: 36, marginBottom: 8 }}>🛒</div>
                  <div>Scan atau cari produk untuk ditambahkan</div>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {cart.map(item => (
                    <div key={item.sku} style={{ display: "flex", alignItems: "center", gap: 10, background: COLORS.brownDark, borderRadius: 8, padding: "10px 12px" }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.cream, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.nama}</div>
                        <div style={{ fontSize: 11, color: COLORS.textMuted }}>{fmt(item.harga)} × {item.qty} = <span style={{ color: COLORS.aqua, fontWeight: 700 }}>{fmt(item.harga * item.qty)}</span></div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <button onClick={() => updateCartQty(item.sku, item.qty - 1)} style={{ width: 28, height: 28, borderRadius: 6, border: "none", background: COLORS.brown, color: COLORS.cream, fontSize: 16, cursor: "pointer" }}>−</button>
                        <span style={{ color: COLORS.cream, fontWeight: 700, minWidth: 20, textAlign: "center" }}>{item.qty}</span>
                        <button onClick={() => updateCartQty(item.sku, item.qty + 1)} style={{ width: 28, height: 28, borderRadius: 6, border: "none", background: COLORS.brown, color: COLORS.cream, fontSize: 16, cursor: "pointer" }}>+</button>
                        <button onClick={() => removeFromCart(item.sku)} style={{ width: 28, height: 28, borderRadius: 6, border: "none", background: "transparent", color: COLORS.danger, fontSize: 14, cursor: "pointer" }}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Right — payment */}
          <div style={{ width: 260, display: "flex", flexDirection: "column", gap: 12, flexShrink: 0 }}>
            <div style={s.card}>
              {/* Subtotal */}
              <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted, fontSize: 13, marginBottom: 8 }}>
                <span>{cart.reduce((a, c) => a + c.qty, 0)} item</span>
                <span>{fmt(subtotal)}</span>
              </div>

              {/* Diskon */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>Diskon</label>
                <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                  {[["persen", "%"], ["nominal", "Rp"]].map(([v, lbl]) => (
                    <button key={v} onClick={() => { setKasirDiskonTipe(v); setKasirDiskonNilai(""); }}
                      style={{ ...s.btn(kasirDiskonTipe === v ? "primary" : "secondary"), flex: 1, fontSize: 12 }}>{lbl}</button>
                  ))}
                </div>
                <input type="number" min="0" placeholder={kasirDiskonTipe === "persen" ? "0%" : "0"}
                  value={kasirDiskonNilai} onChange={e => setKasirDiskonNilai(e.target.value)}
                  style={{ ...s.input, fontSize: 13 }} />
                {diskonNilai > 0 && <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>− {fmt(diskonNilai)}</div>}
              </div>

              {/* Total */}
              <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: "12px 14px", marginBottom: 12 }}>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 2 }}>TOTAL</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: COLORS.cream }}>{fmt(total)}</div>
              </div>

              {/* Payment method */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>Metode Bayar</label>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["cash", "💵 Cash"], ["qris", "📱 QRIS"], ["edc", "💳 EDC"]].map(([v, lbl]) => (
                    <button key={v} onClick={() => { setKasirPayMethod(v); setKasirBayar(""); }}
                      style={{ ...s.btn(kasirPayMethod === v ? "primary" : "secondary"), flex: 1, fontSize: 11, padding: "7px 4px" }}>{lbl}</button>
                  ))}
                </div>
              </div>

              {/* Cash input */}
              {kasirPayMethod === "cash" && (
                <div style={{ marginBottom: 12 }}>
                  <label style={{ ...s.label, marginBottom: 6 }}>Uang Bayar</label>
                  <input type="number" min="0" placeholder="0"
                    value={kasirBayar} onChange={e => setKasirBayar(e.target.value)}
                    style={{ ...s.input, fontSize: 15, fontWeight: 700 }} />
                  {kembalian > 0 && <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.success, marginTop: 6 }}>Kembalian: {fmt(kembalian)}</div>}
                  {kasirBayar && kembalian < 0 && <div style={{ fontSize: 12, color: COLORS.danger, marginTop: 4 }}>Kurang {fmt(Math.abs(kembalian))}</div>}
                  {/* Quick nominal buttons */}
                  <div style={{ display: "flex", gap: 4, marginTop: 8, flexWrap: "wrap" }}>
                    {[50000, 100000, 50000 * Math.ceil(total / 50000)].filter((v, i, a) => a.indexOf(v) === i && v >= total).slice(0, 3).map(v => (
                      <button key={v} onClick={() => setKasirBayar(v)}
                        style={{ ...s.btn("secondary"), fontSize: 11, padding: "4px 8px" }}>{fmt(v)}</button>
                    ))}
                  </div>
                </div>
              )}

              {/* Shipping */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>🚚 Shipping</label>
                <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                  {[["none", "🏃 Pickup"], ["pelanggan", "📦 Pelanggan"], ["plai", "💸 Plai"]].map(([v, lbl]) => (
                    <button key={v} onClick={() => { setKasirShipping(v); setKasirShipCost(""); setKasirMarketplace(false); setKasirPelangganShipCost(""); }}
                      style={{ ...s.btn(kasirShipping === v ? "primary" : "secondary"), flex: 1, fontSize: 11, padding: "7px 4px" }}>{lbl}</button>
                  ))}
                </div>
                {kasirShipping === "plai" && (
                  <div>
                    <div style={{ fontSize: 11, color: COLORS.danger, fontWeight: 600, marginBottom: 4 }}>💸 Akan dicatat sebagai Shipping Expense Plai</div>
                    <input type="number" min="0" placeholder="Biaya shipping (Rp)" value={kasirShipCost} onChange={e => setKasirShipCost(e.target.value)} style={{ ...s.input, fontSize: 13 }} />
                  </div>
                )}
                {kasirShipping === "pelanggan" && (
                  <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: 12, border: `1px solid ${COLORS.brownLight}` }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ fontSize: 12, color: COLORS.textMuted }}>📦 Shipping ditanggung pelanggan</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: kasirMarketplace ? 0 : 10 }}>
                      <div onClick={() => { setKasirMarketplace(!kasirMarketplace); if (!kasirMarketplace) setKasirPelangganShipCost(""); }}
                        style={{ width: 40, height: 22, borderRadius: 11, background: kasirMarketplace ? COLORS.aqua : COLORS.brownLight, cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                        <div style={{ width: 18, height: 18, borderRadius: 9, background: COLORS.white, position: "absolute", top: 2, left: kasirMarketplace ? 20 : 2, transition: "left 0.2s" }} />
                      </div>
                      <span style={{ fontSize: 12, color: kasirMarketplace ? COLORS.aqua : COLORS.textMuted, fontWeight: kasirMarketplace ? 600 : 400 }}>Dari Marketplace</span>
                    </div>
                    {!kasirMarketplace && (
                      <div>
                        <label style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4, display: "block" }}>Biaya Shipping dari Pelanggan (opsional)</label>
                        <input type="number" min="0" placeholder="cth: 15000" value={kasirPelangganShipCost} onChange={e => setKasirPelangganShipCost(e.target.value)} style={{ ...s.input, fontSize: 13 }} />
                        <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 3 }}>Kosongkan jika tidak perlu di-track</div>
                      </div>
                    )}
                    {kasirMarketplace && (
                      <div style={{ fontSize: 10, color: COLORS.aquaDark, marginTop: 4 }}>Shipping dihandle marketplace — tidak perlu track biaya</div>
                    )}
                  </div>
                )}
              </div>

              {/* Staff */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>Staff</label>
                <select style={{ ...s.select, fontSize: 13 }} value={kasirStaff} onChange={e => setKasirStaff(e.target.value)}>
                  {STAFF_LIST.map(st => <option key={st}>{st}</option>)}
                </select>
              </div>

              {/* Tanggal */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>📅 Tanggal</label>
                <input type="date" style={{ ...s.input, fontSize: 13 }} value={kasirTanggal} onChange={e => setKasirTanggal(e.target.value)} max={new Date().toISOString().split("T")[0]} />
                {kasirTanggal !== new Date().toISOString().split("T")[0] && (
                  <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>⚠ Bukan tanggal hari ini</div>
                )}
              </div>

              {/* Keterangan / Event */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>📝 Keterangan / Event</label>
                <input type="text" style={{ ...s.input, fontSize: 13 }} placeholder="cth: Bazaar Grand Indonesia" value={kasirKeterangan} onChange={e => setKasirKeterangan(e.target.value)} />
              </div>

              {/* No. Invoice Manual */}
              <div style={{ marginBottom: 14 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>🧾 No. Invoice <span style={{ color: COLORS.textMuted, fontWeight: 400 }}>(opsional)</span></label>
                <input type="text" style={{ ...s.input, fontSize: 13 }} placeholder="cth: INV/2026/03/001" value={kasirInvoiceManual} onChange={e => setKasirInvoiceManual(e.target.value)} />
                {!kasirInvoiceManual.trim() && <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 3 }}>Kosong = nomor otomatis</div>}
              </div>

              <button onClick={confirmKasir} disabled={cart.length === 0}
                style={{ ...s.btn("primary"), width: "100%", padding: "13px 0", fontSize: 15, fontWeight: 800,
                  background: cart.length === 0 ? COLORS.brownLight : COLORS.aqua, cursor: cart.length === 0 ? "not-allowed" : "pointer" }}>
                ✓ Bayar {cart.length > 0 ? fmt(total) : ""}
              </button>
            </div>
          </div>
        </div>
      );
    },
    keuangan: () => {
      const filteredExpenses = filterByPeriod(expenses, keuanganPeriod);
      const filteredIncomes = filterByPeriod(incomes, keuanganPeriod);
      const totalExp = filteredExpenses.reduce((s, e) => s + e.amount, 0);
      const totalInc = filteredIncomes.reduce((s, i) => s + i.amount, 0);
      const kasirRev = filterByPeriod(
        transactions.filter(t => t.tipe === "keluar" && (t.channel === "terjual" || t.channel === "event" || t.channel === "kol")),
        keuanganPeriod
      ).reduce((sum, t) => sum + (t.jumlah * t.harga), 0);
      const totalRevenue = kasirRev + totalInc;

      const subTabs = [
        { id: "expense", label: "Pengeluaran", icon: "📤" },
        { id: "income", label: "Pemasukan", icon: "📥" },
        { id: "summary", label: "Ringkasan", icon: "📊" },
        { id: "export", label: "Export", icon: "📁" },
      ];

      return (
        <div style={{ maxWidth: 700, margin: "0 auto" }}>
          {/* Sub-tab navigation */}
          <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
            {subTabs.map(st => (
              <button key={st.id} onClick={() => setKeuanganTab(st.id)}
                style={{ flex: 1, minWidth: 70, padding: "10px 8px", background: keuanganTab === st.id ? COLORS.aqua : COLORS.brownDark,
                  color: keuanganTab === st.id ? COLORS.brownDark : COLORS.cream, border: `1px solid ${keuanganTab === st.id ? COLORS.aqua : COLORS.brownLight}`,
                  borderRadius: 8, fontWeight: keuanganTab === st.id ? 700 : 400, fontSize: 12, cursor: "pointer", textAlign: "center" }}>
                <div style={{ fontSize: 16 }}>{st.icon}</div>
                {st.label}
              </button>
            ))}
          </div>

          {/* Period filter */}
          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {["hari", "minggu", "bulan", "semua"].map(p => (
              <button key={p} onClick={() => setKeuanganPeriod(p)}
                style={{ padding: "6px 14px", background: keuanganPeriod === p ? COLORS.aqua : "transparent",
                  color: keuanganPeriod === p ? COLORS.brownDark : COLORS.textMuted, border: `1px solid ${keuanganPeriod === p ? COLORS.aqua : COLORS.brownLight}`,
                  borderRadius: 20, fontSize: 12, fontWeight: keuanganPeriod === p ? 700 : 400, cursor: "pointer", textTransform: "capitalize" }}>
                {p}
              </button>
            ))}
          </div>

          {/* Quick stats bar */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 20 }}>
            <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, textAlign: "center", border: `1px solid ${COLORS.brownLight}` }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Pemasukan</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.success }}>{fmt(totalRevenue)}</div>
            </div>
            <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, textAlign: "center", border: `1px solid ${COLORS.brownLight}` }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Pengeluaran</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.danger }}>{fmt(totalExp)}</div>
            </div>
            <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, textAlign: "center", border: `1px solid ${COLORS.brownLight}` }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Laba</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: totalRevenue - totalExp >= 0 ? COLORS.success : COLORS.danger }}>{fmt(totalRevenue - totalExp)}</div>
            </div>
          </div>

          {/* ── EXPENSE TAB ── */}
          {keuanganTab === "expense" && (
            <div>
              <div style={{ background: COLORS.brownDark, borderRadius: 12, padding: 16, marginBottom: 16, border: `1px solid ${COLORS.brownLight}` }}>
                <h3 style={{ color: COLORS.aqua, marginBottom: 12, fontSize: 15 }}>📤 Catat Pengeluaran</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Tanggal</label>
                    <input type="date" value={expDate} onChange={e => setExpDate(e.target.value)}
                      style={{ ...s.input, width: "100%" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Jumlah (Rp)</label>
                    <input type="number" value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0"

              </div>

              {/* Income list */}
              <h3 style={{ color: COLORS.cream, marginBottom: 8, fontSize: 14 }}>Riwayat Pemasukan Non-Kasir ({filteredIncomes.length})</h3>

          {/* ── SUMMARY TAB ── */}
          {keuanganTab === "summary" && (() => {
            const byAccount = {};

              if (!byAccount[e.account_code]) byAccount[e.account_code] = { name: e.account_name, total: 0, count: 0 };
              byAccount[e.account_code].total += e.amount;
              byAccount[e.account_code].count++;
            });
            const cogsTotal = filteredExpenses.filter(e => e.account_code.startsWith("5-")).reduce((s, e) => s + e.amount, 0);
            const opexTotal = filteredExpenses.filter(e => e.account_code.startsWith("6-")).reduce((s, e) => s + e.amount, 0);
            const otherExpTotal = filteredExpenses.filter(e => e.account_code.startsWith("8-")).reduce((s, e) => s + e.amount, 0);
            const incBySrc = {};
            filteredIncomes.forEach(i => {
              const key = i.source;
              if (!incBySrc[key]) incBySrc[key] = 0;
              incBySrc[key] += i.amount;
            });
            const grossProfit = totalRevenue - cogsTotal;
            const operatingProfit = grossProfit - opexTotal;
            const netProfit = operatingProfit - otherExpTotal;

            return (
              <div>
                <h3 style={{ color: COLORS.aqua, marginBottom: 12, fontSize: 15 }}>📊 Ringkasan P&L</h3>

{`CREATE TABLE IF NOT EXISTS expenses (
  id bigint PRIMARY KEY,
  date date NOT NULL DEFAULT current_date,
  account_code text NOT NULL,
  account_name text NOT NULL,
  description text,
  amount bigint NOT NULL DEFAULT 0,
  payment_method text DEFAULT 'transfer',
  recipient text,
  created_at timestamptz DEFAULT now()
);
ALTER TABLE expenses ENABLE ROW LEVEL SECURITY;
CREATE POLICY "anon_all_expenses" ON expenses
  FOR ALL USING (true) WITH CHECK (true);

CREATE TABLE IF NOT EXISTS incomes (
  id bigint PRIMARY KEY,
  date date NOT NULL DEFAULT current_date,
  source text NOT NULL DEFAULT 'marketplace',
  channel text,
  description text,
  amount bigint NOT NULL DEFAULT 0,
  payment_method text DEFAULT 'transfer',
  customer text,
  created_at timestamptz DEFAULT now()
);
ALTER TABLE incomes ENABLE ROW LEVEL SECURITY;
CREATE POLICY "anon_all_incomes" ON incomes
  FOR ALL USING (true) WITH CHECK (true);`}
                </pre>
                <button onClick={() => { navigator.clipboard.writeText(`CREATE TABLE IF NOT EXISTS expenses (\n  id bigint PRIMARY KEY,\n  date date NOT NULL DEFAULT current_date,\n  account_code text NOT NULL,\n  account_name text NOT NULL,\n  description text,\n  amount bigint NOT NULL DEFAULT 0,\n  payment_method text DEFAULT 'transfer',\n  recipient text,\n  created_at timestamptz DEFAULT now()\n);\nALTER TABLE expenses ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "anon_all_expenses" ON expenses\n  FOR ALL USING (true) WITH CHECK (true);\n\nCREATE TABLE IF NOT EXISTS incomes (\n  id bigint PRIMARY KEY,\n  date date NOT NULL DEFAULT current_date,\n  source text NOT NULL DEFAULT 'marketplace',\n  channel text,\n  description text,\n  amount bigint NOT NULL DEFAULT 0,\n  payment_method text DEFAULT 'transfer',\n  customer text,\n  created_at timestamptz DEFAULT now()\n);\nALTER TABLE incomes ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "anon_all_incomes" ON incomes\n  FOR ALL USING (true) WITH CHECK (true);`); showToast("✓ SQL disalin ke clipboard!"); }}
                  style={{ ...s.btn("primary"), marginTop: 8, fontSize: 12, padding: "8px 16px" }}>
                  📋 Copy SQL
                </button>
              </div>
            </div>
          )}
        </div>

  };

  const currentPage = pages[page];
  const pageTitles = {
    dashboard: "Dashboard", scan: "Quick Scan ⚡", stok: "Cek Stok", masuk: "Barang Masuk", keluar: "Barang Keluar",

    label: "Cetak Label Barcode", data: "Import Data", ai: "Tanya AI ✦", settings: "Pengaturan ⚙",

        * { box-sizing: border-box; margin: 0; padding: 0; }

          .plai-sidebar { display: none !important; }

        }
      `}</style>
      <div style={s.app}>
        {/* Sidebar */}

          <div style={s.logo}>
            <div style={{ width: 32, height: 32, background: COLORS.aqua, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontWeight: 800, color: COLORS.brownDark, fontSize: 14 }}>P</div>
            {sidebarOpen && <div><div style={s.logoText}>Plai</div><div style={s.logoSub}>Inventory System</div></div>}
          </div>
          <div style={s.nav}>
            {navItems.map(item => (
              <div key={item.id} style={s.navItem(page === item.id)} onClick={() => setPage(item.id)}>
                <span style={{ fontSize: 16, flexShrink: 0 }}>{item.icon}</span>
                {sidebarOpen && <span>{item.label}</span>}
                {sidebarOpen && item.id === "stok" && lowStock.length > 0 && <span style={{ ...s.badge(COLORS.warning), marginLeft: "auto" }}>{lowStock.length}</span>}
                {sidebarOpen && item.id === "settings" && <span style={{ width: 8, height: 8, borderRadius: "50%", background: sbConnected ? COLORS.success : COLORS.danger, marginLeft: "auto", flexShrink: 0 }} />}
              </div>
            ))}
          </div>
          <div style={s.toggleBtn} onClick={() => setSidebarOpen(!sidebarOpen)}>
            {sidebarOpen ? "◀" : "▶"}
          </div>
        </div>

        {/* Main */}
        <div className="plai-main" style={s.main}>
          <div style={s.header}>
            <div>
              <div style={s.headerTitle}>{pageTitles[page]}</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{new Date().toLocaleDateString("id-ID", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</div>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              {lowStock.length > 0 && <span style={s.badge(COLORS.warning)}>⚠ {lowStock.length} stok rendah</span>}
              {outOfStock.length > 0 && <span style={s.badge(COLORS.danger)}>● {outOfStock.length} habis</span>}
            </div>
          </div>
          <div style={s.content}>
            {currentPage ? currentPage() : null}
          </div>
        </div>

        {/* Mobile Bottom Nav — only shown on small screens */}
        <div style={{ display: "none", position: "fixed", bottom: 0, left: 0, right: 0, background: COLORS.brown, borderTop: `1px solid ${COLORS.brownLight}`, zIndex: 9000, padding: "6px 0 env(safe-area-inset-bottom, 6px) 0" }}
          className="mobile-nav">
          {[
            { id: "scan", icon: "⚡", label: "Scan" },
            { id: "stok", icon: "◫", label: "Stok" },
            { id: "keluar", icon: "↑", label: "Keluar" },
            { id: "masuk", icon: "↓", label: "Masuk" },
            { id: "laporan", icon: "≡", label: "Laporan" },
            { id: "kasir", icon: "🛒", label: "Kasir" },
            { id: "keuangan", icon: "💰", label: "Keuangan" },
            { id: "settings", icon: "⚙", label: "Lainnya" },
          ].map(item => (
            <div key={item.id} onClick={() => setPage(item.id)}
              style={{ flex: 1, textAlign: "center", padding: "6px 0", cursor: "pointer", color: page === item.id ? COLORS.aqua : COLORS.textMuted, fontSize: 10, fontWeight: page === item.id ? 700 : 400, transition: "color 0.15s" }}>
              <div style={{ fontSize: 18, marginBottom: 2 }}>{item.icon}</div>
              <div>{item.label}</div>
            </div>
          ))}
        </div>
        <style>{`@media (max-width: 768px) { .mobile-nav { display: flex !important; } }`}</style>

        {/* Toast */}
        {toast && (
          <div style={{ position: "fixed", bottom: 24, right: 24, background: toast.type === "danger" ? COLORS.danger : toast.type === "warning" ? COLORS.warning : COLORS.success, color: COLORS.brownDark, padding: "12px 20px", borderRadius: 10, fontWeight: 600, fontSize: 13, boxShadow: "0 4px 20px rgba(0,0,0,0.3)", zIndex: 9999 }}>
            {toast.msg}
          </div>
        )}

        {/* ── Print Preview Overlay ── */}
        {printItems && (
          <div style={{ position: "fixed", inset: 0, background: "#f5f5f5", zIndex: 10000, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Toolbar — disembunyikan saat print */}
            <div className="no-print" style={{ background: COLORS.brown, padding: "14px 24px", display: "flex", gap: 12, alignItems: "center", borderBottom: `1px solid ${COLORS.brownLight}`, flexShrink: 0 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: COLORS.cream, fontSize: 15 }}>🏷️ {printItems.length} Label Siap Print</div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>Klik <strong style={{ color: COLORS.aqua }}>Print / Save PDF</strong> → di dialog printer pilih <strong style={{ color: COLORS.aqua }}>"Save as PDF"</strong></div>
              </div>
              <button
                onClick={() => {
                  const rows = printItems.map(item => `
                    <div class="label">
                      <div class="brand">PLAI SPORTS</div>
                      <div class="name">${item.nama}</div>
                      <img src="${item.barcodeUrl}" style="width:100%;height:48px;object-fit:contain;display:block;" />
                      <div class="sku">${item.sku}</div>
                      ${labelShowPrice ? `<div class="price">Rp ${item.harga.toLocaleString("id-ID")}</div>` : ""}
                    </div>`).join("");
                  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
                    <title>Label Plai Sports</title>
                    <style>
                      *{box-sizing:border-box;margin:0;padding:0;}
                      body{font-family:Arial,sans-serif;background:#fff;}
                      .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px;}
                      .label{border:0.5px solid #ccc;border-radius:4px;padding:7px 5px 5px;text-align:center;page-break-inside:avoid;break-inside:avoid;}
                      .brand{font-size:7px;letter-spacing:2px;color:#aaa;text-transform:uppercase;margin-bottom:2px;}
                      .name{font-size:8.5px;font-weight:bold;line-height:1.25;min-height:20px;margin-bottom:4px;word-break:break-word;}
                      .sku{font-size:7.5px;color:#555;font-family:monospace;margin-top:2px;}
                      .price{font-size:10px;font-weight:bold;color:#2a1d14;margin-top:3px;}
                      @page{size:A4;margin:8mm;}
                    </style>
                  </head><body>
                    <div class="grid">${rows}</div>
                    <script>window.onload=function(){window.print()}<\/script>
                  </body></html>`;
                  const blob = new Blob([html], { type: "text/html" });
                  window.open(URL.createObjectURL(blob), "_blank");
                }}
                style={{ background: COLORS.aqua, color: COLORS.brownDark, border: "none", borderRadius: 8, padding: "10px 22px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
              >🖨️ Print / Save PDF</button>
              <button
                onClick={() => setPrintItems(null)}
                style={{ background: COLORS.brownLight, color: COLORS.cream, border: "none", borderRadius: 8, padding: "10px 16px", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
              >✕ Tutup</button>
            </div>

            {/* Label grid — ini yang terprint */}
            <div style={{ flex: 1, overflow: "auto", padding: 16 }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, maxWidth: 900, margin: "0 auto" }}>
                {printItems.map(item => (
                  <div key={item.sku} style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 6, padding: "8px 6px 6px", textAlign: "center" }}>
                    <div style={{ fontSize: 7, letterSpacing: 2, color: "#aaa", textTransform: "uppercase", marginBottom: 2 }}>PLAI SPORTS</div>
                    <div style={{ fontSize: 8.5, fontWeight: "bold", lineHeight: 1.25, minHeight: 20, marginBottom: 4, wordBreak: "break-word" }}>{item.nama}</div>
                    <img src={item.barcodeUrl} style={{ width: "100%", height: 50, objectFit: "contain", display: "block" }} alt={item.sku} />
                    <div style={{ fontSize: 7.5, color: "#555", fontFamily: "monospace", marginTop: 2 }}>{item.sku}</div>
                    {labelShowPrice && <div style={{ fontSize: 10, fontWeight: "bold", color: "#2a1d14", marginTop: 3 }}>Rp {item.harga.toLocaleString("id-ID")}</div>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Barcode Registration Modal */}
        {/* Barcode Registration Modal (single or bulk) */}
        {(barcodeRegister || bulkRegisterMode) && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
            <div style={{ background: COLORS.brown, borderRadius: 16, padding: 20, width: "100%", maxWidth: 440, maxHeight: "90vh", overflow: "auto" }}>

              {/* Bulk mode header with counter */}
              {bulkRegisterMode && (
                <div style={{ background: COLORS.aqua+"15", border: `1px solid ${COLORS.aquaDark}`, borderRadius: 10, padding: 12, marginBottom: 14, textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: COLORS.aqua, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>MODE BULK REGISTER</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.cream }}>{bulkRegisterLog.length}</div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>barcode terdaftar sesi ini</div>
                  {bulkRegisterLog.length > 0 && (
                    <div style={{ maxHeight: 80, overflowY: "auto", marginTop: 8, textAlign: "left" }}>
                      {bulkRegisterLog.slice(-5).map((log, i) => (
                        <div key={i} style={{ fontSize: 10, color: COLORS.success, fontFamily: "monospace", padding: "1px 0" }}>✓ {log.barcode} → {log.nama}</div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {barcodeRegister ? (
                <>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 4, fontSize: 16 }}>
                    {bulkRegisterMode ? "📷 Scan Terdeteksi" : "Daftarkan Barcode Baru"}
                  </h3>
                  <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 16 }}>
                    Barcode <span style={{ fontFamily: "monospace", color: COLORS.cream, fontWeight: 700 }}>{barcodeRegister.code}</span> belum terdaftar. Pilih item:
                  </p>
                  <input
                    style={{ ...s.input, marginBottom: 12 }}
                    placeholder="Cari item..."
                    value={barcodeRegister.search || ""}
                    onChange={e => setBarcodeRegister(prev => ({ ...prev, search: e.target.value }))}
                    autoFocus
                  />
                  <div style={{ maxHeight: 280, overflowY: "auto", borderRadius: 8, border: `1px solid ${COLORS.brownLight}` }}>
                    {inventory.filter(i => {
                      if (i.discontinued) return false;
                      if (!barcodeRegister.search) return true;
                      const q = barcodeRegister.search.toLowerCase();
                      return i.sku.toLowerCase().includes(q) || i.nama.toLowerCase().includes(q);
                    }).slice(0, 50).map(item => (
                      <div key={item.sku}
                        style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${COLORS.brownLight}30`, display: "flex", justifyContent: "space-between", alignItems: "center" }}
                        onClick={() => {
                          setBarcodeMap(prev => ({ ...prev, [barcodeRegister.code]: item.sku }));
                          showToast(`✓ ${barcodeRegister.code} → ${item.nama}`);
                          if (bulkRegisterMode) {
                            setBulkRegisterLog(prev => [...prev, { barcode: barcodeRegister.code, nama: item.nama }]);
                            setBarcodeRegister(null);
                            // Auto reopen camera for next scan
                            setTimeout(() => { setCameraTarget("bulkregister"); setCameraOpen(true); }, 300);
                          } else {
                            setBarcodeRegister(null);
                          }
                        }}>
                        <div>
                          <div style={{ color: COLORS.cream, fontWeight: 600, fontSize: 13 }}>{item.nama}</div>
                          <div style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "monospace" }}>{item.sku}</div>
                        </div>
                        <div style={{ color: getStokColor(item), fontWeight: 700, fontSize: 14 }}>{item.stok}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                    <button onClick={() => {
                      setBarcodeRegister(null);
                      if (bulkRegisterMode) {
                        // Skip this barcode, reopen camera
                        setTimeout(() => { setCameraTarget("bulkregister"); setCameraOpen(true); }, 300);
                      }
                    }} style={{ ...s.btn("secondary"), flex: 1 }}>
                      {bulkRegisterMode ? "Skip →" : "Batal"}
                    </button>
                    {bulkRegisterMode && (
                      <button onClick={() => { setBarcodeRegister(null); setBulkRegisterMode(false); setBulkRegisterLog([]); }}
                        style={{ ...s.btn("primary"), flex: 1 }}>
                        Selesai ({bulkRegisterLog.length} terdaftar)
                      </button>
                    )}
                  </div>
                </>
              ) : bulkRegisterMode ? (
                <>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 8, fontSize: 16 }}>📷 Bulk Register Barcode</h3>
                  <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 16 }}>Scan barcode satu per satu. Setelah scan, pilih item, lalu kamera otomatis buka lagi untuk scan berikutnya.</p>
                  <button onClick={() => { setCameraTarget("bulkregister"); setCameraOpen(true); }}
                    style={{ ...s.btn("primary"), width: "100%", padding: "14px 0", fontSize: 15, marginBottom: 10 }}>
                    📸 Mulai Scan
                  </button>
                  <button onClick={() => { setBulkRegisterMode(false); setBulkRegisterLog([]); }}
                    style={{ ...s.btn("secondary"), width: "100%" }}>
                    Selesai ({bulkRegisterLog.length} terdaftar)
                  </button>
                </>
              ) : null}
            </div>
          </div>
        )}

        {/* Camera Barcode Scanner Overlay */}
        {cameraOpen && (
          <CameraScanner
            onScan={(code) => {
              setCameraOpen(false);
              setTimeout(() => {
                document.querySelectorAll("video").forEach(v => {
                  if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
                });
              }, 100);
              if (cameraTarget === "bulkregister") {
                // Bulk register mode: always go to registration
                const existing = findByBarcode(code);
                if (existing) {
                  showToast(`✓ "${code}" sudah terdaftar → ${existing.nama}`);
                  setBulkRegisterLog(prev => [...prev, { barcode: code, nama: existing.nama + " (sudah ada)" }]);
                  setTimeout(() => { setCameraTarget("bulkregister"); setCameraOpen(true); }, 500);
                } else {
                  setBarcodeRegister({ code: code.trim() });
                }
                return;
              }
              const found = findByBarcode(code);
              if (found) {
                showToast(`📷 ${found.nama}`);
                if (cameraTarget === "quickscan") {
                  setScanResult(found);
                  setScanJumlah(1);
                  setTimeout(() => scanJumlahRef.current?.focus(), 100);
                } else if (cameraTarget === "kasir") {
                  addToCart(found.sku);
                } else if (cameraTarget === "stok") {
                  setStokHighlighted(found.sku);
                  setStokSearch(found.nama);
                  setTimeout(() => setStokHighlighted(""), 3000);
                } else if (cameraTarget === "form") {
                  // Trigger form scan via global ref
                  if (window.__plaiFormScanCallback) window.__plaiFormScanCallback(found.sku);
                }
              } else {
                // Unknown barcode — offer registration
                if (/^\d{6,}$/.test(code.trim())) {
                  setBarcodeRegister({ code: code.trim() });
                  showToast(`Barcode "${code}" belum terdaftar`, "warning");
                } else {
                  showToast(`"${code}" tidak ditemukan`, "danger");
                }
              }
            }}
            onClose={() => {
              setCameraOpen(false);
              // Extra safety: kill any lingering camera streams
              setTimeout(() => {
                document.querySelectorAll("video").forEach(v => {
                  if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
                });
              }, 100);
            }}
          />
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PlaiInventory));

  </script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
