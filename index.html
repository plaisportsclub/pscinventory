// ── helpers ──────────────────────────────────────────────────────────────────
const extractKategori = (name = "") => {
  const n = name.toLowerCase();
  if (n.includes("skirt")) return "Skirt";
  if (n.includes("shorts") || n.includes("boxer")) return "Shorts";
  if (n.includes("t-shirt")) return "T-Shirt";
  if (n.includes("longsleeve") || n.includes("long sleeve")) return "Longsleeve";
  if (n.includes("tank") || n.includes("backless")) return "Tank";
  if (n.includes("shirt")) return "Shirt";
  if (n.includes("cap")) return "Aksesoris";
  if (n.includes("bag") || n.includes("tas")) return "Tas";
  return "Apparel";
};

const parseCSV = (text) => {
  const lines = text.trim().split("\n");
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    // Handle quoted fields
    const cols = [];
    let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const sku = cols[0]?.trim();
    const nama = cols[1]?.trim();
    if (!sku || !nama) continue;
    results.push({
      sku,
      nama,
      harga: parseInt(cols[2]) || 0,
      stok: parseInt(cols[4]) || 0,
      minimum: 3,
      satuan: "pcs",
      kategori: extractKategori(nama),
    });
  }
  return results;
};

// ── localStorage helpers ────────────────────────────────────────────────────
const load = (key, fallback) => {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
};
const save = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
};

// ── ItemForm defined OUTSIDE PlaiInventory so React keeps its identity stable ──
// This prevents state (selected SKU, form fields) from resetting on parent re-render
const ItemForm = ({ tipe, onSubmit, inventory, showToast, styles, getStokColor, onOpenCamera, barcodeMap, onBarcodeNotFound }) => {
  const todayStr = new Date().toISOString().split("T")[0];
  const [form, setForm] = useState({ sku: "", jumlah: 1, channel: "terjual", shipping: "none", shippingCost: "", pelangganShipCost: "", marketplace: false, catatan: "", staff: STAFF_LIST[0], peminjam: "", tanggal: todayStr });
  const [scanInput, setScanInput] = useState("");
  const [showDropdown, setShowDropdown] = useState(false);
  const selected = inventory.find(i => i.sku === form.sku);
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const s = styles;

  const handleScan = (val) => {
    const q = val.trim().toLowerCase();
    if (!q) return;
    // 1. Check barcode map first
    const mappedSku = barcodeMap[q] || barcodeMap[val.trim()];
    if (mappedSku) {
      const mapped = inventory.find(i => i.sku === mappedSku && !i.discontinued);
      if (mapped) { set("sku", mapped.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${mapped.nama}`); return; }
    }
    // 2. Exact SKU
    const exact = inventory.find(i => i.sku.toLowerCase() === q && !i.discontinued);
    if (exact) { set("sku", exact.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${exact.nama}`); return; }
    // 3. Partial SKU
    const partialSku = inventory.find(i => i.sku.toLowerCase().includes(q) && !i.discontinued);
    if (partialSku) { set("sku", partialSku.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${partialSku.nama}`); return; }
    // 4. Partial name
    const partialName = inventory.find(i => i.nama.toLowerCase().includes(q) && !i.discontinued);
    if (partialName) { set("sku", partialName.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${partialName.nama}`); return; }
    // 5. Not found — trigger barcode registration if numeric
    if (/^\d{6,}$/.test(val.trim())) {
      if (onBarcodeNotFound) onBarcodeNotFound(val.trim());
      showToast(`Barcode "${val.trim()}" belum terdaftar`, "warning");
    } else {
      showToast(`"${val.trim()}" tidak ditemukan`, "danger");
    }
  };

  // Register global callback for camera scans
  useEffect(() => {
    window.__plaiFormScanCallback = (sku) => {
      set("sku", sku);
      setScanInput("");
      setShowDropdown(false);
    };
    return () => { delete window.__plaiFormScanCallback; };
  }, []);

  const filteredItems = inventory.filter(i => {
    if (i.discontinued) return false;
    if (!scanInput.trim()) return true;
    const q = scanInput.trim().toLowerCase();
    return i.sku.toLowerCase().includes(q) || i.nama.toLowerCase().includes(q);
  });

  const submit = () => {
    if (!form.sku || form.jumlah < 1) return showToast("Pilih barang dan jumlah dulu!", "danger");
    if (tipe !== "masuk" && selected && form.jumlah > selected.stok) return showToast("Stok tidak cukup!", "danger");
    if (tipe === "keluar" && form.shipping === "plai" && (!form.shippingCost || form.shippingCost <= 0)) return showToast("Isi biaya shipping Plai dulu!", "danger");
    const pelangganShipCostVal = form.shipping === "pelanggan" && !form.marketplace ? parseInt(form.pelangganShipCost) || 0 : 0;
    onSubmit({ sku: form.sku, jumlah: parseInt(form.jumlah), channel: form.channel, shipping: form.shipping, shippingCost: form.shipping === "plai" ? parseInt(form.shippingCost) : 0, pelangganShipCost: pelangganShipCostVal, marketplace: form.marketplace || false, catatan: (form.marketplace ? (form.catatan ? form.catatan + " — Marketplace" : "Marketplace") : form.catatan), staff: form.staff, peminjam: form.peminjam || "", nama: selected?.nama || "", tanggal: form.tanggal || todayStr });
    setForm({ sku: "", jumlah: 1, channel: "terjual", shipping: "none", shippingCost: "", pelangganShipCost: "", marketplace: false, catatan: "", staff: STAFF_LIST[0], peminjam: "", tanggal: new Date().toISOString().split("T")[0] });
    setScanInput("");
  };

  return (
    <div style={s.card}>
      <div style={{ position: "relative", marginBottom: 16 }}>
        <div style={{ background: COLORS.brownDark, border: `1px dashed ${COLORS.aquaDark}`, borderRadius: 8, padding: "10px 14px", display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 16 }}>📷</span>
          <input
            style={{ ...s.input, flex: 1, border: "none", background: "transparent", padding: "0" }}
            placeholder="Scan barcode / ketik SKU / nama produk..."
            value={scanInput}
            onChange={e => { setScanInput(e.target.value); setShowDropdown(true); }}
            onFocus={() => setShowDropdown(true)}
            onBlur={() => setTimeout(() => setShowDropdown(false), 400)}
            onKeyDown={e => { if (e.key === "Enter") { handleScan(scanInput); setShowDropdown(false); } if (e.key === "Escape") setShowDropdown(false); }}
          />
          <button style={{ ...s.btn("primary"), padding: "6px 12px", fontSize: 11 }} onClick={() => { handleScan(scanInput); setShowDropdown(false); }}>Cari</button>
          <button onClick={onOpenCamera}
            style={{ background: COLORS.warning, border: "none", borderRadius: 6, padding: "6px 10px", fontSize: 11, cursor: "pointer", fontWeight: 700, color: COLORS.brownDark }}>
            📸
          </button>
        </div>

        {showDropdown && !selected && filteredItems.length > 0 && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: COLORS.brownDark, border: `1px solid ${COLORS.brownLight}`, borderRadius: "0 0 8px 8px", maxHeight: 260, overflowY: "auto", zIndex: 100, boxShadow: "0 8px 24px rgba(0,0,0,0.4)" }}>
            {!scanInput.trim() && <div style={{ padding: "6px 14px", fontSize: 11, color: COLORS.textMuted, borderBottom: `1px solid ${COLORS.brownLight}30` }}>Ketik untuk filter — {filteredItems.length} produk</div>}
            {filteredItems.slice(0, 30).map(item => {
              const selectItem = () => { set("sku", item.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${item.nama}`); };
              return (
              <div key={item.sku}
                style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${COLORS.brownLight}30`, display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, userSelect: "none", WebkitTapHighlightColor: "transparent" }}
                onMouseDown={e => { e.preventDefault(); e.stopPropagation(); }}
                onTouchStart={e => { e.stopPropagation(); }}
                onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); selectItem(); }}
                onClick={e => { e.preventDefault(); e.stopPropagation(); selectItem(); }}>
                <div style={{ flex: 1, minWidth: 0, pointerEvents: "none" }}>
                  <div style={{ color: COLORS.cream, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.nama}</div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "monospace" }}>{item.sku}</div>
                </div>
                <div style={{ color: getStokColor(item), fontWeight: 700, fontSize: 14, marginLeft: 8, pointerEvents: "none" }}>{item.stok}</div>
              </div>
              );
            })}
            {filteredItems.length > 30 && <div style={{ padding: "8px 14px", fontSize: 11, color: COLORS.textMuted, textAlign: "center" }}>... dan {filteredItems.length - 30} lainnya — ketik untuk filter</div>}
          </div>
        )}
        {showDropdown && scanInput.trim() && filteredItems.length === 0 && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: COLORS.brownDark, border: `1px solid ${COLORS.brownLight}`, borderRadius: "0 0 8px 8px", padding: "12px 14px", zIndex: 100, fontSize: 13, color: COLORS.textMuted }}>
            Tidak ditemukan "{scanInput.trim()}"
          </div>
        )}
      </div>

      {selected && (
        <div style={{ background: COLORS.aqua+"15", border: `1px solid ${COLORS.aqua}40`, borderRadius: 8, padding: "10px 14px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.cream }}>{selected.nama}</div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "monospace" }}>{selected.sku} · Rp {selected.harga?.toLocaleString("id-ID") || 0}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: getStokColor(selected) }}>{selected.stok}</div>
              <div style={{ fontSize: 10, color: COLORS.textMuted }}>stok</div>
            </div>
            <button onClick={() => { set("sku", ""); setScanInput(""); }} style={{ background: "transparent", border: `1px solid ${COLORS.brownLight}`, borderRadius: 6, color: COLORS.textMuted, padding: "4px 8px", fontSize: 11, cursor: "pointer" }}>✕ Ganti</button>
          </div>
        </div>
      )}
      <div style={s.grid2}>
        <div style={s.formGroup}>
          <label style={s.label}>Jumlah</label>
          <input style={s.input} type="number" min="1" value={form.jumlah} onChange={e => set("jumlah", e.target.value)} />
        </div>
        <div style={s.formGroup}>
          <label style={s.label}>Staff</label>
          <select style={s.select} value={form.staff} onChange={e => set("staff", e.target.value)}>
            {STAFF_LIST.map(st => <option key={st}>{st}</option>)}
          </select>
        </div>
      </div>

      {/* Date picker — auto-filled with today */}
      <div style={s.formGroup}>
        <label style={s.label}>Tanggal Transaksi</label>
        <input style={s.input} type="date" value={form.tanggal} onChange={e => set("tanggal", e.target.value)} max={todayStr} />
        {form.tanggal !== todayStr && (
          <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>⚠ Tanggal bukan hari ini — pastikan tanggal sudah benar</div>
        )}
      </div>

      {tipe === "keluar" && (
        <>
          <div style={s.formGroup}>
            <label style={s.label}>Channel Keluar</label>
            <div style={{ display: "flex", gap: 8 }}>
              {[["terjual", "🛒 Terjual"], ["kol", "📱 KOL"], ["event", "🎪 Event"]].map(([val, lbl]) => (
                <button key={val} onClick={() => set("channel", val)} style={{ ...s.btn(form.channel === val ? "primary" : "secondary"), flex: 1, fontSize: 12 }}>{lbl}</button>
              ))}
            </div>
          </div>
          <div style={s.formGroup}>
            <label style={s.label}>Shipping</label>
            <div style={{ display: "flex", gap: 8, marginBottom: form.shipping === "plai" ? 10 : 0 }}>
              {[
                ["none", "🏃 Pickup"],
                ["pelanggan", "📦 Pelanggan"],
                ["plai", "💸 Plai"],
              ].map(([val, lbl]) => (
                <button key={val} onClick={() => set("shipping", val)} style={{ ...s.btn(form.shipping === val ? "primary" : "secondary"), flex: 1, fontSize: 11, padding: "8px 6px" }}>{lbl}</button>
              ))}
            </div>
            {form.shipping === "plai" && (
              <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: 14, border: `1px solid ${COLORS.danger}40` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 12, color: COLORS.danger, fontWeight: 600 }}>💸 Akan dicatat sebagai Shipping Expense Plai</span>
                </div>
                <label style={s.label}>Biaya Shipping (Rp)</label>
                <input style={s.input} type="number" min="0" placeholder="Contoh: 25000" value={form.shippingCost} onChange={e => set("shippingCost", e.target.value)} />
              </div>
            )}
            {form.shipping === "pelanggan" && (
              <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: 12, border: `1px solid ${COLORS.brownLight}` }}>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>📦 Shipping ditanggung pelanggan</div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: form.marketplace ? 0 : 10 }}>
                  <div onClick={() => { set("marketplace", !form.marketplace); if (!form.marketplace) set("pelangganShipCost", ""); }}
                    style={{ width: 40, height: 22, borderRadius: 11, background: form.marketplace ? COLORS.aqua : COLORS.brownLight, cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                    <div style={{ width: 18, height: 18, borderRadius: 9, background: COLORS.white, position: "absolute", top: 2, left: form.marketplace ? 20 : 2, transition: "left 0.2s" }} />
                  </div>
                  <span style={{ fontSize: 12, color: form.marketplace ? COLORS.aqua : COLORS.textMuted, fontWeight: form.marketplace ? 600 : 400 }}>Dari Marketplace</span>
                </div>
                {!form.marketplace && (
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4, display: "block" }}>Biaya Shipping dari Pelanggan (opsional)</label>
                    <input style={s.input} type="number" min="0" placeholder="cth: 15000" value={form.pelangganShipCost} onChange={e => set("pelangganShipCost", e.target.value)} />
                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 3 }}>Kosongkan jika tidak perlu di-track</div>
                  </div>
                )}
                {form.marketplace && (
                  <div style={{ fontSize: 10, color: COLORS.aquaDark, marginTop: 4 }}>Shipping dihandle marketplace — tidak perlu track biaya</div>
                )}
              </div>
            )}
          </div>
        </>
      )}

  const topKeluar = () => {
    const map = {};
    transactions.filter(t => t.tipe === "keluar").forEach(t => {
      map[t.sku] = (map[t.sku] || 0) + t.jumlah;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([sku, total]) => {
      const item = inventory.find(i => i.sku === sku);
      return { sku, nama: item?.nama || sku, total };
    });
  };

  const channelStats = () => {
    const map = { terjual: 0, kol: 0, event: 0 };
    transactions.filter(t => t.tipe === "keluar").forEach(t => {
      if (map[t.channel] !== undefined) map[t.channel] += t.jumlah;
    });
    return map;
  };

  // ── edit transaction state ──
  const [editingTx, setEditingTx] = useState(null); // transaction being edited

  // ── helpers: sync to Supabase + explicit refetch ──
  const sbRefetchTransactions = async () => {
    if (!sbClient) return;
    const { data } = await sbClient.from('transactions').select('*').order('id', { ascending: false });
    if (data) setTransactions(data);
  };
  const sbRefetchInventory = async () => {
    if (!sbClient) return;
    const { data } = await sbClient.from('inventory').select('*');
    if (data) setInventory(data);
  };

  const sbUpsertInventory = async (sku, newStok) => {
    if (!sbClient) return;
    try {
      const { error } = await sbClient.from('inventory').update({ stok: newStok }).eq('sku', sku);
      if (error) { console.error('Supabase inventory update error:', error); showToast('DB sync error: ' + error.message, 'danger'); }
      else await sbRefetchInventory();
    } catch(e) { console.error('sbUpsertInventory error:', e); }
  };
  const sbInsertTx = async (tx) => {
    if (!sbClient) { showToast('⚠ Database belum terhubung — transaksi hanya tersimpan lokal!', 'danger'); return; }
    try {
      console.log('sbInsertTx sending:', JSON.stringify(tx));
      const { error } = await sbClient.from('transactions').insert(tx);
      if (error) {
        console.error('Supabase tx insert error:', error);
        showToast(`❌ Gagal simpan ke database: ${error.message}`, 'danger');
        // Retry once after 2 seconds
        setTimeout(async () => {
          try {
            const { error: e2 } = await sbClient.from('transactions').insert(tx);
            if (!e2) { showToast('✓ Retry berhasil — transaksi tersimpan', 'success'); await sbRefetchTransactions(); }
            else console.error('Retry failed:', e2);
          } catch(re) { console.error('Retry error:', re); }
        }, 2000);
      }
      else { console.log('sbInsertTx success'); await sbRefetchTransactions(); }
    } catch(e) { console.error('sbInsertTx error:', e); showToast(`❌ Error: ${e.message}`, 'danger'); }
  };
  const sbUpdateTx = async (id, updates) => {
    if (!sbClient) return;
    try {
      const { error } = await sbClient.from('transactions').update(updates).eq('id', id);
      if (error) { console.error('Supabase tx update error:', error); showToast('DB sync error: ' + error.message, 'danger'); }
      else await sbRefetchTransactions();
    } catch(e) { console.error('sbUpdateTx error:', e); }
  };
  const sbInsertPinjam = async (p) => {
    if (!sbClient) { showToast('⚠ Database belum terhubung!', 'danger'); return; }
    try {
      console.log('sbInsertPinjam sending:', JSON.stringify(p));
      const { error } = await sbClient.from('pinjaman').insert(p);
      if (error) { console.error('Supabase pinjam insert error:', error); showToast(`❌ Gagal simpan peminjaman: ${error.message}`, 'danger'); }
    } catch(e) { console.error('sbInsertPinjam error:', e); showToast(`❌ Error: ${e.message}`, 'danger'); }
  };

  const sbDeleteTx = async (id) => {
    if (!sbClient) return;
    try {
      const { error } = await sbClient.from('transactions').delete().eq('id', id);
      if (error) { console.error('Supabase tx delete error:', error); showToast('DB sync error: ' + error.message, 'danger'); }
      else await sbRefetchTransactions();
    } catch(e) { console.error('sbDeleteTx error:', e); }
  };

  // Delete transaction + revert stock + revert shipping expense
  const [deleteTxConfirm, setDeleteTxConfirm] = useState(null);

  const handleDeleteTx = (tx) => {
    // Revert stock
    const item = inventory.find(i => i.sku === tx.sku);
    if (item) {
      let newStok = item.stok;
      if (tx.tipe === "keluar" || tx.tipe === "rusak") {
        newStok = item.stok + tx.jumlah; // give stock back
      } else if (tx.tipe === "masuk") {
        newStok = Math.max(0, item.stok - tx.jumlah); // remove the restocked qty
      }
      setInventory(prev => prev.map(i => i.sku === tx.sku ? { ...i, stok: newStok } : i));
      sbUpsertInventory(tx.sku, newStok);
    }
    // Remove transaction
    setTransactions(prev => prev.filter(t => t.id !== tx.id));
    sbDeleteTx(tx.id);
    setDeleteTxConfirm(null);
    showToast(`✓ Transaksi dihapus — stok ${tx.nama} dikembalikan`);
  };

  // ── handlers ────────────────────────────────────────────────────────────────
  // Strip fields not in transactions table to prevent Supabase insert failure
  const makeTxData = (data) => {
    const { peminjam, tanggal, tipeKhusus, ...rest } = data;
    return rest;
  };

  const handleMasuk = (data) => {
    const item = inventory.find(i => i.sku === data.sku);
    const newStok = (item?.stok || 0) + data.jumlah;
    const txData = makeTxData(data);
    const tx = { id: Date.now(), tanggal: data.tanggal || new Date().toISOString().split("T")[0], tipe: data.tipeKhusus || "masuk", channel: "-", harga: item?.harga || 0, ...txData };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: i.stok + data.jumlah } : i));
    setTransactions(prev => [tx, ...prev]);
    showToast(`✓ Restock ${data.nama} +${data.jumlah} berhasil dicatat`);
    sbUpsertInventory(data.sku, newStok);
    sbInsertTx(tx);
  };

  const handleKeluar = (data) => {
    const item = inventory.find(i => i.sku === data.sku);
    const newStok = Math.max(0, (item?.stok || 0) - data.jumlah);
    const txData = makeTxData(data);
    const tx = { id: Date.now() + Math.floor(Math.random() * 1000), tanggal: data.tanggal || new Date().toISOString().split("T")[0], tipe: "keluar", harga: item?.harga || 0, ...txData };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: Math.max(0, i.stok - data.jumlah) } : i));
    setTransactions(prev => [tx, ...prev]);
    showToast(`✓ Barang keluar ${data.nama} -${data.jumlah} dicatat`);
    sbUpsertInventory(data.sku, newStok);
    sbInsertTx(tx);
  };

  // ── quick scan handlers ──────────────────────────────────────────────────
  const handleQuickScan = (val) => {
    const trimmed = val.trim();
    setScanQ("");
    if (!trimmed) return;
    const found = findByBarcode(trimmed);
    if (found) {
      setScanResult(found);
      setScanJumlah(1);
      setTimeout(() => scanJumlahRef.current?.focus(), 100);
    } else {
      // Unknown barcode — offer to register it
      if (/^\d{6,}$/.test(trimmed)) {
        setBarcodeRegister({ code: trimmed });
        showToast(`Barcode "${trimmed}" belum terdaftar — pilih item untuk didaftarkan`, "warning");
      } else {
        showToast(`"${trimmed}" tidak ditemukan`, "danger");
      }
      setTimeout(() => scanInputRef.current?.focus(), 100);
    }
  };

  const confirmQuickScan = () => {
    if (!scanResult || scanJumlah < 1) return showToast("Isi jumlah dulu!", "danger");
    if (scanMode === "keluar" && scanJumlah > scanResult.stok) return showToast("Stok tidak cukup!", "danger");
    if (scanMode === "keluar" && scanShipping === "plai" && (!scanShipCost || parseInt(scanShipCost) <= 0)) return showToast("Isi biaya shipping dulu!", "danger");
    const currentStok = inventory.find(i => i.sku === scanResult.sku)?.stok ?? scanResult.stok;
    const data = {
      sku: scanResult.sku,
      nama: scanResult.nama,
      jumlah: parseInt(scanJumlah),
      channel: scanMode === "keluar" ? scanChannel : "-",
      shipping: scanMode === "keluar" ? scanShipping : "none",
      shippingCost: scanMode === "keluar" && scanShipping === "plai" ? parseInt(scanShipCost) : 0,
      pelangganShipCost: scanMode === "keluar" && scanShipping === "pelanggan" && !scanMarketplace ? parseInt(scanPelangganShipCost) || 0 : 0,
      marketplace: scanMarketplace,
      catatan: scanMarketplace ? "Marketplace" : "",
      staff: scanStaff,
    };
    const stokAfter = scanMode === "masuk" ? currentStok + data.jumlah : currentStok - data.jumlah;
    if (scanMode === "masuk") handleMasuk(data);
    else handleKeluar(data);
    setScanHistory(prev => [{ ...data, tipe: scanMode, waktu: new Date().toLocaleTimeString("id-ID"), stokBefore: currentStok, stokAfter }, ...prev].slice(0, 10));
    setScanResult(null);
    setScanJumlah(1);
    setScanChannel("terjual");
    setScanShipping("none");
    setScanShipCost("");
    setScanMarketplace(false);
    setScanPelangganShipCost("");
    setTimeout(() => scanInputRef.current?.focus(), 150);
  };

  const handleRusak = (data) => {
    const item = inventory.find(i => i.sku === data.sku);
    const newStok = Math.max(0, (item?.stok || 0) - data.jumlah);
    const txData = makeTxData(data);
    const tx = { id: Date.now(), tanggal: data.tanggal || new Date().toISOString().split("T")[0], tipe: "rusak", channel: "-", harga: item?.harga || 0, ...txData };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: Math.max(0, i.stok - data.jumlah) } : i));
    setTransactions(prev => [tx, ...prev]);
    showToast(`⚠ ${data.nama} ${data.jumlah} unit dicatat rusak/hilang`, "warning");
    sbUpsertInventory(data.sku, newStok);
    sbInsertTx(tx);
  };

  const handlePinjam = (data) => {
    const newStok = Math.max(0, (inventory.find(i => i.sku === data.sku)?.stok || 0) - data.jumlah);
    const p = { id: Date.now(), tanggal: data.tanggal || new Date().toISOString().split("T")[0], kembali: null, sku: data.sku, nama: data.nama, jumlah: data.jumlah, peminjam: data.peminjam || "", staff: data.staff };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: Math.max(0, i.stok - data.jumlah) } : i));
    setPinjaman(prev => [p, ...prev]);
    showToast(`⇄ Peminjaman ${data.nama} dicatat`);
    sbUpsertInventory(data.sku, newStok);
    sbInsertPinjam(p);
  };

  const handleKembali = (id) => {
    const p = pinjaman.find(x => x.id === id);
    if (!p) return;
    const newStok = (inventory.find(i => i.sku === p.sku)?.stok || 0) + p.jumlah;
    setInventory(prev => prev.map(i => i.sku === p.sku ? { ...i, stok: i.stok + p.jumlah } : i));
    setPinjaman(prev => prev.map(x => x.id === id ? { ...x, kembali: new Date().toISOString().split("T")[0] } : x));
    showToast(`✓ Pengembalian ${p.nama} dicatat`);
    sbUpsertInventory(p.sku, newStok);
    if (sbClient) sbClient.from('pinjaman').update({ kembali: new Date().toISOString().split("T")[0] }).eq('id', id);
  };

  // ── kasir / POS handlers ─────────────────────────────────────────────────
  const addToCart = (sku) => {
    const item = inventory.find(i => i.sku === sku && !i.discontinued);
    if (!item) return showToast("Produk tidak ditemukan", "danger");
    if (item.stok === 0) return showToast("Stok habis!", "danger");
    setCart(prev => {
      const existing = prev.find(c => c.sku === sku);
      if (existing) {
        const maxStok = item.stok;
        if (existing.qty >= maxStok) { showToast("Stok tidak cukup!", "danger"); return prev; }
        return prev.map(c => c.sku === sku ? { ...c, qty: c.qty + 1 } : c);
      }
      return [...prev, { sku: item.sku, nama: item.nama, harga: item.harga, qty: 1, satuan: item.satuan }];
    });
    setKasirSearch("");
    setTimeout(() => kasirScanRef.current?.focus(), 80);
  };

  const removeFromCart = (sku) => setCart(prev => prev.filter(c => c.sku !== sku));

  const updateCartQty = (sku, qty) => {
    if (qty < 1) return removeFromCart(sku);
    const item = inventory.find(i => i.sku === sku);
    if (item && qty > item.stok) return showToast("Stok tidak cukup!", "danger");
    setCart(prev => prev.map(c => c.sku === sku ? { ...c, qty } : c));
  };

  const confirmKasir = () => {
    if (cart.length === 0) return showToast("Keranjang kosong!", "danger");
    const subtotal = cart.reduce((a, c) => a + c.harga * c.qty, 0);
    const diskonNilai = kasirDiskonTipe === "persen"
      ? Math.round(subtotal * (parseFloat(kasirDiskonNilai) || 0) / 100)
      : (parseInt(kasirDiskonNilai) || 0);
    const total = Math.max(0, subtotal - diskonNilai);
    const bayar = parseInt(kasirBayar) || 0;
    if (kasirPayMethod === "cash" && bayar < total) return showToast("Uang bayar kurang!", "danger");
    if (kasirShipping === "plai" && (!kasirShipCost || parseInt(kasirShipCost) <= 0)) return showToast("Isi biaya shipping Plai dulu!", "danger");

    // Deduct stock + record each item as keluar transaction
    // Generate invoice ID for grouping & split discount evenly across items
    const invoiceId = kasirInvoiceManual.trim() ? kasirInvoiceManual.trim() : "INV-" + Date.now();
    const shipCostInt = kasirShipping === "plai" ? parseInt(kasirShipCost) || 0 : 0;
    const pelangganShipCostInt = kasirShipping === "pelanggan" && !kasirMarketplace ? parseInt(kasirPelangganShipCost) || 0 : 0;
    const totalItems = cart.reduce((a, c) => a + c.qty, 0);
    const diskonPerUnit = totalItems > 0 ? Math.floor(diskonNilai / totalItems) : 0;
    const diskonSisa = totalItems > 0 ? diskonNilai - (diskonPerUnit * totalItems) : 0;
    cart.forEach((c, ci) => {
      const catatanParts = ["Kasir"];
      if (kasirKeterangan.trim()) catatanParts.push(kasirKeterangan.trim());
      if (kasirMarketplace) catatanParts.push("Marketplace");
      const itemDiskon = diskonPerUnit * c.qty + (ci === 0 ? diskonSisa : 0);
      // Shipping cost only on first item to avoid double-counting
      const data = { sku: c.sku, nama: c.nama, jumlah: c.qty, channel: "terjual", shipping: kasirShipping, shippingCost: ci === 0 ? shipCostInt : 0, pelangganShipCost: ci === 0 ? pelangganShipCostInt : 0, marketplace: kasirMarketplace, catatan: catatanParts.join(" — "), staff: kasirStaff, tanggal: kasirTanggal, invoiceId, diskon: itemDiskon };
      handleKeluar(data);
    });

    const receipt = {
      id: Date.now(),
      invoiceId,
      tanggal: kasirTanggal,
      waktu: new Date().toLocaleString("id-ID"),
      items: [...cart],
      subtotal, diskonNilai, total,
      shipping: kasirShipping,
      shippingCost: shipCostInt,
      pelangganShipCost: pelangganShipCostInt,
      marketplace: kasirMarketplace,
      payMethod: kasirPayMethod,
      bayar: kasirPayMethod === "cash" ? bayar : total,
      kembalian: kasirPayMethod === "cash" ? bayar - total : 0,
      staff: kasirStaff,
      keterangan: kasirKeterangan.trim(),
    };
    setKasirReceipt(receipt);
    setCart([]);
    setKasirDiskonNilai("");
    setKasirBayar("");
    setKasirKeterangan("");
    setKasirInvoiceManual("");
    setKasirShipping("none");
    setKasirShipCost("");
    setKasirMarketplace(false);
    setKasirPelangganShipCost("");
  };

  const handleDeleteProduct = (sku) => {
    setInventory(prev => prev.filter(i => i.sku !== sku));
    setDeleteConfirm(null);
    showToast("Produk dihapus", "warning");
    if (sbClient) sbClient.from('inventory').delete().eq('sku', sku);
  };

  const handleDiscontinue = (sku, val) => {
    setInventory(prev => prev.map(i => i.sku === sku ? { ...i, discontinued: val } : i));
    showToast(val ? "Produk diarsip (discontinued)" : "Produk diaktifkan kembali", val ? "warning" : "success");
    if (sbClient) sbClient.from('inventory').update({ discontinued: val }).eq('sku', sku);
  };

  const handleEditHarga = async (sku, hargaBaru) => {
    const hargaInt = parseInt(hargaBaru) || 0;
    if (hargaInt < 0) return showToast("Harga tidak valid", "danger");
    // 1. Update inventory
    setInventory(prev => prev.map(i => i.sku === sku ? { ...i, harga: hargaInt } : i));
    if (sbClient) sbClient.from('inventory').update({ harga: hargaInt }).eq('sku', sku);
    // 2. Update ALL transactions with this SKU (revise historical harga)
    const affectedTx = transactions.filter(t => t.sku === sku);
    setTransactions(prev => prev.map(t => t.sku === sku ? { ...t, harga: hargaInt } : t));
    // 3. Batch update to Supabase
    if (sbClient && affectedTx.length > 0) {
      try {
        const { error } = await sbClient.from('transactions').update({ harga: hargaInt }).eq('sku', sku);
        if (error) { console.error('Bulk harga update error:', error); showToast('⚠ Harga lokal diupdate, tapi sync ke database gagal: ' + error.message, 'warning'); }
      } catch(e) { console.error('handleEditHarga sync error:', e); }
    }
    showToast(`✓ Harga ${sku} diupdate ke Rp ${hargaInt.toLocaleString("id-ID")} — ${affectedTx.length} transaksi direvisi`);
    setEditHarga(null);
  };

  // ── import handlers ─────────────────────────────────────────────────────────
  const handleFileUpload = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const parsed = parseCSV(e.target.result);
      if (parsed.length === 0) {
        showToast("File tidak valid atau kosong", "danger");
        return;
      }
      setImportPreview(parsed);
      showToast(`${parsed.length} produk siap diimport — cek preview dulu`);
    };
    reader.readAsText(file);
  };

  const confirmImport = () => {
    if (!importPreview) return;
    if (importMode === "replace") {
      setInventory(importPreview);
    } else {
      // merge: update existing, add new
      setInventory(prev => {
        const map = {};
        prev.forEach(i => { map[i.sku] = i; });
        importPreview.forEach(i => {
          if (map[i.sku]) {
            map[i.sku] = { ...map[i.sku], nama: i.nama, harga: i.harga, kategori: i.kategori };
            if (i.stok > 0) map[i.sku].stok = i.stok;
          } else {
            map[i.sku] = i;
          }
        });
        return Object.values(map);
      });
    }
    const count = importPreview.length;
    const finalItems = importMode === "replace" ? importPreview : (() => {
      const map = {};
      inventory.forEach(i => { map[i.sku] = i; });
      importPreview.forEach(i => {
        if (map[i.sku]) { map[i.sku] = { ...map[i.sku], nama: i.nama, harga: i.harga, kategori: i.kategori }; if (i.stok > 0) map[i.sku].stok = i.stok; }
        else map[i.sku] = i;
      });
      return Object.values(map);
    })();
    // Sync to Supabase with proper error handling
    if (sbClient) {
      const rows = finalItems.map(i => ({
        sku: i.sku,
        nama: i.nama,
        harga: i.harga || 0,
        stok: i.stok || 0,
        minimum: i.minimum || 3,
        satuan: i.satuan || "pcs",
        kategori: i.kategori || "",
        discontinued: i.discontinued || false,
      }));
      sbClient.from('inventory').upsert(rows, { onConflict: 'sku' })
        .then(({ error }) => {
          if (error) {
            console.error('Import upsert error:', error);
            showToast(`⚠ Import lokal berhasil, tapi sync ke database gagal: ${error.message}. Coba re-import atau cek Supabase.`, 'warning');
          } else {
            showToast(`✓ ${count} produk berhasil diimport & tersimpan ke database!`);
            sbRefetchInventory();
          }
        })
        .catch(e => {
          console.error('Import sync error:', e);
          showToast(`⚠ Import lokal berhasil, tapi sync gagal: ${e.message}`, 'warning');
        });
    } else {
      showToast(`✓ ${count} produk berhasil diimport (lokal saja — database belum terhubung)`);
    }
    setImportPreview(null);
    setPage("stok");
  };

  // ── barcode print ────────────────────────────────────────────────────────────
  const printLabels = () => {
    const items = inventory.filter(i => selectedLabels[i.sku]);
    if (items.length === 0) { showToast("Pilih item dulu!", "danger"); return; }
    if (!window.JsBarcode) { showToast("Barcode library belum siap, coba lagi sebentar", "warning"); return; }

    // Generate barcode sebagai PNG data URL via canvas — selalu muncul di PDF
    const itemsWithBarcode = items.map(item => {
      const canvas = document.createElement("canvas");
      try {
        window.JsBarcode(canvas, item.sku, {
          format: "CODE128", width: 2, height: 50,
          displayValue: false, margin: 6, background: "#ffffff"
        });
      } catch(e) {}
      return { ...item, barcodeUrl: canvas.toDataURL("image/png") };
    });

    setPrintItems(itemsWithBarcode);
  };

  // ── AI ───────────────────────────────────────────────────────────────────────
  const sendAiMessage = async () => {
    if (!aiInput.trim() || aiLoading) return;
    const userMsg = aiInput.trim();
    setAiInput("");
    setAiMessages(prev => [...prev, { role: "user", content: userMsg }]);
    setAiLoading(true);

    const inventoryContext = JSON.stringify(inventory.slice(0, 50));
    const transactionContext = JSON.stringify(transactions.slice(0, 20));
    const pinjamanContext = JSON.stringify(pinjaman);

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `Kamu adalah AI assistant untuk sistem inventory Plai Sports Club. Jawab dalam Bahasa Indonesia yang santai dan helpful.

Data inventory saat ini: ${inventoryContext}

Riwayat transaksi terbaru: ${transactionContext}

Data peminjaman: ${pinjamanContext}

Kamu bisa membantu untuk:
- Cek stok barang tertentu
- Info barang yang stoknya rendah
- Analisis barang paling laku
- Ringkasan laporan
- Saran restock
- Info peminjaman aktif

Jawab dengan singkat, padat, dan informatif. Gunakan emoji secukupnya.`,
          messages: [
            ...aiMessages.map(m => ({ role: m.role, content: m.content })),
            { role: "user", content: userMsg }
          ]
        })

  const filterByPeriod = (items, period) => {
    const now = new Date();
    const today = now.toISOString().split("T")[0];
    if (period === "semua") return items;
    if (period === "hari") return items.filter(i => i.date === today);
    if (period === "minggu") {
      const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
      return items.filter(i => new Date(i.date) >= weekAgo);
    }
    if (period === "bulan") {
      const monthStart = today.substring(0, 7);
      return items.filter(i => i.date && i.date.substring(0, 7) === monthStart);
    }
    return items;
  };

      const weekStr = startOfWeek.toISOString().split("T")[0];
      const monthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;

      const filteredTx = transactions.filter(t => {
        if (laporanPeriod === "semua") return true;
        if (!t.tanggal) return false;
        if (laporanPeriod === "hari") return t.tanggal === todayStr;
        if (laporanPeriod === "minggu") return t.tanggal >= weekStr;
        if (laporanPeriod === "bulan") return t.tanggal.startsWith(monthStr);
        return true;
      });

      const totalMasuk = filteredTx.filter(t => t.tipe === "masuk").reduce((a, t) => a + t.jumlah, 0);
      const totalKeluar = filteredTx.filter(t => t.tipe === "keluar").reduce((a, t) => a + t.jumlah, 0);
      const totalRusak = filteredTx.filter(t => t.tipe === "rusak").reduce((a, t) => a + t.jumlah, 0);
      const totalRevenueBruto = filteredTx.filter(t => t.tipe === "keluar").reduce((a, t) => a + (t.harga || 0) * t.jumlah, 0);
      const totalDiskon = filteredTx.filter(t => t.tipe === "keluar").reduce((a, t) => a + (t.diskon || 0), 0);
      const totalRevenue = totalRevenueBruto - totalDiskon;
      const chFiltered = { terjual: filteredTx.filter(t => t.tipe === "keluar" && t.channel === "terjual").reduce((a, t) => a + t.jumlah, 0), kol: filteredTx.filter(t => t.tipe === "keluar" && t.channel === "kol").reduce((a, t) => a + t.jumlah, 0), event: filteredTx.filter(t => t.tipe === "keluar" && t.channel === "event").reduce((a, t) => a + t.jumlah, 0) };
      const shippingExpense = filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "plai").reduce((a, t) => a + (t.shippingCost || 0), 0);
      const shippingExpenseList = filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "plai");
      const pelangganShipRevenue = filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "pelanggan").reduce((a, t) => a + (t.pelangganShipCost || 0), 0);
      const marketplaceCount = filteredTx.filter(t => t.tipe === "keluar" && t.marketplace).length;

      const handleEditSave = (updated) => {
        setTransactions(prev => prev.map(t => t.id === updated.id ? { ...t, ...updated } : t));
        setEditingTx(null);
        showToast("✓ Transaksi berhasil diupdate!");
        // Sync to Supabase
        const { id, ...rest } = updated;
        sbUpdateTx(updated.id, rest);
        // Recalculate inventory if jumlah changed
        const original = transactions.find(t => t.id === updated.id);
        if (original && original.jumlah !== updated.jumlah) {
          const diff = updated.jumlah - original.jumlah;
          if (original.tipe === "keluar" || original.tipe === "rusak") {
            // more keluar = less stock
            const item = inventory.find(i => i.sku === original.sku);
            if (item) {
              const newStok = Math.max(0, item.stok - diff);
              setInventory(prev => prev.map(i => i.sku === original.sku ? { ...i, stok: newStok } : i));
              sbUpsertInventory(original.sku, newStok);
            }
          } else if (original.tipe === "masuk") {
            const item = inventory.find(i => i.sku === original.sku);
            if (item) {
              const newStok = Math.max(0, item.stok + diff);
              setInventory(prev => prev.map(i => i.sku === original.sku ? { ...i, stok: newStok } : i));
              sbUpsertInventory(original.sku, newStok);
            }
          }
        }
      };

      // Rekap data for each period
      const txToday = transactions.filter(t => t.tanggal === todayStr);
      const tx7Days = transactions.filter(t => {
        if (!t.tanggal) return false;
        const d = new Date(t.tanggal);
        const diff = (now - d) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff < 7;
      });
      const txMonth = transactions.filter(t => t.tanggal && t.tanggal.startsWith(monthStr));

      const rekapCalc = (arr) => ({
        total: arr.length,
        masuk: arr.filter(t => t.tipe === "masuk").reduce((a, t) => a + t.jumlah, 0),
        keluar: arr.filter(t => t.tipe === "keluar").reduce((a, t) => a + t.jumlah, 0),
        rusak: arr.filter(t => t.tipe === "rusak").reduce((a, t) => a + t.jumlah, 0),
        revenue: arr.filter(t => t.tipe === "keluar").reduce((a, t) => a + ((t.harga || 0) * t.jumlah - (t.diskon || 0)), 0),
        shipping: arr.filter(t => t.tipe === "keluar" && t.shipping === "plai").reduce((a, t) => a + (t.shippingCost || 0), 0),
        pelangganShip: arr.filter(t => t.tipe === "keluar" && t.shipping === "pelanggan").reduce((a, t) => a + (t.pelangganShipCost || 0), 0),
      });
      const rekapHari = rekapCalc(txToday);
      const rekap7 = rekapCalc(tx7Days);
      const rekapBulan = rekapCalc(txMonth);

      // Excel export
      const exportExcel = () => {
        if (!window.XLSX) { showToast("Library Excel belum siap, coba refresh", "danger"); return; }
        const fmtTgl = (iso) => {
          if (!iso) return "-";
          const [y, m, d] = iso.split("-");
          return `${d}/${m}/${y.slice(2)}`;
        };
        const rows = filteredTx.map(t => ({
          Tanggal: fmtTgl(t.tanggal),
          "No. Invoice": t.invoiceId || "-",
          SKU: t.sku,
          Nama: t.nama,
          Tipe: t.tipe,
          Jumlah: t.jumlah,
          Harga: t.harga || 0,
          "Total Harga": (t.harga || 0) * t.jumlah,
          Diskon: t.diskon || 0,
          "Harga Setelah Diskon": (t.harga || 0) * t.jumlah - (t.diskon || 0),
          Channel: t.channel || "-",
          Shipping: t.shipping === "plai" ? "Plai" : t.shipping === "pelanggan" ? (t.marketplace ? "Pelanggan (Marketplace)" : "Pelanggan") : "Pickup",
          "Biaya Shipping (Plai)": t.shippingCost || 0,
          "Biaya Shipping (Pelanggan)": t.pelangganShipCost || 0,
          Marketplace: t.marketplace ? "Ya" : "",
          Staff: t.staff || "-",
          Catatan: t.catatan || "",
        }));
        const ws = window.XLSX.utils.json_to_sheet(rows);
        // Auto column widths
        const colWidths = Object.keys(rows[0] || {}).map(k => ({ wch: Math.max(k.length + 2, ...rows.map(r => String(r[k] || "").length).slice(0, 50)) + 2 }));
        ws["!cols"] = colWidths;
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "Laporan Transaksi");
        // Summary sheet
        const summary = [
          { Keterangan: "Periode", Nilai: laporanPeriod === "hari" ? `Hari Ini (${todayStr})` : laporanPeriod === "minggu" ? `Minggu Ini (${weekStr} s/d ${todayStr})` : laporanPeriod === "bulan" ? `Bulan ${monthStr}` : "Semua Waktu" },
          { Keterangan: "Total Transaksi", Nilai: filteredTx.length },
          { Keterangan: "Total Masuk (unit)", Nilai: totalMasuk },
          { Keterangan: "Total Keluar (unit)", Nilai: totalKeluar },
          { Keterangan: "Rusak/Hilang (unit)", Nilai: totalRusak },
          { Keterangan: "Revenue Bruto (Sebelum Diskon)", Nilai: totalRevenueBruto },
          { Keterangan: "Total Diskon", Nilai: totalDiskon },
          { Keterangan: "Revenue (Setelah Diskon)", Nilai: totalRevenue },
          { Keterangan: "Shipping Expense (Plai)", Nilai: shippingExpense },
          { Keterangan: "Shipping Income (Pelanggan)", Nilai: pelangganShipRevenue },
          { Keterangan: "Nett Revenue", Nilai: totalRevenue - shippingExpense },
          { Keterangan: "", Nilai: "" },
          { Keterangan: "Channel: Terjual", Nilai: chFiltered.terjual },
          { Keterangan: "Channel: KOL", Nilai: chFiltered.kol },
          { Keterangan: "Channel: Event", Nilai: chFiltered.event },
          { Keterangan: "Dari Marketplace", Nilai: marketplaceCount },
        ];
        const ws2 = window.XLSX.utils.json_to_sheet(summary);
        ws2["!cols"] = [{ wch: 25 }, { wch: 20 }];
        window.XLSX.utils.book_append_sheet(wb, ws2, "Rekap");
        const periodLabel = laporanPeriod === "hari" ? todayStr : laporanPeriod === "minggu" ? "minggu" : laporanPeriod === "bulan" ? monthStr : "semua";
        window.XLSX.writeFile(wb, `Laporan_Plai_${periodLabel}.xlsx`);
        showToast("✓ File Excel berhasil didownload!");
      };

      return (
        <div>
          {/* Rekap Summary Cards */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.cream, marginBottom: 10 }}>Rekap Cepat</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 10 }}>
              {[
                ["Hari Ini", rekapHari, todayStr],
                ["7 Hari Terakhir", rekap7, `${new Date(now - 6*86400000).toISOString().split("T")[0]} — ${todayStr}`],
                ["Bulan Ini", rekapBulan, monthStr],
              ].map(([label, r, period]) => (
                <div key={label} style={{ background: COLORS.brownLight, borderRadius: 12, padding: 14, border: `1px solid ${COLORS.brownLight}` }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.aqua, marginBottom: 8 }}>{label}</div>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 8 }}>{period}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    <div><span style={{ fontSize: 10, color: COLORS.textMuted }}>Masuk</span><div style={{ fontWeight: 700, color: COLORS.success, fontSize: 15 }}>+{r.masuk}</div></div>
                    <div><span style={{ fontSize: 10, color: COLORS.textMuted }}>Keluar</span><div style={{ fontWeight: 700, color: COLORS.danger, fontSize: 15 }}>-{r.keluar}</div></div>
                    <div><span style={{ fontSize: 10, color: COLORS.textMuted }}>Rusak</span><div style={{ fontWeight: 700, color: COLORS.warning, fontSize: 15 }}>{r.rusak}</div></div>
                    <div><span style={{ fontSize: 10, color: COLORS.textMuted }}>Revenue</span><div style={{ fontWeight: 700, color: COLORS.aqua, fontSize: 12 }}>Rp {r.revenue.toLocaleString("id-ID")}</div></div>
                  </div>
                  {r.shipping > 0 && <div style={{ fontSize: 10, color: COLORS.danger, marginTop: 6 }}>Shipping: Rp {r.shipping.toLocaleString("id-ID")}</div>}
                  <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 4 }}>{r.total} transaksi</div>
                </div>
              ))}
            </div>
          </div>

          {/* Period filter tabs + Export button */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
            {[["hari", "Hari Ini"], ["minggu", "Minggu Ini"], ["bulan", "Bulan Ini"], ["semua", "Semua"]].map(([val, lbl]) => (
              <button key={val} onClick={() => setLaporanPeriod(val)}
                style={{ ...s.btn(laporanPeriod === val ? "primary" : "secondary"), fontSize: 12, padding: "8px 16px" }}>
                {lbl}
              </button>
            ))}
            <span style={{ fontSize: 12, color: COLORS.textMuted, marginLeft: 8, flex: 1 }}>
              {laporanPeriod === "hari" ? todayStr : laporanPeriod === "minggu" ? `${weekStr} s/d hari ini` : laporanPeriod === "bulan" ? monthStr : "Semua waktu"} · {filteredTx.length} transaksi
            </span>
            <button onClick={exportExcel} disabled={filteredTx.length === 0}
              style={{ background: filteredTx.length > 0 ? "#217346" : COLORS.brownLight, border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 700, color: filteredTx.length > 0 ? "#fff" : COLORS.textMuted, cursor: filteredTx.length > 0 ? "pointer" : "default", whiteSpace: "nowrap", display: "flex", gap: 6, alignItems: "center" }}>
              📊 Export Excel
            </button>
          </div>

          <div style={s.grid4}>
            {[["Total Masuk", totalMasuk, COLORS.success, "unit restock"], ["Total Keluar", totalKeluar, COLORS.danger, "unit keluar"], ["Rusak/Hilang", totalRusak, COLORS.warning, "unit"], ["Revenue", `Rp ${totalRevenue.toLocaleString("id-ID")}`, COLORS.aqua, `${filteredTx.filter(t=>t.tipe==="keluar").length} transaksi`]].map(([lbl, val, color, sub]) => (
              <div key={lbl} style={s.card}>
                <div style={s.cardTitle}>{lbl}</div>
                <div style={{ fontSize: lbl === "Revenue" ? 18 : 32, fontWeight: 800, color, marginBottom: 4 }}>{val}</div>
                <div style={{ color: COLORS.textMuted, fontSize: 12 }}>{sub}</div>
                {lbl === "Revenue" && totalDiskon > 0 && (
                  <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>Diskon: −Rp {totalDiskon.toLocaleString("id-ID")}</div>
                )}
              </div>
            ))}
          </div>
          <div style={{ ...s.grid2, marginTop: 16 }}>
            <div style={s.card}>
              <div style={s.cardTitle}>Breakdown Channel Keluar</div>
              {[["🛒 Terjual", chFiltered.terjual], ["📱 Marketing KOL", chFiltered.kol], ["🎪 Stock Event", chFiltered.event]].map(([lbl, val]) => (
                <div key={lbl} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.brownLight}20`, fontSize: 13 }}>
                  <span>{lbl}</span><span style={{ fontWeight: 700, color: COLORS.aqua }}>{val} unit ({totalKeluar > 0 ? Math.round(val / totalKeluar * 100) : 0}%)</span>
                </div>
              ))}
              <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${COLORS.brownLight}` }}>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8, letterSpacing: 1, textTransform: "uppercase" }}>Shipping</div>
                {[
                  ["📦 Ditanggung Pelanggan", filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "pelanggan").length, COLORS.success, pelangganShipRevenue > 0 ? `order · Rp ${pelangganShipRevenue.toLocaleString("id-ID")}` : "order"],
                  ["🏪 Dari Marketplace", marketplaceCount, COLORS.aqua, "order"],
                  ["💸 Ditanggung Plai", shippingExpenseList.length, COLORS.danger, `order · Rp ${shippingExpense.toLocaleString("id-ID")}`],
                  ["🏃 Pickup / No Ship", filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "none").length, COLORS.textMuted, "order"],
                ].map(([lbl, val, color, sub]) => (
                  <div key={lbl} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 13 }}>
                    <span>{lbl}</span>
                    <span style={{ fontWeight: 600, color }}>{val} {sub}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={s.card}>
              <div style={s.cardTitle}>💸 Riwayat Shipping Expense Plai</div>
              {shippingExpenseList.length === 0
                ? <div style={{ color: COLORS.textMuted, fontSize: 13 }}>Belum ada shipping expense</div>
                : <div style={{ maxHeight: 180, overflowY: "auto" }}>
                  <table style={s.table}>
                    <thead><tr>{["Tgl", "Item", "Channel", "Biaya"].map(h => <th key={h} style={s.th}>{h}</th>)}</tr></thead>
                    <tbody>
                      {shippingExpenseList.map(t => (
                        <tr key={t.id}>
                          <td style={s.td}>{t.tanggal}</td>
                          <td style={s.td}>{t.nama}</td>
                          <td style={s.td}><span style={{ ...s.badge(t.channel === "terjual" ? COLORS.aqua : t.channel === "kol" ? COLORS.warning : COLORS.success), color: COLORS.brownDark, fontSize: 10 }}>{t.channel}</span></td>
                          <td style={{ ...s.td, color: COLORS.danger, fontWeight: 600 }}>Rp {(t.shippingCost || 0).toLocaleString("id-ID")}</td>
                        </tr>
                      ))}
                      <tr>
                        <td colSpan={3} style={{ ...s.td, fontWeight: 700, color: COLORS.textMuted, fontSize: 12 }}>TOTAL</td>
                        <td style={{ ...s.td, fontWeight: 800, color: COLORS.danger }}>Rp {shippingExpense.toLocaleString("id-ID")}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              }
            </div>
          </div>

          {/* Full Transaction History with Edit */}
          <div style={{ ...s.card, marginTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={s.cardTitle}>Semua Riwayat Transaksi</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>{filteredTx.length} transaksi</div>
            </div>
            <div style={{ maxHeight: 400, overflowY: "auto" }}>
              <table style={s.table}>
                <thead><tr>{["Tgl", "Item", "Tipe", "Jml", "Harga", "Diskon", "Channel", "Shipping", "Staff", "Invoice", "Aksi"].map(h => <th key={h} style={s.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {filteredTx.map(t => (
                    <tr key={t.id}>
                      <td style={s.td}>{t.tanggal}</td>
                      <td style={{ ...s.td, maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.nama}</td>
                      <td style={s.td}><span style={{ ...s.badge(t.tipe === "masuk" ? COLORS.success : t.tipe === "rusak" ? COLORS.warning : COLORS.danger), color: COLORS.brownDark, fontSize: 10 }}>{t.tipe}</span></td>
                      <td style={{ ...s.td, fontWeight: 600, color: t.tipe === "masuk" ? COLORS.success : COLORS.danger }}>{t.tipe === "masuk" ? "+" : "-"}{t.jumlah}</td>
                      <td style={{ ...s.td, fontSize: 11 }}>{t.harga ? `Rp ${t.harga.toLocaleString("id-ID")}` : "-"}</td>
                      <td style={{ ...s.td, fontSize: 11, color: t.diskon ? COLORS.warning : COLORS.textMuted, fontWeight: t.diskon ? 600 : 400 }}>{t.diskon ? `−Rp ${t.diskon.toLocaleString("id-ID")}` : "-"}</td>
                      <td style={s.td}>{t.channel && t.channel !== "-" ? <span style={{ ...s.badge(t.channel === "terjual" ? COLORS.aqua : t.channel === "kol" ? COLORS.warning : COLORS.success), color: COLORS.brownDark, fontSize: 10 }}>{t.channel}</span> : "-"}</td>
                      <td style={s.td}>
                        {t.shipping === "plai" ? <span style={{ color: COLORS.danger, fontSize: 11 }}>💸 Rp {(t.shippingCost||0).toLocaleString("id-ID")}</span>
                          : t.shipping === "pelanggan" ? <span style={{ fontSize: 11, color: COLORS.textMuted }}>📦{t.marketplace ? " MP" : ""}{t.pelangganShipCost > 0 ? ` ${t.pelangganShipCost.toLocaleString("id-ID")}` : ""}</span>
                          : <span style={{ fontSize: 11, color: COLORS.textMuted }}>-</span>}
                      </td>
                      <td style={{ ...s.td, fontSize: 11 }}>{t.staff}</td>
                      <td style={{ ...s.td, fontSize: 10, color: t.invoiceId ? COLORS.aqua : COLORS.textMuted, maxWidth: 80, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.invoiceId ? t.invoiceId.replace("INV-", "#") : "-"}</td>
                      <td style={{ ...s.td, whiteSpace: "nowrap" }}>
                        <button onClick={() => setEditingTx({...t})} style={{ background: COLORS.aqua+"30", color: COLORS.aqua, border: `1px solid ${COLORS.aqua}50`, borderRadius: 5, padding: "3px 8px", fontSize: 11, cursor: "pointer", fontWeight: 600, marginRight: 4 }}>Edit</button>
                        <button onClick={() => setDeleteTxConfirm(t)} style={{ background: COLORS.danger+"20", color: COLORS.danger, border: `1px solid ${COLORS.danger}40`, borderRadius: 5, padding: "3px 8px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>Hapus</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Delete Transaction Confirmation Modal */}
          {deleteTxConfirm && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setDeleteTxConfirm(null)}>
              <div style={{ background: COLORS.brown, borderRadius: 14, padding: 24, width: 400, boxShadow: "0 8px 40px rgba(0,0,0,0.5)" }} onClick={e => e.stopPropagation()}>
                <div style={{ fontWeight: 700, color: COLORS.danger, fontSize: 16, marginBottom: 12 }}>Hapus Transaksi?</div>
                <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: 14, marginBottom: 16 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.cream, marginBottom: 4 }}>{deleteTxConfirm.nama}</div>
                  <div style={{ fontSize: 12, color: COLORS.textMuted }}>
                    {deleteTxConfirm.tanggal} · {deleteTxConfirm.tipe === "masuk" ? "+" : "-"}{deleteTxConfirm.jumlah} unit · Staff: {deleteTxConfirm.staff}
                  </div>
                  {deleteTxConfirm.tipe === "keluar" && deleteTxConfirm.shipping === "plai" && deleteTxConfirm.shippingCost > 0 && (
                    <div style={{ fontSize: 12, color: COLORS.danger, marginTop: 4 }}>
                      Shipping expense Rp {deleteTxConfirm.shippingCost.toLocaleString("id-ID")} juga akan dihapus
                    </div>
                  )}
                </div>
                <div style={{ fontSize: 13, color: COLORS.cream, marginBottom: 16 }}>
                  {deleteTxConfirm.tipe === "keluar" || deleteTxConfirm.tipe === "rusak"
                    ? `Stok ${deleteTxConfirm.nama} akan dikembalikan +${deleteTxConfirm.jumlah} unit`
                    : `Stok ${deleteTxConfirm.nama} akan dikurangi -${deleteTxConfirm.jumlah} unit`
                  }
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => handleDeleteTx(deleteTxConfirm)} style={{ ...s.btn("danger"), flex: 1 }}>Ya, Hapus</button>
                  <button onClick={() => setDeleteTxConfirm(null)} style={{ ...s.btn("secondary"), flex: 1 }}>Batal</button>
                </div>
              </div>
            </div>
          )}

          {/* Edit Transaction Modal */}
          {editingTx && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setEditingTx(null)}>
              <div style={{ background: COLORS.brown, borderRadius: 14, padding: 24, width: 440, maxHeight: "80vh", overflowY: "auto", boxShadow: "0 8px 40px rgba(0,0,0,0.5)" }} onClick={e => e.stopPropagation()}>
                <div style={{ fontWeight: 700, color: COLORS.aqua, fontSize: 16, marginBottom: 16 }}>Edit Transaksi</div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 16 }}>
                  {editingTx.nama} — {editingTx.sku}
                </div>

                <div style={s.formGroup}>
                  <label style={s.label}>Tanggal</label>
                  <input style={s.input} type="date" value={editingTx.tanggal} onChange={e => setEditingTx(p => ({...p, tanggal: e.target.value}))} />
                </div>

                <div style={s.grid2}>
                  <div style={s.formGroup}>
                    <label style={s.label}>Jumlah</label>
                    <input style={s.input} type="number" min="1" value={editingTx.jumlah} onChange={e => setEditingTx(p => ({...p, jumlah: parseInt(e.target.value) || 0}))} />
                  </div>
                  <div style={s.formGroup}>
                    <label style={s.label}>Harga Satuan (Rp)</label>
