  <script type="text/babel">
const { useState, useEffect, useRef } = React;


const COLORS = {

  brownLight: "#5C3D2E",
  brownDark: "#2A1D14",
  aqua: "#A8CFD0",
  aquaLight: "#C5E3E4",
  aquaDark: "#7AB0B2",
  cream: "#F5EFE8",
  creamDark: "#E8DDD2",
  white: "#FFFFFF",
  danger: "#E07070",
  success: "#7EC8A0",
  warning: "#E0B870",

const INITIAL_INVENTORY = [];

const INITIAL_TRANSACTIONS = [

  { id: 2, tanggal: "2025-03-10", sku: "PLI-BAD-002", nama: "Shuttlecock Feather", tipe: "keluar", jumlah: 5, harga: 35000, channel: "event", shipping: "none", shippingCost: 0, catatan: "Event Badminton Cup", staff: "Bella" },

  { id: 4, tanggal: "2025-03-09", sku: "PLI-FUT-002", nama: "Bola Futsal Ukuran 5", tipe: "keluar", jumlah: 3, harga: 175000, channel: "wa", shipping: "pelanggan", shippingCost: 0, catatan: "", staff: "Gabby" },
  { id: 5, tanggal: "2025-03-08", sku: "PLI-RTL-001", nama: "Kaos Plai Sports", tipe: "masuk", jumlah: 10, harga: 120000, channel: "-", shipping: "none", shippingCost: 0, catatan: "Restock dari supplier", staff: "Sinta" },
  { id: 6, tanggal: "2025-03-08", sku: "PLI-TEN-001", nama: "Bola Tenis", tipe: "keluar", jumlah: 6, harga: 25000, channel: "event", shipping: "plai", shippingCost: 18000, catatan: "", staff: "Bella" },
];

const INITIAL_PINJAM = [
  { id: 1, tanggal: "2025-03-10", sku: "PLI-BAD-001", nama: "Raket Badminton Yonex", jumlah: 2, peminjam: "Andi", kembali: null, staff: "Sinta" },
  { id: 2, tanggal: "2025-03-09", sku: "PLI-TEN-002", nama: "Raket Tenis Wilson", jumlah: 1, peminjam: "Mira", kembali: "2025-03-11", staff: "Bella" },
];

const STAFF_LIST = ["Sinta", "Bella", "Gabby", "Others"];

const navItems = [
  { id: "dashboard", label: "Dashboard", icon: "⊞" },
  { id: "scan", label: "Quick Scan", icon: "⚡" },
  { id: "stok", label: "Cek Stok", icon: "◫" },
  { id: "masuk", label: "Barang Masuk", icon: "↓" },
  { id: "produksi", label: "Produksi", icon: "🧵" },
  { id: "keluar", label: "Barang Terjual", icon: "🛍" },
  { id: "marketing", label: "KOL & Pinjam", icon: "📱" },
  { id: "rusak", label: "Rusak / Hilang", icon: "⚠" },
  { id: "pinjam", label: "Peminjaman", icon: "⇄" },
  { id: "laporan", label: "Laporan", icon: "≡" },
  { id: "label", label: "Cetak Label", icon: "▣" },
  { id: "data", label: "Import Data", icon: "⬆" },
  { id: "kasir", label: "Kasir", icon: "🛒" },
  { id: "keuangan", label: "Keuangan", icon: "💰" },
  { id: "ai", label: "Tanya AI", icon: "✦" },
  { id: "settings", label: "Pengaturan", icon: "⚙" },
];

// ── helpers ──────────────────────────────────────────────────────────────────
const extractKategori = (name = "") => {
  const n = name.toLowerCase();
  if (n.includes("skirt")) return "Skirt";
  if (n.includes("shorts") || n.includes("boxer")) return "Shorts";
  if (n.includes("t-shirt")) return "T-Shirt";
  if (n.includes("longsleeve") || n.includes("long sleeve")) return "Longsleeve";
  if (n.includes("tank") || n.includes("backless")) return "Tank";
  if (n.includes("shirt")) return "Shirt";
  if (n.includes("cap")) return "Aksesoris";
  if (n.includes("bag") || n.includes("tas")) return "Tas";
  return "Apparel";
};

const parseCSV = (text) => {
  const lines = text.trim().split("\n");
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    // Handle quoted fields
    const cols = [];
    let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const sku = cols[0]?.trim();
    const nama = cols[1]?.trim();
    if (!sku || !nama) continue;
    results.push({
      sku,
      nama,
      harga: parseInt(cols[2]) || 0,
      stok: parseInt(cols[4]) || 0,
      minimum: 3,
      satuan: "pcs",
      kategori: extractKategori(nama),
    });
  }
  return results;
};

// ── localStorage helpers ────────────────────────────────────────────────────
const load = (key, fallback) => {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
};
const save = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
};

// ── parseRp: defined at module level so ItemForm (outside PlaiInventory) can use it ──
// parseRp: handle Indonesian number format — 10.000 → 10000, 1.500.000 → 1500000
const parseRp = (v) => parseInt(String(v || "").replace(/\./g, "").replace(/,/g, "")) || 0;

// ── CHANNEL constants defined at module level so ItemForm can access them ──
const CHANNEL_TAGS = {
  wa:          "WA; Online D2C",
  dm:          "DM; Online D2C",
  web:         "Shopify; Online D2C",
  event:       "Event; Offline D2C",
  shopee:      "Shopee; Online B2C",
  tokopedia:   "Tokped/TikTok; Online B2C",
  tiktok:      "TikTok Shop; Online B2C",
  consignment: "Consignment",
  b2b:         "B2B",
};

// ── ItemForm defined OUTSIDE PlaiInventory so React keeps its identity stable ──
// This prevents state (selected SKU, form fields) from resetting on parent re-render
const ItemForm = ({ tipe, onSubmit, inventory, showToast, styles, getStokColor, onOpenCamera, barcodeMap, onBarcodeNotFound }) => {
  const todayStr = new Date().toISOString().split("T")[0];
  const [form, setForm] = useState({ sku: "", jumlah: 1, channel: "wa", shipping: "none", shippingCost: "", pelangganShipCost: "", marketplace: false, catatan: "", staff: STAFF_LIST[0], peminjam: "", tanggal: todayStr, mktHarga: "", mktOrderNo: "", mktOngkir: "", diskon: "", customer: "", mktFee: "10" });
  const isMkt = (ch) => ["shopee","tokopedia","tiktok"].includes(ch);
  const [scanInput, setScanInput] = useState("");
  const [showDropdown, setShowDropdown] = useState(false);
  const selected = inventory.find(i => i.sku === form.sku);
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const s = styles;

  const handleScan = (val) => {
    const q = val.trim().toLowerCase();
    if (!q) return;
    // 1. Check barcode map first
    const mappedSku = barcodeMap[q] || barcodeMap[val.trim()];
    if (mappedSku) {
      const mapped = inventory.find(i => i.sku === mappedSku && !i.discontinued);
      if (mapped) { set("sku", mapped.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${mapped.nama}`); return; }
    }
    // 2. Exact SKU
    const exact = inventory.find(i => i.sku.toLowerCase() === q && !i.discontinued);
    if (exact) { set("sku", exact.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${exact.nama}`); return; }
    // 3. Partial SKU
    const partialSku = inventory.find(i => i.sku.toLowerCase().includes(q) && !i.discontinued);
    if (partialSku) { set("sku", partialSku.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${partialSku.nama}`); return; }
    // 4. Partial name
    const partialName = inventory.find(i => i.nama.toLowerCase().includes(q) && !i.discontinued);
    if (partialName) { set("sku", partialName.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${partialName.nama}`); return; }
    // 5. Not found — trigger barcode registration if numeric
    if (/^\d{6,}$/.test(val.trim())) {
      if (onBarcodeNotFound) onBarcodeNotFound(val.trim());
      showToast(`Barcode "${val.trim()}" belum terdaftar`, "warning");
    } else {
      showToast(`"${val.trim()}" tidak ditemukan`, "danger");
    }
  };

  // Auto-populate mktHarga when item selected + channel is marketplace
  useEffect(() => {
    if (tipe === "keluar" && isMkt(form.channel) && selected) {
      const mktDefault = selected.harga_marketplace > 0 ? selected.harga_marketplace : (selected.harga || 0);
      if (!form.mktHarga || parseRp(form.mktHarga) === 0) {
        set("mktHarga", String(mktDefault));
      }
    }
  }, [form.sku, form.channel]);

  // Register global callback for camera scans
  useEffect(() => {
    window.__plaiFormScanCallback = (sku) => {
      set("sku", sku);
      setScanInput("");
      setShowDropdown(false);
    };
    return () => { delete window.__plaiFormScanCallback; };
  }, []);

  const filteredItems = inventory.filter(i => {
    if (i.discontinued) return false;
    if (!scanInput.trim()) return true;
    const q = scanInput.trim().toLowerCase();
    return i.sku.toLowerCase().includes(q) || i.nama.toLowerCase().includes(q);
  });

  const submit = () => {
    if (!form.sku || form.jumlah < 1) return showToast("Pilih barang dan jumlah dulu!", "danger");
    if (tipe !== "masuk" && selected && form.jumlah > selected.stok) return showToast("Stok tidak cukup!", "danger");
    if (tipe === "keluar" && form.shipping === "plai" && (!form.shippingCost || form.shippingCost <= 0)) return showToast("Isi biaya shipping Plai dulu!", "danger");
    if (tipe === "keluar" && isMkt(form.channel) && (!form.mktHarga || parseRp(form.mktHarga) <= 0)) return showToast("Isi harga jual marketplace dulu!", "danger");
    const pelangganShipCostVal = form.shipping === "pelanggan" && !form.marketplace ? parseRp(form.pelangganShipCost) || 0 : 0;
    onSubmit({ sku: form.sku, jumlah: parseInt(form.jumlah), channel: form.channel, shipping: form.shipping, shippingCost: form.shipping === "plai" ? parseRp(form.shippingCost) : 0, pelangganShipCost: pelangganShipCostVal, marketplace: form.marketplace || false, catatan: (form.marketplace ? (form.catatan ? form.catatan + " — Marketplace" : "Marketplace") : form.catatan), staff: form.staff, peminjam: form.peminjam || "", nama: selected?.nama || "", tanggal: form.tanggal || todayStr, mktHarga: isMkt(form.channel) ? parseRp(form.mktHarga) || 0 : 0, mktOrderNo: form.mktOrderNo || "", mktOngkir: isMkt(form.channel) ? parseRp(form.mktOngkir) || 0 : 0, diskon: parseRp(form.diskon) || 0, customer: form.customer || "" });
    setForm({ sku: "", jumlah: 1, channel: "wa", shipping: "none", shippingCost: "", pelangganShipCost: "", marketplace: false, catatan: "", staff: STAFF_LIST[0], peminjam: "", tanggal: new Date().toISOString().split("T")[0], mktHarga: "", mktOrderNo: "", mktOngkir: "", diskon: "", customer: "", mktFee: "10" });
    setScanInput("");
  };

  return (
    <div style={s.card}>
      <div style={{ position: "relative", marginBottom: 16 }}>
        <div style={{ background: COLORS.brownDark, border: `1px dashed ${COLORS.aquaDark}`, borderRadius: 8, padding: "10px 14px", display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 16 }}>📷</span>
          <input
            style={{ ...s.input, flex: 1, border: "none", background: "transparent", padding: "0" }}
            placeholder="Scan barcode / ketik SKU / nama produk..."
            value={scanInput}
            onChange={e => { setScanInput(e.target.value); setShowDropdown(true); }}
            onFocus={() => setShowDropdown(true)}
            onBlur={() => setTimeout(() => setShowDropdown(false), 400)}
            onKeyDown={e => { if (e.key === "Enter") { handleScan(scanInput); setShowDropdown(false); } if (e.key === "Escape") setShowDropdown(false); }}
          />
          <button style={{ ...s.btn("primary"), padding: "6px 12px", fontSize: 11 }} onClick={() => { handleScan(scanInput); setShowDropdown(false); }}>Cari</button>
          <button onClick={onOpenCamera}
            style={{ background: COLORS.warning, border: "none", borderRadius: 6, padding: "6px 10px", fontSize: 11, cursor: "pointer", fontWeight: 700, color: COLORS.brownDark }}>
            📸
          </button>
        </div>

        {showDropdown && !selected && filteredItems.length > 0 && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: COLORS.brownDark, border: `1px solid ${COLORS.brownLight}`, borderRadius: "0 0 8px 8px", maxHeight: 260, overflowY: "auto", zIndex: 100, boxShadow: "0 8px 24px rgba(0,0,0,0.4)" }}>
            {!scanInput.trim() && <div style={{ padding: "6px 14px", fontSize: 11, color: COLORS.textMuted, borderBottom: `1px solid ${COLORS.brownLight}30` }}>Ketik untuk filter — {filteredItems.length} produk</div>}
            {filteredItems.slice(0, 30).map(item => {
              const selectItem = () => { set("sku", item.sku); setScanInput(""); setShowDropdown(false); showToast(`✓ ${item.nama}`); };
              return (
              <div key={item.sku}
                style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${COLORS.brownLight}30`, display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, userSelect: "none", WebkitTapHighlightColor: "transparent" }}
                onMouseDown={e => { e.preventDefault(); e.stopPropagation(); }}
                onTouchStart={e => { e.stopPropagation(); }}
                onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); selectItem(); }}
                onClick={e => { e.preventDefault(); e.stopPropagation(); selectItem(); }}>
                <div style={{ flex: 1, minWidth: 0, pointerEvents: "none" }}>
                  <div style={{ color: COLORS.cream, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.nama}</div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "monospace" }}>{item.sku}</div>
                </div>
                <div style={{ color: getStokColor(item), fontWeight: 700, fontSize: 14, marginLeft: 8, pointerEvents: "none" }}>{item.stok}</div>
              </div>
              );
            })}
            {filteredItems.length > 30 && <div style={{ padding: "8px 14px", fontSize: 11, color: COLORS.textMuted, textAlign: "center" }}>... dan {filteredItems.length - 30} lainnya — ketik untuk filter</div>}
          </div>
        )}
        {showDropdown && scanInput.trim() && filteredItems.length === 0 && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: COLORS.brownDark, border: `1px solid ${COLORS.brownLight}`, borderRadius: "0 0 8px 8px", padding: "12px 14px", zIndex: 100, fontSize: 13, color: COLORS.textMuted }}>
            Tidak ditemukan "{scanInput.trim()}"
          </div>
        )}
      </div>

      {selected && (
        <div style={{ background: COLORS.aqua+"15", border: `1px solid ${COLORS.aqua}40`, borderRadius: 8, padding: "10px 14px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.cream }}>{selected.nama}</div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "monospace" }}>{selected.sku} · Rp {selected.harga?.toLocaleString("id-ID") || 0}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: getStokColor(selected) }}>{selected.stok}</div>
              <div style={{ fontSize: 10, color: COLORS.textMuted }}>stok</div>
            </div>
            <button onClick={() => { set("sku", ""); setScanInput(""); }} style={{ background: "transparent", border: `1px solid ${COLORS.brownLight}`, borderRadius: 6, color: COLORS.textMuted, padding: "4px 8px", fontSize: 11, cursor: "pointer" }}>✕ Ganti</button>
          </div>
        </div>
      )}
      <div style={s.grid2}>
        <div style={s.formGroup}>
          <label style={s.label}>Jumlah</label>
          <input style={s.input} type="number" min="1" value={form.jumlah} onChange={e => set("jumlah", e.target.value)} />
        </div>
        <div style={s.formGroup}>
          <label style={s.label}>Staff</label>
          <select style={s.select} value={form.staff} onChange={e => set("staff", e.target.value)}>
            {STAFF_LIST.map(st => <option key={st}>{st}</option>)}
          </select>
        </div>
      </div>

      {/* Date picker — auto-filled with today */}
      <div style={s.formGroup}>
        <label style={s.label}>Tanggal Transaksi</label>
        <input style={s.input} type="date" value={form.tanggal} onChange={e => set("tanggal", e.target.value)} max={todayStr} />
        {form.tanggal !== todayStr && (
          <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>⚠ Tanggal bukan hari ini — pastikan tanggal sudah benar</div>
        )}
      </div>

      {tipe === "keluar" && (
        <>
          {/* Diskon (Rp) */}
          <div style={s.formGroup}>
            <label style={s.label}>Diskon (Rp)</label>
            <input style={s.input} type="number" min="0" placeholder="0" value={form.diskon} onChange={e => set("diskon", e.target.value)} />
            {selected && parseRp(form.diskon) > 0 && (
              <div style={{ fontSize: 11, color: COLORS.success, marginTop: 4 }}>
                Harga setelah diskon: <strong>Rp {Math.max(0, (selected.harga || 0) * parseInt(form.jumlah || 1) - parseRp(form.diskon)).toLocaleString("id-ID")}</strong>
              </div>
            )}
          </div>

          {/* Nama Customer */}
          <div style={s.formGroup}>
            <label style={s.label}>Nama Customer (opsional)</label>
            <input style={s.input} type="text" placeholder="Untuk Sales Invoice Jurnal.id" value={form.customer} onChange={e => set("customer", e.target.value)} />
          </div>

          <div style={s.formGroup}>
            <label style={s.label}>Channel Penjualan</label>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {[["wa","💬","WA"],["dm","📸","DM"],["web","🌐","Web"],["shopee","🟠","Shopee"],["tokopedia","🟢","Tokped"],["tiktok","🎵","TikTok"],["consignment","🏪","Consignment"],["b2b","🏢","B2B"],["event","🛍️","Event"]].map(([val, icon, lbl]) => (
                <button key={val} onClick={() => set("channel", val)} style={{ ...s.btn(form.channel === val ? "primary" : "secondary"), fontSize: 11, padding: "6px 10px", whiteSpace: "nowrap" }}>{icon} {lbl}</button>
              ))}
            </div>
            {(form.channel === "consignment" || form.channel === "b2b") && <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 6 }}>💡 Stok keluar dicatat (4-40000, tag: {CHANNEL_TAGS[form.channel]}). Catat income di Tab Keuangan → Pemasukan saat uang masuk.</div>}
            {isMkt(form.channel) && <div style={{ fontSize: 11, color: COLORS.aqua, marginTop: 6 }}>🛒 Tag Jurnal: {CHANNEL_TAGS[form.channel] || "-"}. Income dicatat di Pemasukan saat settlement cair.</div>}
          </div>

          {/* Marketplace extra fields */}
          {isMkt(form.channel) && (() => {
            const mktDefault = selected?.harga_marketplace > 0 ? selected.harga_marketplace : (selected?.harga || 0);
            const mktWarning = selected && (!selected.harga_marketplace || selected.harga_marketplace === 0);
            const feePercent = parseFloat(form.mktFee) || 10;
            return (
            <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: 12, border: `1px solid ${COLORS.aquaDark}`, marginTop: -6 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.aqua, marginBottom: 10 }}>Detail Marketplace</div>
              {mktWarning && <div style={{ fontSize: 11, color: COLORS.warning, marginBottom: 8 }}>⚠ Harga marketplace belum diset di tab Cek Stok — pakai harga standard</div>}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div>
                  <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Harga Jual di Marketplace (Rp) *</label>
                  <input style={s.input} type="number" min="0" placeholder={String(mktDefault)} value={form.mktHarga} onChange={e => set("mktHarga", e.target.value)} />
                </div>
                <div>
                  <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Fee Platform (%)</label>
                  <input style={s.input} type="number" min="0" max="100" value={form.mktFee} onChange={e => set("mktFee", e.target.value)} />
                </div>
              </div>

        </div>

      <button style={s.btn("primary")} onClick={submit}>Simpan Catatan</button>
    </div>
  );
};

      try { window.Quagga.stop(); } catch(e) {}

      // Force stop all video elements inside our container
      if (videoRef.current) {
        const videos = videoRef.current.querySelectorAll("video");

          if (v.srcObject) {

        });

      // Also stop any lingering media tracks globally
      try {
        document.querySelectorAll("video").forEach(v => {

        });
      } catch(e) {}
    };

    useEffect(() => {
      let stopped = false;

  };

  // Universal barcode/SKU lookup — checks barcodeMap first, then SKU, then name
  const findByBarcode = (code) => {
    const q = code.trim().toLowerCase();
    if (!q) return null;
    // 1. Check barcode map
    const mappedSku = barcodeMap[q] || barcodeMap[code.trim()];
    if (mappedSku) {
      const item = inventory.find(i => i.sku === mappedSku && !i.discontinued);
      if (item) return item;

    // 2. Exact SKU
    let found = inventory.find(i => i.sku.toLowerCase() === q && !i.discontinued);
    if (found) return found;
    // 3. Partial SKU
    found = inventory.find(i => i.sku.toLowerCase().includes(q) && !i.discontinued);
    if (found) return found;
    // 4. Partial name
    found = inventory.find(i => i.nama.toLowerCase().includes(q) && !i.discontinued);
    if (found) return found;
    return null;
  };

  const SIZES = ["xxxs","xxs","xs","s","m","l","xl","xxl","xxxl","2xl","3xl","4xl","one size","os","all size"];
  const getSiblings = (item) => {
    if (!item) return [];
    const words = item.nama.trim().split(/\s+/);
    const lastWord = words[words.length - 1].toLowerCase();
    // Check if last word is a size
    if (SIZES.includes(lastWord) && words.length > 1) {
      const baseName = words.slice(0, -1).join(" ").toLowerCase();
      return inventory
        .filter(i => !i.discontinued && i.sku !== item.sku)
        .filter(i => {
          const w = i.nama.trim().split(/\s+/);
          const lw = w[w.length - 1].toLowerCase();
          if (!SIZES.includes(lw) || w.length < 2) return false;
          return w.slice(0, -1).join(" ").toLowerCase() === baseName;
        })
        .sort((a, b) => {
          const ai = SIZES.indexOf(a.nama.trim().split(/\s+/).pop().toLowerCase());
          const bi = SIZES.indexOf(b.nama.trim().split(/\s+/).pop().toLowerCase());
          return ai - bi;
        });
    }
    return [];
  };

  const handleDeleteTx = (tx) => {

  // ── Retur handler ──────────────────────────────────────────────────────────
  const handleRetur = (txAsli, qtyRetur, alasan, tanggalRetur) => {
    // Validate qty
    const totalSudahDiretur = transactions
      .filter(t => t.tipe === "retur" && t.reference_id === txAsli.id)
      .reduce((s, t) => s + t.jumlah, 0);
    const maxQty = txAsli.jumlah - totalSudahDiretur;

      harga: txAsli.harga || 0,
      hpp_snapshot: hppSnap,
      diskon: 0,
      invoiceId: txAsli.invoiceId || null,
      reference_id: txAsli.id
    };
    setTransactions(prev => [returTx, ...prev]);
    sbInsertTx(returTx);

    // c. Insert income record NEGATIF (reverse revenue)
    // Hitung diskon proporsional: diskon asli / qty asli * qty retur
    const diskonAsli = txAsli.diskon || 0;
    const diskonProporsional = txAsli.jumlah > 0 ? Math.round(diskonAsli / txAsli.jumlah * qtyRetur) : 0;
    const returIncomeAmt = -Math.max(0, (txAsli.harga || 0) * qtyRetur - diskonProporsional);
    const source = CHANNEL_SOURCE_MAP[txAsli.channel];
    const revenueAccCode = CHANNEL_REVENUE_MAP[txAsli.channel] || "4-40000";
    if (source) {

        date: today,
        income_number: `RETUR-${dateStr}-${lastFour}`,
        source,
        revenue_account_code: revenueAccCode,
        channel: txAsli.channel,
        tags: (CHANNEL_TAGS[txAsli.channel] || "") + "; Retur",
        description: `RETUR: ${txAsli.nama} x${qtyRetur} — ${alasan}`,
        amount: returIncomeAmt,
        payment_method: "transfer",
        customer: "",
        pay_to_account_code: "1-10002-2",
        invoice_number: null,
        source_type: source
      };
      setIncomes(prev => [returIncome, ...prev]);
      sbInsertIncome(returIncome);

    // d. Insert 2 journal entries COGS reverse (Dr. 1-10200 / Cr. 5-50000)

      const cogsMonth = today.substring(0, 7);
      const cogsDesc = "RETUR COGS: " + txAsli.nama + " x" + qtyRetur + " — " + alasan;
      const cogsReverseEntries = [
        {
          id: ts + 10,
          date: today,
          reference: cogsRef,
          journal_type: "COGS",
          debit_account: "1-10200",
          credit_account: "",
          amount: cogsReverseAmt,
          description: cogsDesc,
          source_sku: txAsli.sku,
          source_id: String(returTx.id),
          period_label: cogsMonth,
          memo: "Auto-generated saat retur",
          tags: "COGS; Retur; Auto"
        },
        {
          id: ts + 11,
          date: today,
          reference: cogsRef,
          journal_type: "COGS",
          debit_account: "",
          credit_account: "5-50000",
          amount: cogsReverseAmt,
          description: cogsDesc,
          source_sku: txAsli.sku,
          source_id: String(returTx.id),
          period_label: cogsMonth,

          tags: "COGS; Retur; Auto"
        }
      ];

          .then(({ error }) => { if (error) console.error('COGS retur journal insert error:', error); })

      }
    }

    // e. Insert expense Sales Return (4-40200)
    const salesReturnExp = {
      id: ts + 20,
      date: today,
      expense_number: `RETUR-${dateStr}-${lastFour}`,
      from_account_code: "1-10002-2",

  const handleReturMasuk = (tx) => {
    const today = new Date().toISOString().split("T")[0];
    const dateStr = today.replace(/-/g, "");
    const ts = Date.now();

    // a. Find linked production order from catatan: "Produksi vendor [PROD-20260321-1234] HPP@..."
    const refMatch = (tx.catatan || "").match(/PROD-\d{8}-\d{4}/);
    const prodRef = refMatch ? refMatch[0] : null;
    const po = prodRef ? productionOrders.find(p => p.reference === prodRef) : null;

    // b. Reverse raw material consumption
    let materialReversals = [];
    if (po) {
      const poMovements = rawMaterialMovements.filter(m => m.reference === prodRef && m.tipe === "keluar");
      const reversalRef = "RETUR-" + prodRef;
      poMovements.forEach((m, idx) => {
        const mQty = m.qty || 0;
        // Return stok to raw material
        setRawMaterials(prev => prev.map(rm =>
          rm.material_sku === m.material_sku ? { ...rm, stok_qty: (rm.stok_qty || 0) + mQty } : rm
        ));
        if (sbClient) {
          const rm = rawMaterials.find(r => r.material_sku === m.material_sku);
          const newStok = (rm?.stok_qty || 0) + mQty;
          sbClient.from('raw_materials').update({ stok_qty: newStok }).eq('material_sku', m.material_sku);
        }
        // Insert reversal movement
        materialReversals.push({
          id: ts + 100 + idx, date: today, material_sku: m.material_sku, tipe: "masuk",
          qty: mQty, hpp_per_unit: m.hpp_per_unit || 0, total_value: mQty * (m.hpp_per_unit || 0),
          reference: reversalRef, catatan: "Reversal: " + prodRef, tags: m.tags || ""
        });
      });
      setRawMaterialMovements(prev => [...materialReversals, ...prev]);
      if (sbClient && materialReversals.length > 0) sbClient.from('raw_material_movements').insert(materialReversals);
    }

    // c. Reduce finished goods stok
    const item = inventory.find(i => i.sku === tx.sku);
    const newStok = Math.max(0, (item?.stok || 0) - tx.jumlah);
    setInventory(prev => prev.map(i => i.sku === tx.sku ? { ...i, stok: newStok } : i));
    sbUpsertInventory(tx.sku, newStok);

    // d. Insert retur_masuk transaction
    const returTx = {
      id: ts, tanggal: today, sku: tx.sku, nama: tx.nama,
      tipe: "retur_masuk", jumlah: tx.jumlah, channel: "-", shipping: "none", shippingCost: 0,
      catatan: `Retur produksi: ${prodRef || "manual"}`, staff: tx.staff || STAFF_LIST[0],
      harga: tx.harga || 0, reference_id: tx.id
    };
    setTransactions(prev => [returTx, ...prev]);
    sbInsertTx(returTx);

    // e. Update production order status
    if (po) {
      setProductionOrders(prev => prev.map(p => p.id === po.id ? { ...p, status: "reversed" } : p));
      if (sbClient) sbClient.from('production_orders').update({ status: "reversed" }).eq('id', po.id);
    }

    // f. Generate journal reversal entries (flip debit/credit)
    if (po) {
      const origJournals = journalEntries.filter(je => je.reference === prodRef && je.journal_type === "PRODUCTION");
      const reversalRef = "RETUR-" + prodRef;
      const reversalEntries = origJournals.map((je, idx) => ({
        id: ts + 300 + idx, date: today, reference: reversalRef, journal_type: "PRODUCTION_REVERSAL",
        debit_account: je.credit_account || "", credit_account: je.debit_account || "",
        amount: je.amount, description: "Reversal: " + (je.description || ""),
        source_sku: je.source_sku, source_id: String(ts), period_label: today.substring(0, 7),
        memo: "Production reversal", tags: (je.tags || "") + "; Reversal"
      }));
      setJournalEntries(prev => [...reversalEntries, ...prev]);
      if (sbClient) sbClient.from('journal_entries').insert(reversalEntries)
        .then(({ error }) => { if (error) console.error('Production reversal journal error:', error); });
    }

    // g. Toast + reset
    const matCount = materialReversals.length;
    showToast(`↩ Retur produksi ${tx.nama} x${tx.jumlah} selesai.${matCount > 0 ? ` ${matCount} material dikembalikan.` : ""} Stok baju -${tx.jumlah}. Journal reversal di-generate.`);
    setReturMasukConfirm(null);
  };

  // ── handlers ────────────────────────────────────────────────────────────────
  // Strip fields not in transactions table to prevent Supabase insert failure
  const makeTxData = (data) => {
    const { peminjam, tanggal, tipeKhusus, mktHarga, mktOrderNo, mktOngkir, customer, ...rest } = data;
    return rest;
  };

  const handleMasuk = (data) => {
    const item = inventory.find(i => i.sku === data.sku);
    const newStok = (item?.stok || 0) + data.jumlah;
    const txData = makeTxData(data);
    const tx = { id: Date.now(), tanggal: data.tanggal || new Date().toISOString().split("T")[0], tipe: data.tipeKhusus || "masuk", channel: "-", harga: item?.harga || 0, ...txData };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: i.stok + data.jumlah } : i));
    setTransactions(prev => [tx, ...prev]);
    showToast(`✓ Restock ${data.nama} +${data.jumlah} berhasil dicatat`);
    sbUpsertInventory(data.sku, newStok);
    sbInsertTx(tx);
  };

  const handleMasukFlowB = (data) => {
    // Flow B: White label / beli jadi — stok +qty, update hpp, journal Dr.1-10200 / Cr.1-10002-2
    const item = inventory.find(i => i.sku === data.sku);
    if (!item) { showToast("Pilih produk dulu!", "danger"); return; }
    const qty = parseInt(data.jumlah) || 0;

    if (qty <= 0 || hargaBeli <= 0) { showToast("Isi qty dan harga beli!", "danger"); return; }
    const newStok = (item.stok || 0) + qty;
    const totalCost = hargaBeli * qty;
    const today = new Date().toISOString().split("T")[0];
    const dateStr = today.replace(/-/g, "");
    const ts = Date.now();

    // 1. Update inventory stok + hpp
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: newStok, hpp: hargaBeli } : i));
    sbUpsertInventoryHpp(data.sku, newStok, hargaBeli);

    // 2. Insert transaction (masuk)
    const tx = {
      id: ts, tanggal: today, sku: data.sku, nama: item.nama,
      tipe: "masuk", jumlah: qty, harga: item.harga || 0,
      channel: "-", shipping: "none", shippingCost: 0,
      catatan: `White label dari ${data.vendor || "vendor"} @Rp ${hargaBeli.toLocaleString("id-ID")}`,
      staff: data.staff || "Sinta"
    };
    setTransactions(prev => [tx, ...prev]);

    // 3. Journal entry: Dr. 1-10200 Inventory / Cr. 1-10002-2 Bank
    const ref = `WL-${dateStr}-${String(ts).slice(-4)}`;

    const journalRows = [
      { id: ts + 10, date: today, reference: ref, journal_type: "PRODUCTION", debit_account: "1-10200", credit_account: "", amount: totalCost, description: jeDesc, source_sku: data.sku, source_id: String(ts), period_label: today.substring(0, 7), memo: "White label masuk", tags: "White Label; Inventory In" },
      { id: ts + 11, date: today, reference: ref, journal_type: "PRODUCTION", debit_account: "", credit_account: "1-10002-2", amount: totalCost, description: jeDesc, source_sku: data.sku, source_id: String(ts), period_label: today.substring(0, 7), memo: "White label masuk", tags: "White Label; Bank Out" }
    ];
    setJournalEntries(prev => [...journalRows, ...prev]);
    if (sbClient) sbClient.from('journal_entries').insert(journalRows).then(({ error }) => { if (error) console.error('WL journal insert error:', error); });

    showToast(`✓ White label ${item.nama} +${qty} masuk · HPP Rp ${hargaBeli.toLocaleString("id-ID")}`);
    setMasukFlow(null);
  };

  const handleMasukFlowA = async () => {
    // Flow A: Dari vendor produksi — consume materials, production order, journal entries
    const item = inventory.find(i => i.sku === masukProductSku);
    if (!item) { showToast("Pilih produk dulu!", "danger"); return; }
    if (masukQtyProduced <= 0) { showToast("Isi qty produced!", "danger"); return; }
    if (masukMaterials.length === 0) { showToast("Tambah minimal 1 material!", "danger"); return; }

    const qty = parseInt(masukQtyProduced);
    const today = new Date().toISOString().split("T")[0];
    const dateStr = today.replace(/-/g, "");
    const ts = Date.now();
    const ongkosJahit = parseRp(masukOngkosJahit) || 0;
    const shippingGudang = parseRp(masukShippingGudang) || 0;
    const biayaLain = parseRp(masukBiayaLain) || 0;

    // 1. Hitung total cost
    const materialTotal = masukMaterials.reduce((s, m) => s + ((parseRp(m.qty) || 0) * (parseRp(m.hpp_per_unit) || 0)), 0);
    const totalCost = materialTotal + ongkosJahit + shippingGudang + biayaLain;
    const hppPerUnit = Math.round(totalCost / qty);

    // 2. Reference
    const ref = `PROD-${dateStr}-${String(ts).slice(-4)}`;
    const periodLabel = today.substring(0, 7);

    // 3. Update inventory stok + hpp (await)
    const newStok = (item.stok || 0) + qty;
    setInventory(prev => prev.map(i => i.sku === masukProductSku ? { ...i, stok: newStok, hpp: hppPerUnit } : i));
    await sbUpsertInventoryHpp(masukProductSku, newStok, hppPerUnit);

    // 4. Insert transaction (masuk)
    const tx = {
      id: ts, tanggal: today, sku: masukProductSku, nama: item.nama,
      tipe: "masuk", jumlah: qty, harga: item.harga || 0,
      channel: "-", shipping: "none", shippingCost: 0,
      catatan: `Produksi ${masukVendor || "vendor"} [${ref}] HPP@${hppPerUnit.toLocaleString("id-ID")}`,
      staff: "Sinta"
    };
    setTransactions(prev => [tx, ...prev]);
    await sbInsertTx(tx);

    // 5. Kurangi stok raw materials (sequential await per material)
    const rmmRows = [];
    for (const m of masukMaterials) {
      const mQty = parseRp(m.qty) || 0;
      const mHpp = parseRp(m.hpp_per_unit) || 0;
      if (mQty <= 0) continue;
      const rm = rawMaterials.find(r => r.material_sku === m.material_sku);
      const newRmStok = Math.max(0, (rm?.stok_qty || 0) - mQty);
      // Update local state
      setRawMaterials(prev => prev.map(r =>
        r.material_sku === m.material_sku ? { ...r, stok_qty: newRmStok } : r
      ));
      // Await Supabase update
      if (sbClient) {
        const { error } = await sbClient.from('raw_materials').update({ stok_qty: newRmStok }).eq('material_sku', m.material_sku);
        if (error) { console.error('raw_materials update error:', error); showToast('DB error raw_materials: ' + error.message, 'danger'); }
      }
      // Build movement record
      rmmRows.push({
        id: ts + 100 + rmmRows.length,
        date: today, material_sku: m.material_sku, tipe: "keluar",
        qty: mQty, hpp_per_unit: mHpp, total_value: mQty * mHpp,
        reference: ref, catatan: `Konsumsi untuk ${item.nama} x${qty}`,
        tags: m.tags || ""
      });
    }

    // 6. Insert raw_material_movements (await)
    setRawMaterialMovements(prev => [...rmmRows, ...prev]);
    if (sbClient && rmmRows.length > 0) {
      const { error } = await sbClient.from('raw_material_movements').insert(rmmRows);
      if (error) { console.error('raw_material_movements insert error:', error); showToast('DB error movements: ' + error.message, 'danger'); }
    }

    // 7. Update purchase status (await)
    if (masukSelectedPurchase) {
      const pid = masukSelectedPurchase.id;
      setPurchases(prev => prev.map(p => p.id === pid ? { ...p, status: "received", qty_received: qty, hpp_per_unit: hppPerUnit } : p));
      if (sbClient) {
        const { error } = await sbClient.from('purchases').update({ status: "received", qty_received: qty, hpp_per_unit: hppPerUnit }).eq('id', pid);
        if (error) { console.error('purchases update error:', error); showToast('DB error purchases: ' + error.message, 'danger'); }
      }
    }

    // 8. Insert production_order (await)
    const po = {
      id: ts + 200, date: today, reference: ref,
      product_sku: masukProductSku, product_nama: item.nama,
      tipe_produksi: masukSelectedPurchase?.tipe_produksi || "vendor_full",
      vendor: masukVendor || "", qty_produced: qty,
      total_cost: totalCost, hpp_per_unit: hppPerUnit,
      purchase_id: masukSelectedPurchase?.id || null,
      status: "completed", period_label: periodLabel
    };
    setProductionOrders(prev => [po, ...prev]);
    if (sbClient) {
      const { error } = await sbClient.from('production_orders').insert([po]);
      if (error) { console.error('production_orders insert error:', error); showToast('DB error production_orders: ' + error.message, 'danger'); }
    }

    // 9. Journal entries (await)
    const journalRows = [];
    let jeIdx = 0;
    journalRows.push({
      id: ts + 300 + jeIdx++, date: today, reference: ref, journal_type: "PRODUCTION",
      debit_account: "1-10200", credit_account: "", amount: totalCost,
      description: `Produksi ${item.nama} x${qty}`, source_sku: masukProductSku,
      source_id: String(ts), period_label: periodLabel,
      memo: "Production order masuk", tags: "Production; Inventory In"
    });
    for (const m of masukMaterials) {
      const mQty = parseRp(m.qty) || 0;
      const mHpp = parseRp(m.hpp_per_unit) || 0;
      const mTotal = mQty * mHpp;
      if (mTotal <= 0) continue;
      journalRows.push({
        id: ts + 300 + jeIdx++, date: today, reference: ref, journal_type: "PRODUCTION",
        debit_account: "", credit_account: m.coa_account || "1-10201", amount: mTotal,
        description: `Konsumsi ${m.nama} ${mQty}${m.satuan || "pcs"}`,
        source_sku: masukProductSku, source_id: String(ts), period_label: periodLabel,
        memo: "Raw material consumed", tags: m.tags || "Production"
      });
    }
    if (ongkosJahit > 0) {
      journalRows.push({
        id: ts + 300 + jeIdx++, date: today, reference: ref, journal_type: "PRODUCTION",
        debit_account: "", credit_account: "1-10402", amount: ongkosJahit,
        description: `Ongkos jahit ${masukVendor || "vendor"}`,
        source_sku: masukProductSku, source_id: String(ts), period_label: periodLabel,
        memo: "Prepaid expense — ongkos jahit", tags: "Production; Ongkos Jahit"

        debit_account: "", credit_account: "1-10002-2", amount: shippingGudang,
        description: `Shipping gudang dari ${masukVendor || "vendor"}`,
        source_sku: masukProductSku, source_id: String(ts), period_label: periodLabel,
        memo: "Shipping vendor ke gudang", tags: "Production; Shipping"
      });
    }
    if (biayaLain > 0) {
      journalRows.push({
        id: ts + 300 + jeIdx++, date: today, reference: ref, journal_type: "PRODUCTION",
        debit_account: "", credit_account: "1-10002-2", amount: biayaLain,
        description: `Biaya lain produksi: ${masukVendor || "vendor"}`,
        source_sku: masukProductSku, source_id: String(ts), period_label: periodLabel,
        memo: "Additional production cost", tags: "Production; Biaya Lain"
      });

    }

    // 10. Reset state + toast

    setMasukFlow(null); setMasukSelectedPurchase(null); setMasukMaterials([]);
    setMasukOngkosJahit(0); setMasukShippingGudang(0); setMasukBiayaLain(0);

  };

  const handleKeluar = (data) => {
    // Pinjam Baju: delegate entirely to handlePinjam (no keluar transaction, no double stok reduction)
    if (data.channel === "pinjam") {
      handlePinjam(data);
      showToast(`⇄ Peminjaman ${data.nama} x${data.jumlah} dicatat`);
      return;
    }

    const item = inventory.find(i => i.sku === data.sku);
    const newStok = Math.max(0, (item?.stok || 0) - data.jumlah);
    const txData = makeTxData(data);
    const tx = { id: Date.now() + Math.floor(Math.random() * 1000), tanggal: data.tanggal || new Date().toISOString().split("T")[0], tipe: "keluar", harga: item?.harga || 0, hpp_snapshot: item?.hpp || 0, ...txData };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: Math.max(0, i.stok - data.jumlah) } : i));
    setTransactions(prev => [tx, ...prev]);
    showToast(`✓ Barang keluar ${data.nama} -${data.jumlah} dicatat`);
    sbUpsertInventory(data.sku, newStok);
    sbInsertTx(tx);

    // Gap 3 fix: Auto-create Freight & Delivery expense when Plai pays shipping
    // Dr. 6-60221 Freight & Delivery / Cr. 1-10002-2 Bank BCA Gaby
    if (data.shipping === "plai" && data.shippingCost > 0 && data.channel !== "kol") {
      const ts = Date.now();
      const dateStr = (data.tanggal || new Date().toISOString().split("T")[0]).replace(/-/g, "");
      const freightExp = {
        id: ts,
        date: data.tanggal || new Date().toISOString().split("T")[0],
        expense_number: `EXP-${dateStr}-SHIP-${String(ts).slice(-4)}`,

        payment_method: "transfer",
        recipient: "Kurir (JNE/Sicepat/dll)",
        tags: "Shipping; Customer Order; Freight"
      };
      setExpenses(prev => [freightExp, ...prev]);
      if (sbClient) sbClient.from('expenses').insert([freightExp]);
    }

    // KOL: auto-create marketing expense (6-60007), no income
    // Entry 1: Produk (Dr. 6-60007 / Cr. 1-10200 Inventory) — pakai HPP bukan harga jual
    // Entry 2: Ongkir (Dr. 6-60007 / Cr. 1-10002-2 Bank) — jika ada ongkir
    if (data.channel === "kol") {
      const ts = Date.now();
      const dateStr = (data.tanggal || new Date().toISOString().split("T")[0]).replace(/-/g, "");
      const hpp = item?.hpp || 0;
      const hppAmt = hpp * data.jumlah;
      const ongkir = parseInt(data.shippingCost) || 0;
      const kolName = data.catatan || "KOL/Influencer";
      const toInsert = [];
      // Entry 1: Produk keluar dari inventory (Cr. 1-10200)
      const kolProdExp = {
        id: ts,
        date: data.tanggal || new Date().toISOString().split("T")[0],
        expense_number: `KOL-${dateStr}-${String(ts).slice(-4)}`,
        from_account_code: "1-10200",
        account_code: "6-60007",
        account_name: "KOL & PR Package",
        description: `KOL Produk: ${data.nama} x${data.jumlah} HPP@${hpp.toLocaleString("id-ID")} — ${kolName}`,
        amount: hppAmt,
        payment_method: "transfer",
        recipient: kolName,
        tags: "KOL; Marketing; INVENTORY-OUT"
      };
      toInsert.push(kolProdExp);
      // Entry 2: Ongkir keluar dari bank (Cr. 1-10002-2)
      if (ongkir > 0) {
        toInsert.push({
          id: ts + 1,
          date: data.tanggal || new Date().toISOString().split("T")[0],
          expense_number: `KOL-${dateStr}-${String(ts+1).slice(-4)}`,
          from_account_code: "1-10002-2",
          account_code: "6-60007",
          account_name: "KOL & PR Package",
          description: `KOL Ongkir: ${kolName}`,
          amount: ongkir,
          payment_method: "transfer",
          recipient: kolName,
          tags: "KOL; Marketing; ONGKIR"
        });
      }
      setExpenses(prev => [...toInsert, ...prev]);
      if (sbClient) sbClient.from('expenses').insert(toInsert);
      showToast(`✓ KOL dicatat — Produk HPP Rp ${hppAmt.toLocaleString("id-ID")}${ongkir > 0 ? ` + Ongkir Rp ${ongkir.toLocaleString("id-ID")}` : ""}`);
      return;
    }

    // Auto-create income record for revenue-generating channels
    // Gap 2 fix: Split product revenue (4-40000) and shipping income (4-40300) into separate records
    const source = CHANNEL_SOURCE_MAP[data.channel];
    if (source) {
      const ts = Date.now();

      const harga = item?.harga || 0;
      // FIX 2: Kurangi diskon dari income agar mencerminkan harga aktual yang dibayar pelanggan
      const produkAmt = Math.max(0, (harga * data.jumlah) - (data.diskon || 0));
      const ongkirAmt = data.pelangganShipCost || 0;
      const toInsertInc = [];
      // Record 1: Product revenue → 4-40000 Revenues - Products
      toInsertInc.push({
        id: ts,
        date: data.tanggal || new Date().toISOString().split("T")[0],
        income_number: `INC-${dateStr}-${String(ts).slice(-4)}`,
        source,
        revenue_account_code: CHANNEL_REVENUE_MAP[data.channel] || "4-40000",
        channel: data.channel,
        tags: CHANNEL_TAGS[data.channel] || "",
        description: `Penjualan ${data.nama} x${data.jumlah}${data.catatan ? " — " + data.catatan : ""}`,
        amount: produkAmt,
        payment_method: "transfer",
        customer: data.customer || "",
        pay_to_account_code: "1-10002-2",
        invoice_number: null,
        source_type: source,
        pending_settlement: ["marketplace","consignment","b2b"].includes(source)
      });
      // Record 2: Shipping income → 4-40300 Shipping Income (only if customer pays ongkir)
      if (ongkirAmt > 0) {
        toInsertInc.push({
          id: ts + 1,
          date: data.tanggal || new Date().toISOString().split("T")[0],
          income_number: `INC-${dateStr}-SHIP-${String(ts+1).slice(-4)}`,
          source,
          revenue_account_code: "4-40300",
          channel: data.channel,
          tags: (CHANNEL_TAGS[data.channel] || "") + "; Shipping Income",
          description: `Ongkir customer: ${data.nama} x${data.jumlah}${data.catatan ? " — " + data.catatan : ""}`,
          amount: ongkirAmt,
          payment_method: "transfer",
          customer: data.customer || "",
          pay_to_account_code: "1-10002-2",
          invoice_number: null,
          source_type: source,
          pending_settlement: ["marketplace","consignment","b2b"].includes(source)
        });
      }
      setIncomes(prev => [...toInsertInc, ...prev]);
      toInsertInc.forEach(i => sbInsertIncome(i));
    }

    // ── Auto-generate COGS journal entry (all channels except kol/pinjam) ──
    // kol already returned above; pinjam already returned at top of handleKeluar
    const hpp = item?.hpp || 0;
    const cogsAmt = hpp * data.jumlah;
    const cogsToday = data.tanggal || new Date().toISOString().split("T")[0];
    const cogsDateStr = cogsToday.replace(/-/g, "");
    const cogsMonth = cogsToday.substring(0, 7);
    const txNum = "COGS-" + cogsDateStr + "-" + String(Date.now()).slice(-4);

    if (hpp === 0) {
      showToast(`⚠ HPP belum diset untuk ${data.sku} — COGS tidak tercatat. Isi HPP di tab Cek Stok.`, "warning");
    } else {
      const cogsDesc = "COGS: " + data.nama + " x" + data.jumlah;
      const cogsEntries = [
        {
          id: Date.now() + 10,
          date: cogsToday,
          reference: txNum,
          journal_type: "COGS",
          debit_account: "5-50000",
          credit_account: "",
          amount: cogsAmt,
          description: cogsDesc,
          source_sku: data.sku,
          source_id: String(tx.id),
          period_label: cogsMonth,
          memo: "Auto-generated saat penjualan",
          tags: "COGS; Auto"
        },
        {
          id: Date.now() + 11,
          date: cogsToday,
          reference: txNum,
          journal_type: "COGS",
          debit_account: "",
          credit_account: "1-10200",
          amount: cogsAmt,
          description: cogsDesc,
          source_sku: data.sku,
          source_id: String(tx.id),
          period_label: cogsMonth,
          memo: "Auto-generated saat penjualan",
          tags: "COGS; Auto"
        }
      ];
      setJournalEntries(prev => [...cogsEntries, ...prev]);
      if (sbClient) {
        sbClient.from('journal_entries').insert(cogsEntries)
          .then(({ error }) => { if (error) console.error('COGS journal insert error:', error); })
          .catch(e => console.error('COGS journal insert error:', e));
      }
      showToast(`📊 COGS Rp ${cogsAmt.toLocaleString("id-ID")} (${data.sku} x${data.jumlah} @HPP ${hpp.toLocaleString("id-ID")})`);
    }
  };

  // ── quick scan handlers ──────────────────────────────────────────────────
  const handleQuickScan = (val) => {
    const trimmed = val.trim();
    setScanQ("");
    if (!trimmed) return;
    const found = findByBarcode(trimmed);
    if (found) {
      setScanResult(found);
      setScanJumlah(1);
      setTimeout(() => scanJumlahRef.current?.focus(), 100);
    } else {
      // Unknown barcode — offer to register it
      if (/^\d{6,}$/.test(trimmed)) {
        setBarcodeRegister({ code: trimmed });
        showToast(`Barcode "${trimmed}" belum terdaftar — pilih item untuk didaftarkan`, "warning");
      } else {
        showToast(`"${trimmed}" tidak ditemukan`, "danger");
      }
      setTimeout(() => scanInputRef.current?.focus(), 100);
    }
  };

  const confirmQuickScan = () => {
    if (!scanResult || scanJumlah < 1) return showToast("Isi jumlah dulu!", "danger");
    if (scanMode === "keluar" && scanJumlah > scanResult.stok) return showToast("Stok tidak cukup!", "danger");
    if (scanMode === "keluar" && scanShipping === "plai" && (!scanShipCost || parseRp(scanShipCost) <= 0)) return showToast("Isi biaya shipping dulu!", "danger");
    const currentStok = inventory.find(i => i.sku === scanResult.sku)?.stok ?? scanResult.stok;
    const data = {
      sku: scanResult.sku,
      nama: scanResult.nama,
      jumlah: parseInt(scanJumlah),
      channel: scanMode === "keluar" ? scanChannel : "-",
      shipping: scanMode === "keluar" ? scanShipping : "none",
      shippingCost: scanMode === "keluar" && scanShipping === "plai" ? parseRp(scanShipCost) : 0,
      pelangganShipCost: scanMode === "keluar" && scanShipping === "pelanggan" && !scanMarketplace ? parseRp(scanPelangganShipCost) || 0 : 0,
      marketplace: scanMarketplace,
      catatan: scanMarketplace ? "Marketplace" : "",
      staff: scanStaff,
    };
    const stokAfter = scanMode === "masuk" ? currentStok + data.jumlah : currentStok - data.jumlah;
    if (scanMode === "masuk") handleMasuk(data);
    else handleKeluar(data);
    setScanHistory(prev => [{ ...data, tipe: scanMode, waktu: new Date().toLocaleTimeString("id-ID"), stokBefore: currentStok, stokAfter }, ...prev].slice(0, 10));
    setScanResult(null);
    setScanJumlah(1);
    setScanChannel("event");
    setScanShipping("none");
    setScanShipCost("");
    setScanMarketplace(false);
    setScanPelangganShipCost("");

  const handleRusak = (data) => {
    const item = inventory.find(i => i.sku === data.sku);
    const newStok = Math.max(0, (item?.stok || 0) - data.jumlah);
    const txData = makeTxData(data);
    const tx = { id: Date.now(), tanggal: data.tanggal || new Date().toISOString().split("T")[0], tipe: "rusak", channel: "-", harga: item?.harga || 0, ...txData };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: Math.max(0, i.stok - data.jumlah) } : i));
    setTransactions(prev => [tx, ...prev]);
    showToast(`⚠ ${data.nama} ${data.jumlah} unit dicatat rusak/hilang`, "warning");
    sbUpsertInventory(data.sku, newStok);
    sbInsertTx(tx);
    // Gap 4 fix: Auto-create Waste & Damaged Goods expense
    // Dr. 6-60216 Waste & Damaged Goods / Cr. 1-10200 Inventory (@ HPP)
    const hpp = item?.hpp || 0;
    const wasteAmt = hpp * data.jumlah;
    if (wasteAmt === 0) {
      showToast(`⚠ HPP belum diisi — kerugian tidak tercatat di P&L. Isi HPP di tab Cek Stok.`, "warning");
    } else {
      const ts = Date.now();
      const dateStr = (data.tanggal || new Date().toISOString().split("T")[0]).replace(/-/g, "");
      const wasteExp = {
        id: ts,
        date: data.tanggal || new Date().toISOString().split("T")[0],
        expense_number: `WASTE-${dateStr}-${String(ts).slice(-4)}`,
        from_account_code: "1-10200",
        account_code: "6-60216",
        account_name: "Waste & Damaged Goods",
        description: `Barang rusak/hilang: ${data.nama} x${data.jumlah} HPP@${hpp.toLocaleString("id-ID")}${data.catatan ? " — " + data.catatan : ""}`,
        amount: wasteAmt,
        payment_method: "adjustment",
        recipient: "-",
        tags: "Waste; Damaged; INVENTORY-OUT"
      };
      setExpenses(prev => [wasteExp, ...prev]);
      if (sbClient) sbClient.from('expenses').insert([wasteExp]);
    }
  };

  const handlePinjam = (data) => {
    const newStok = Math.max(0, (inventory.find(i => i.sku === data.sku)?.stok || 0) - data.jumlah);
    const p = { id: Date.now(), tanggal: data.tanggal || new Date().toISOString().split("T")[0], kembali: null, sku: data.sku, nama: data.nama, jumlah: data.jumlah, peminjam: data.peminjam || "", staff: data.staff };
    setInventory(prev => prev.map(i => i.sku === data.sku ? { ...i, stok: Math.max(0, i.stok - data.jumlah) } : i));
    setPinjaman(prev => [p, ...prev]);
    showToast(`⇄ Peminjaman ${data.nama} dicatat`);
    sbUpsertInventory(data.sku, newStok);
    sbInsertPinjam(p);
  };

  const handleKembali = (id) => {
    const p = pinjaman.find(x => x.id === id);
    if (!p) return;
    const newStok = (inventory.find(i => i.sku === p.sku)?.stok || 0) + p.jumlah;
    setInventory(prev => prev.map(i => i.sku === p.sku ? { ...i, stok: i.stok + p.jumlah } : i));
    setPinjaman(prev => prev.map(x => x.id === id ? { ...x, kembali: new Date().toISOString().split("T")[0] } : x));
    showToast(`✓ Pengembalian ${p.nama} dicatat`);
    sbUpsertInventory(p.sku, newStok);
    if (sbClient) sbClient.from('pinjaman').update({ kembali: new Date().toISOString().split("T")[0] }).eq('id', id);
  };

  // ── kasir / POS handlers ─────────────────────────────────────────────────
  const addToCart = (sku) => {
    const item = inventory.find(i => i.sku === sku && !i.discontinued);
    if (!item) return showToast("Produk tidak ditemukan", "danger");
    if (item.stok === 0) return showToast("Stok habis!", "danger");
    setCart(prev => {
      const existing = prev.find(c => c.sku === sku);
      if (existing) {
        const maxStok = item.stok;
        if (existing.qty >= maxStok) { showToast("Stok tidak cukup!", "danger"); return prev; }
        return prev.map(c => c.sku === sku ? { ...c, qty: c.qty + 1 } : c);
      }
      return [...prev, { sku: item.sku, nama: item.nama, harga: item.harga, qty: 1, satuan: item.satuan }];
    });
    setKasirSearch("");
    setTimeout(() => kasirScanRef.current?.focus(), 80);
  };

  const removeFromCart = (sku) => setCart(prev => prev.filter(c => c.sku !== sku));

  const updateCartQty = (sku, qty) => {
    if (qty < 1) return removeFromCart(sku);
    const item = inventory.find(i => i.sku === sku);
    if (item && qty > item.stok) return showToast("Stok tidak cukup!", "danger");
    setCart(prev => prev.map(c => c.sku === sku ? { ...c, qty } : c));
  };

  const confirmKasir = () => {
    if (cart.length === 0) return showToast("Keranjang kosong!", "danger");
    const subtotal = cart.reduce((a, c) => a + c.harga * c.qty, 0);
    const diskonNilai = kasirDiskonTipe === "persen"
      ? Math.round(subtotal * (parseFloat(kasirDiskonNilai) || 0) / 100)
      : (parseRp(kasirDiskonNilai) || 0);
    const total = Math.max(0, subtotal - diskonNilai);
    const bayar = parseRp(kasirBayar) || 0;
    if (kasirPayMethod === "cash" && bayar < total) return showToast("Uang bayar kurang!", "danger");
    if (kasirShipping === "plai" && (!kasirShipCost || parseRp(kasirShipCost) <= 0)) return showToast("Isi biaya shipping Plai dulu!", "danger");

    // Deduct stock + record each item as keluar transaction
    // Generate invoice ID for grouping & split discount evenly across items
    const invoiceId = kasirInvoiceManual.trim() ? kasirInvoiceManual.trim() : "INV-" + Date.now();
    const shipCostInt = kasirShipping === "plai" ? parseRp(kasirShipCost) || 0 : 0;
    const pelangganShipCostInt = kasirShipping === "pelanggan" && !kasirMarketplace ? parseRp(kasirPelangganShipCost) || 0 : 0;
    const totalItems = cart.reduce((a, c) => a + c.qty, 0);
    const diskonPerUnit = totalItems > 0 ? Math.floor(diskonNilai / totalItems) : 0;
    const diskonSisa = totalItems > 0 ? diskonNilai - (diskonPerUnit * totalItems) : 0;
    cart.forEach((c, ci) => {
      const catatanParts = ["Kasir"];
      if (kasirKeterangan.trim()) catatanParts.push(kasirKeterangan.trim());
      if (kasirMarketplace) catatanParts.push("Marketplace");
      const itemDiskon = diskonPerUnit * c.qty + (ci === 0 ? diskonSisa : 0);
      // Shipping cost only on first item to avoid double-counting
      const data = { sku: c.sku, nama: c.nama, jumlah: c.qty, channel: kasirChannel, shipping: kasirShipping, shippingCost: ci === 0 ? shipCostInt : 0, pelangganShipCost: ci === 0 ? pelangganShipCostInt : 0, marketplace: kasirMarketplace, catatan: catatanParts.join(" — "), staff: kasirStaff, tanggal: kasirTanggal, invoiceId, diskon: itemDiskon };
      handleKeluar(data);
    });

    const receipt = {
      id: Date.now(),
      invoiceId,
      tanggal: kasirTanggal,
      waktu: new Date().toLocaleString("id-ID"),
      items: [...cart],
      subtotal, diskonNilai, total,
      shipping: kasirShipping,
      shippingCost: shipCostInt,
      pelangganShipCost: pelangganShipCostInt,
      marketplace: kasirMarketplace,
      payMethod: kasirPayMethod,
      bayar: kasirPayMethod === "cash" ? bayar : total,
      kembalian: kasirPayMethod === "cash" ? bayar - total : 0,
      staff: kasirStaff,
      keterangan: kasirKeterangan.trim(),
    };
    setKasirReceipt(receipt);
    setCart([]);
    setKasirDiskonNilai("");
    setKasirBayar("");
    setKasirKeterangan("");
    setKasirInvoiceManual("");
    setKasirShipping("none");
    setKasirShipCost("");
    setKasirMarketplace(false);
    setKasirPelangganShipCost("");
    setKasirChannel("event");
  };

  const handleAddNewSku = async () => {
    const sku = newSkuForm.sku.trim().toUpperCase();
    const nama = newSkuForm.nama.trim();
    const harga = parseInt(String(newSkuForm.harga).replace(/\./g, "")) || 0;
    const hpp = parseInt(String(newSkuForm.hpp).replace(/\./g, "")) || 0;
    const stok = parseInt(newSkuForm.stok) || 0;
    if (!sku) return showToast("Product Code tidak boleh kosong", "danger");
    if (!nama) return showToast("Nama produk tidak boleh kosong", "danger");
    if (inventory.find(i => i.sku === sku)) return showToast(`SKU ${sku} sudah terdaftar di inventory`, "danger");
    const newItem = { sku, nama, harga, hpp, stok, minimum: 3, satuan: "pcs", kategori: "", discontinued: false };
    setInventory(prev => [...prev, newItem]);
    if (sbClient) {
      const { error } = await sbClient.from('inventory').upsert([newItem], { onConflict: 'sku' });
      if (error) showToast(`⚠ SKU ditambah lokal, sync DB gagal: ${error.message}`, "warning");
      else { showToast(`✓ SKU ${sku} — ${nama} berhasil ditambahkan!`); sbRefetchInventory(); }
    } else {
      showToast(`✓ SKU ${sku} — ${nama} ditambahkan (lokal saja — DB belum terhubung)`);
    }
    setNewSkuForm({ sku: "", nama: "", harga: "", hpp: "", stok: "" });
    setShowNewSkuForm(false);
  };

  const handleDeleteProduct = (sku) => {
    setInventory(prev => prev.filter(i => i.sku !== sku));
    setDeleteConfirm(null);
    showToast("Produk dihapus", "warning");
    if (sbClient) sbClient.from('inventory').delete().eq('sku', sku);
  };

  const handleDiscontinue = (sku, val) => {
    setInventory(prev => prev.map(i => i.sku === sku ? { ...i, discontinued: val } : i));
    showToast(val ? "Produk diarsip (discontinued)" : "Produk diaktifkan kembali", val ? "warning" : "success");
    if (sbClient) sbClient.from('inventory').update({ discontinued: val }).eq('sku', sku);
  };

  const handleEditHarga = async (sku, hargaBaru) => {
    const hargaInt = parseInt(hargaBaru) || 0;
    if (hargaInt < 0) return showToast("Harga tidak valid", "danger");
    // Update inventory harga saja.
    // Harga baru hanya berlaku untuk transaksi selanjutnya. Histori tidak diubah.
    setInventory(prev => prev.map(i => i.sku === sku ? { ...i, harga: hargaInt } : i));
    if (sbClient) sbClient.from('inventory').update({ harga: hargaInt }).eq('sku', sku);
    showToast(`✓ Harga ${sku} diupdate ke Rp ${hargaInt.toLocaleString("id-ID")} — berlaku untuk transaksi baru`);
    setEditHarga(null);
  };

  const handleEditHargaMkt = async (sku, hargaBaru) => {
    const hargaInt = parseInt(hargaBaru) || 0;
    if (hargaInt < 0) return showToast("Harga marketplace tidak valid", "danger");
    setInventory(prev => prev.map(i => i.sku === sku ? { ...i, harga_marketplace: hargaInt } : i));
    if (sbClient) sbClient.from('inventory').update({ harga_marketplace: hargaInt }).eq('sku', sku);
    showToast(`✓ Harga marketplace ${sku} diupdate ke Rp ${hargaInt.toLocaleString("id-ID")} — berlaku untuk transaksi baru`);

    if (hppInt < 0) return showToast("HPP tidak valid", "danger");
    setInventory(prev => prev.map(i => i.sku === sku ? { ...i, hpp: hppInt } : i));

    }
    showToast(`✓ HPP ${sku} diupdate ke Rp ${hppInt.toLocaleString("id-ID")}`);

  // ── import handlers ─────────────────────────────────────────────────────────
  const handleFileUpload = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const parsed = parseCSV(e.target.result);
      if (parsed.length === 0) {
        showToast("File tidak valid atau kosong", "danger");
        return;
      }
      setImportPreview(parsed);
      showToast(`${parsed.length} produk siap diimport — cek preview dulu`);
    };
    reader.readAsText(file);
  };

  const confirmImport = () => {
    if (!importPreview) return;
    if (importMode === "replace") {
      setInventory(importPreview);
    } else {
      // merge: update existing, add new
      setInventory(prev => {
        const map = {};
        prev.forEach(i => { map[i.sku] = i; });
        importPreview.forEach(i => {
          if (map[i.sku]) {
            map[i.sku] = { ...map[i.sku], nama: i.nama, harga: i.harga, kategori: i.kategori };
            if (i.stok > 0) map[i.sku].stok = i.stok;
          } else {
            map[i.sku] = i;
          }
        });
        return Object.values(map);
      });
    }
    const count = importPreview.length;
    const finalItems = importMode === "replace" ? importPreview : (() => {
      const map = {};
      inventory.forEach(i => { map[i.sku] = i; });
      importPreview.forEach(i => {
        if (map[i.sku]) { map[i.sku] = { ...map[i.sku], nama: i.nama, harga: i.harga, kategori: i.kategori }; if (i.stok > 0) map[i.sku].stok = i.stok; }
        else map[i.sku] = i;
      });
      return Object.values(map);
    })();
    // Sync to Supabase with proper error handling
    if (sbClient) {
      const rows = finalItems.map(i => ({
        sku: i.sku,
        nama: i.nama,
        harga: i.harga || 0,
        stok: i.stok || 0,
        minimum: i.minimum || 3,
        satuan: i.satuan || "pcs",
        kategori: i.kategori || "",
        discontinued: i.discontinued || false,
      }));
      sbClient.from('inventory').upsert(rows, { onConflict: 'sku' })
        .then(({ error }) => {
          if (error) {
            console.error('Import upsert error:', error);

          } else {
            showToast(`✓ ${count} produk berhasil diimport & tersimpan ke database!`);

        .catch(e => {
          console.error('Import sync error:', e);
          showToast(`⚠ Import lokal berhasil, tapi sync gagal: ${e.message}`, 'warning');
        });
    } else {

    const itemsWithBarcode = items.map(item => {

        });

  // ── AI ───────────────────────────────────────────────────────────────────────
  const sendAiMessage = async () => {

    setAiInput("");
    setAiMessages(prev => [...prev, { role: "user", content: userMsg }]);
    setAiLoading(true);

    const inventoryContext = JSON.stringify(inventory.slice(0, 50));
    const transactionContext = JSON.stringify(transactions.slice(0, 20));
    const pinjamanContext = JSON.stringify(pinjaman);

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,

Data inventory saat ini: ${inventoryContext}

Riwayat transaksi terbaru: ${transactionContext}

Data peminjaman: ${pinjamanContext}

Kamu bisa membantu untuk:

- Info barang yang stoknya rendah

  const filterByPeriod = (items, period) => {
    const now = new Date();
    const today = now.toISOString().split("T")[0];
    if (period === "semua") return items;
    // Support both date (incomes/expenses) and tanggal (transactions)
    const getD = (i) => i.date || i.tanggal || "";
    if (period === "hari") return items.filter(i => getD(i) === today);
    if (period === "minggu") {
      const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
      return items.filter(i => new Date(getD(i)) >= weekAgo);
    }
    if (period === "bulan") {
      const monthStart = today.substring(0, 7);
      return items.filter(i => getD(i) && getD(i).substring(0, 7) === monthStart);
    }
    return items;
  };

  // ── Shared export data builder (called by all individual export fns) ──
  const buildExportData = () => {
    // Exclude ALL inventory-related entries from Expense CSV:
    // 1. account_code = "1-10200" → vendor inventory-in (Dr. Inventory / Cr. Bank) → Journal Entry
    // 2. from_account_code = "1-10200" → KOL produk (Dr. 6-60007 / Cr. Inventory) → KOL Journal
    // Only KOL ongkir (from_account_code = bank) and regular cash expenses go to Expense CSV.
    const filteredExp = filterByPeriod(
      expenses.filter(e => e.account_code !== "1-10200" && e.from_account_code !== "1-10200"),
      keuanganPeriod
    );
    const filteredInc = filterByPeriod(
      incomes.filter(i => !["b2c_direct", "event"].includes(i.source_type)),
      keuanganPeriod
    );
    const isCash = (m) => ["cash","tunai","ewallet","gopay","ovo","dana","shopeepay"].includes((m||"").toLowerCase());
    const fmtPayMethod = (m) => isCash(m) ? "Cash" : "Transfer";
    const fromAccCode = (m) => isCash(m) ? "1-10100" : "1-10002-2";
    const expNum = (e) => e.expense_number || `EXP-${(e.date||"").replace(/-/g,"").substring(0,8)}-${String(e.id||"").slice(-4)}`;
    const incNum = (i) => i.income_number || `INC-${(i.date||"").replace(/-/g,"").substring(0,8)}-${String(i.id||"").slice(-4)}`;
    const fmtDate = (d) => { if (!d) return ""; const p = d.split("-"); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d; };
    const revenueTag = (i) => { if (i.tags) return i.tags; const ch=(i.channel||"").toLowerCase(); return CHANNEL_TAGS[ch]||ch||""; };
    const kasirChs = [...Object.keys(CHANNEL_SOURCE_MAP), "terjual", "direct"];
    // Hitung kasirRevenue dari tabel incomes (source_type = "b2c_direct") bukan dari transactions,
    // agar diskon sudah otomatis terefleksi (amount di incomes sudah dikurangi diskon sejak handleKeluar).
    // filteredInc di bawah sudah mengecualikan b2c_direct — jadi tidak ada double-counting.
    const kasirRevenue = filterByPeriod(
      incomes.filter(i => i.source_type === "b2c_direct" || i.source === "b2c_direct"),
      keuanganPeriod
    ).reduce((s, i) => s + (i.amount || 0), 0);
    const totalExpByAccount = {};
    filteredExp.forEach(e => { if (!totalExpByAccount[e.account_code]) totalExpByAccount[e.account_code]={name:e.account_name,total:0}; totalExpByAccount[e.account_code].total+=e.amount; });
    const totalIncBySrc = {};
    filteredInc.forEach(i => { const k=i.source+(i.channel?" - "+i.channel:""); if (!totalIncBySrc[k]) totalIncBySrc[k]=0; totalIncBySrc[k]+=i.amount; });
    const cogsAccounts = Object.entries(totalExpByAccount).filter(([c])=>c.startsWith("5-")).sort((a,b)=>a[0].localeCompare(b[0]));
    const opexAccounts = Object.entries(totalExpByAccount).filter(([c])=>c.startsWith("6-")).sort((a,b)=>a[0].localeCompare(b[0]));
    const otherAccounts = Object.entries(totalExpByAccount).filter(([c])=>c.startsWith("8-")).sort((a,b)=>a[0].localeCompare(b[0]));
    const cogsTotal = cogsAccounts.reduce((s,[,d])=>s+d.total,0);
    const opexTotal = opexAccounts.reduce((s,[,d])=>s+d.total,0);
    const otherTotal = otherAccounts.reduce((s,[,d])=>s+d.total,0);
    const totalIncome = kasirRevenue + filteredInc.reduce((s,i)=>s+i.amount,0);
    return { filteredExp, filteredInc, fmtPayMethod, fromAccCode, expNum, incNum, fmtDate, revenueTag,
             kasirRevenue, totalExpByAccount, totalIncBySrc, cogsAccounts, opexAccounts, otherAccounts,
             cogsTotal, opexTotal, otherTotal, totalIncome };
  };

    // Build COGS rows — one debit + one credit per transaction with HPP
    const journalRows = [];
    let noHppSkus = new Set();
    filteredTx.forEach((t, i) => {
      const item = inventory.find(inv => inv.sku === t.sku);
      const hpp = item?.hpp || 0;
      if (!hpp) { noHppSkus.add(t.sku); return; }
      const cogsAmt = hpp * t.jumlah;
      const ref = `COGS-${(t.tanggal||"").replace(/-/g,"").slice(0,8)}-${String(t.id||i).slice(-4)}`;
      const memo = `COGS: ${t.nama} x${t.jumlah} [${t.channel}]`;
      // Debit row: 5-50000 Cost of Goods Sold
      journalRows.push([fmtDate(t.tanggal), ref, memo, "5-50000", "Cost of Goods Sold", cogsAmt, "", t.tanggal]);
      // Credit row: 1-10200 Inventory Finished Products
      journalRows.push([fmtDate(t.tanggal), ref, memo, "1-10200", "Inventory Finished Products", "", cogsAmt, t.tanggal]);
    });
    if (journalRows.length === 0) {

      showToast(`⚠ Tidak ada data COGS — ${missing} SKU belum punya HPP. Set HPP dulu di tab Cek Stok.`, "warning");
      return;

      ["*Date","*Reference","*Memo","*AccountCode","AccountName","*Debit","*Credit","DateISO"],
      ...journalRows
    ]);
    ws["!cols"]=[{wch:12},{wch:24},{wch:40},{wch:14},{wch:28},{wch:14},{wch:14},{wch:12}];
    const wb = XLSX.utils.book_new();

    // Summary sheet
    const hppMap = {};
    filteredTx.forEach(t => {
      const item = inventory.find(inv => inv.sku === t.sku);
      const hpp = item?.hpp || 0;
      if (!hpp) return;
      if (!hppMap[t.sku]) hppMap[t.sku] = { nama: t.nama, qty: 0, total: 0 };
      hppMap[t.sku].qty += t.jumlah;
      hppMap[t.sku].total += hpp * t.jumlah;

        return [sku, d.nama, d.qty, item?.hpp||0, d.total];

    if (!sbClient) { showToast("❌ Sambungkan Supabase dulu!", "danger"); return; }
    showToast("⏳ Menjalankan backfill...");
    let errors = [];

    // Step 1: set revenue_account_code = '4-40000' for all incomes that are null or different
    const { error: e1 } = await sbClient.from('incomes')
      .update({ revenue_account_code: '4-40000' })
      .or('revenue_account_code.is.null,revenue_account_code.neq.4-40000');
    if (e1) errors.push("COA update: " + e1.message);

    // Step 2: backfill tags per channel (only where tags is null)
    for (const [ch, tag] of Object.entries(CHANNEL_TAGS)) {
      const { error: e2 } = await sbClient.from('incomes')
        .update({ tags: tag })
        .eq('channel', ch)
        .is('tags', null);
      if (e2) errors.push(`Tags ${ch}: ${e2.message}`);
    }

    if (errors.length > 0) {
      showToast("⚠️ Backfill selesai dengan error: " + errors.join("; "), "danger");
    } else {
      // Reload incomes from Supabase to reflect updates
      const { data } = await sbClient.from('incomes').select('*').order('date', { ascending: false });

      showToast("✅ Backfill selesai! Semua income → COA 4-40000 + Tags diisi.");
