                      <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: COLORS.brownDark, border: `1px solid ${COLORS.brownLight}`, borderRadius: "0 0 8px 8px", maxHeight: 200, overflowY: "auto", zIndex: 100 }}>
                        {filtWl.slice(0, 20).map(it => (
                          <div key={it.sku} onMouseDown={e => e.preventDefault()} onClick={() => { setWlSku(it.sku); setWlSearch(""); setWlDropOpen(false); }} style={{ padding: "8px 12px", cursor: "pointer", borderBottom: `1px solid ${COLORS.brownLight}30`, fontSize: 12 }}>
                            <span style={{ color: COLORS.cream, fontWeight: 600 }}>{it.nama}</span> <span style={{ color: COLORS.textMuted, fontFamily: "monospace", fontSize: 10 }}>{it.sku}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                <div><label style={s.label}>Qty Diterima</label><input style={s.input} type="number" min="1" value={wlQty} onChange={e => setWlQty(e.target.value)} /></div>
                <div><label style={s.label}>Staff</label><select style={s.select} value={wlStaff} onChange={e => setWlStaff(e.target.value)}>{STAFF_LIST.map(st => <option key={st}>{st}</option>)}</select></div>
              </div>
              <div style={{ marginBottom: 12 }}><label style={s.label}>Vendor</label><input style={s.input} placeholder="Nama vendor / supplier" value={wlVendor} onChange={e => setWlVendor(e.target.value)} /></div>
              <div style={{ marginBottom: 12 }}><label style={s.label}>Harga Beli per Unit (Rp)</label><input style={s.input} type="number" min="0" placeholder="cth: 85000" value={wlHarga} onChange={e => setWlHarga(e.target.value)} /></div>
              {wlHarga && wlQty > 0 && (
                <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 12, color: COLORS.textMuted }}>
                  HPP per pcs: <span style={{ color: COLORS.success, fontWeight: 700 }}>Rp {(parseRp(wlHarga) || 0).toLocaleString("id-ID")}</span> · Total: <span style={{ color: COLORS.cream, fontWeight: 700 }}>Rp {totalWl.toLocaleString("id-ID")}</span>
                  {selItem && <span> · Stok setelah: <span style={{ color: COLORS.success, fontWeight: 700 }}>{(selItem.stok || 0) + (parseInt(wlQty) || 0)}</span></span>}
                </div>
              )}
              <button onClick={() => { handleMasukFlowB({ sku: wlSku, jumlah: wlQty, vendor: wlVendor, hargaBeli: wlHarga, staff: wlStaff }); setWlSku(""); setWlQty(1); setWlVendor(""); setWlHarga(""); setWlStaff(STAFF_LIST[0]); setWlSearch(""); }} style={s.btn("primary")}>Simpan White Label</button>
            </div>
          );
        })()}

        {/* ── Flow A: Vendor Produksi (wizard) ── */}
        {masukFlow === "A" && (
          <div style={{ ...s.card, marginBottom: 20, border: `1px solid ${COLORS.aquaDark}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <div style={s.cardTitle}>Dari Vendor Produksi — Step {masukStep}/3</div>
              <button onClick={() => { setMasukFlow(null); setMasukStep(1); setMasukSelectedPurchase(null); setMasukMaterials([]); setMasukOngkosJahit(0); setMasukShippingGudang(0); setMasukBiayaLain(0); setMasukQtyProduced(0); setMasukProductSku(""); setMasukVendor(""); }} style={{ ...s.btn("secondary"), fontSize: 11, padding: "4px 12px" }}>Batal</button>
            </div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 16 }}>
              {masukStep === 1 ? "Pilih purchase yang sudah ada" : masukStep === 2 ? "Input material & biaya" : "Review & konfirmasi"}
            </div>
            {/* ── STEP 1: Pilih Purchase ── */}
            {masukStep === 1 && (() => {
              const pendingPurchases = purchases.filter(p => p.status === "dp_paid" || p.status === "paid");
              const waBotPurchases = purchases.filter(p => p.source === "wa_bot" && p.status !== "received");
              return (
                <div>
                  {waBotPurchases.length > 0 && (
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.success, marginBottom: 8 }}>📦 Pending dari WA Bot</div>
                      {waBotPurchases.map(p => (
                        <div key={p.id} style={{ background: COLORS.brownDark, borderRadius: 8, padding: "10px 14px", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <div style={{ fontSize: 13, color: COLORS.cream, fontWeight: 600 }}>{p.vendor} <span style={{ background: COLORS.success, color: COLORS.brownDark, fontSize: 9, padding: "1px 6px", borderRadius: 4, fontWeight: 700, marginLeft: 6 }}>WA Bot</span></div>
                            <div style={{ fontSize: 11, color: COLORS.textMuted }}>{p.date} · Rp {(p.total_amount||0).toLocaleString("id-ID")} · {p.status}</div>
                          </div>
                          <button onClick={() => { setMasukSelectedPurchase(p); setMasukVendor(p.vendor); setMasukStep(2); }} style={{ ...s.btn("primary"), fontSize: 11, padding: "6px 14px" }}>Pilih</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {pendingPurchases.length > 0 ? (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.cream, marginBottom: 8 }}>Purchase siap diproses:</div>
                      <div style={{ overflowX: "auto" }}>
                        <table style={s.table}><thead><tr>{["Vendor","Tanggal","Amount","Status",""].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead><tbody>
                          {pendingPurchases.map(p => (
                            <tr key={p.id}>
                              <td style={s.td}><span style={{ fontWeight: 600, color: COLORS.cream }}>{p.vendor}</span>{p.source === "wa_bot" && <span style={{ background: COLORS.success, color: COLORS.brownDark, fontSize: 8, padding: "1px 4px", borderRadius: 3, marginLeft: 4 }}>WA</span>}</td>
                              <td style={s.td}>{p.date}</td>
                              <td style={s.td}>Rp {(p.total_amount||0).toLocaleString("id-ID")}</td>
                              <td style={s.td}><span style={{ background: p.status === "paid" ? COLORS.success+"30" : COLORS.warning+"30", color: p.status === "paid" ? COLORS.success : COLORS.warning, padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600 }}>{p.status}</span></td>
                              <td style={s.td}><button onClick={() => { setMasukSelectedPurchase(p); setMasukVendor(p.vendor); setMasukStep(2); }} style={{ ...s.btn("primary"), fontSize: 10, padding: "4px 12px" }}>Pilih</button></td>
                            </tr>
                          ))}
                        </tbody></table>
                      </div>
                    </div>
                  ) : (
                    <div style={{ textAlign: "center", padding: 20, color: COLORS.textMuted, fontSize: 13 }}>
                      Belum ada purchase dengan status "dp_paid" atau "paid".<br/>
                      <span style={{ fontSize: 11 }}>Buat purchase dulu atau pilih Flow B (White Label).</span>
                    </div>
                  )}
                  <button onClick={() => { setMasukStep(2); }} style={{ ...s.btn("secondary"), marginTop: 12, fontSize: 11 }}>Lanjut tanpa purchase (manual)</button>
                </div>
              );
            })()}

            {/* ── STEP 2: Material & Biaya ── */}
            {masukStep === 2 && (() => {
              const selProd = inventory.find(i => i.sku === masukProductSku);
              const autoFillBom = (sku) => {
                const bomItems = bom.filter(b => b.product_sku === sku);
                if (bomItems.length > 0) {
                  const mats = bomItems.map(b => {
                    const rm = rawMaterials.find(r => r.material_sku === b.material_sku);
                    const qtyNeeded = (b.qty_per_unit || 0) * (parseInt(masukQtyProduced) || 0);
                    return { material_sku: b.material_sku, nama: rm?.nama || b.material_sku, qty: qtyNeeded, hpp_per_unit: rm?.hpp_per_unit || 0, coa_account: rm?.coa_account || "1-10201", tags: rm?.tags || "", satuan: rm?.satuan || "pcs", stok_available: rm?.stok_qty || 0 };
                  });
                  setMasukMaterials(mats);
                  showToast(`✓ Auto-fill ${bomItems.length} material dari BOM`);
                }
              };
              const handleQtyChange = (val) => {
                setMasukQtyProduced(val);
                if (masukMaterials.length > 0 && masukProductSku) {
                  const bomItems = bom.filter(b => b.product_sku === masukProductSku);
                  if (bomItems.length > 0) {
                    setMasukMaterials(prev => prev.map(m => {
                      const bi = bomItems.find(b => b.material_sku === m.material_sku);
                      return bi ? { ...m, qty: (bi.qty_per_unit || 0) * (parseInt(val) || 0) } : m;
                    }));
                  }
                }
              };
              const addMaterial = (msku) => {
                if (masukMaterials.find(m => m.material_sku === msku)) { showToast("Material sudah ada", "warning"); return; }
                const rm = rawMaterials.find(r => r.material_sku === msku);
                if (!rm) return;
                setMasukMaterials(prev => [...prev, { material_sku: msku, nama: rm.nama, qty: 0, hpp_per_unit: rm.hpp_per_unit || 0, coa_account: rm.coa_account || "1-10201", tags: rm.tags || "", satuan: rm.satuan || "pcs", stok_available: rm.stok_qty || 0 }]);
              };
              const updateMat = (idx, field, val) => setMasukMaterials(prev => prev.map((m, i) => i === idx ? { ...m, [field]: val } : m));
              const removeMat = (idx) => setMasukMaterials(prev => prev.filter((_, i) => i !== idx));
              const matTotal = masukMaterials.reduce((acc, m) => acc + ((parseRp(m.qty) || 0) * (parseRp(m.hpp_per_unit) || 0)), 0);
              return (
                <div>
                  {masukSelectedPurchase && (
                    <div style={{ background: COLORS.aqua+"10", border: `1px solid ${COLORS.aqua}30`, borderRadius: 8, padding: "8px 12px", marginBottom: 14, fontSize: 11, color: COLORS.textMuted }}>
                      Purchase: <span style={{ color: COLORS.cream, fontWeight: 600 }}>{masukSelectedPurchase.vendor}</span> · {masukSelectedPurchase.date} · Rp {(masukSelectedPurchase.total_amount||0).toLocaleString("id-ID")}
                    </div>
                  )}
                  {/* SKU Produk Jadi */}
                  <div style={{ marginBottom: 12 }}>
                    <label style={s.label}>SKU Produk Jadi</label>
                    <select style={s.select} value={masukProductSku} onChange={e => { setMasukProductSku(e.target.value); autoFillBom(e.target.value); }}>
                      <option value="">-- Pilih produk --</option>
                      {inventory.filter(i => !i.discontinued).map(i => <option key={i.sku} value={i.sku}>{i.nama} ({i.sku})</option>)}
                    </select>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                    <div><label style={s.label}>Qty Diterima</label><input style={s.input} type="number" min="1" value={masukQtyProduced} onChange={e => handleQtyChange(e.target.value)} /></div>
                    <div><label style={s.label}>Vendor</label><input style={s.input} value={masukVendor} onChange={e => setMasukVendor(e.target.value)} placeholder="Nama vendor" /></div>
                  </div>
                  {/* Material consumed */}
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <label style={{ ...s.label, margin: 0 }}>Material yang Dikonsumsi</label>
                      {masukProductSku && bom.filter(b => b.product_sku === masukProductSku).length > 0 && masukMaterials.length === 0 && (
                        <button onClick={() => autoFillBom(masukProductSku)} style={{ ...s.btn("secondary"), fontSize: 10, padding: "3px 8px" }}>Auto-fill BOM</button>
                      )}
                    </div>
                    {masukMaterials.length > 0 && (
                      <div style={{ overflowX: "auto" }}>
                        <table style={s.table}><thead><tr>{["Material","Qty","HPP/unit","Total",""].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead><tbody>
                          {masukMaterials.map((m, idx) => (
                            <tr key={idx}>
                              <td style={s.td}><span style={{ fontSize: 12, color: COLORS.cream }}>{m.nama}</span><br/><span style={{ fontSize: 9, color: COLORS.textMuted }}>{m.material_sku}{m.stok_available !== undefined ? ` · stok: ${m.stok_available}` : ""}</span></td>
                              <td style={s.td}><input style={{ ...s.input, width: 60, padding: "4px 6px", fontSize: 12 }} type="number" min="0" value={m.qty} onChange={e => updateMat(idx, "qty", e.target.value)} /></td>
                              <td style={s.td}><input style={{ ...s.input, width: 80, padding: "4px 6px", fontSize: 12 }} type="number" min="0" value={m.hpp_per_unit} onChange={e => updateMat(idx, "hpp_per_unit", e.target.value)} /></td>
                              <td style={{ ...s.td, fontWeight: 600, color: COLORS.cream }}>{((parseRp(m.qty)||0)*(parseRp(m.hpp_per_unit)||0)).toLocaleString("id-ID")}</td>
                              <td style={s.td}><button onClick={() => removeMat(idx)} style={{ background: COLORS.danger+"20", color: COLORS.danger, border: "none", borderRadius: 4, padding: "2px 6px", fontSize: 10, cursor: "pointer" }}>×</button></td>
                            </tr>
                          ))}
                        </tbody></table>
                      </div>
                    )}
                    <div style={{ marginTop: 8 }}>
                      <select style={{ ...s.select, fontSize: 11 }} value="" onChange={e => { if (e.target.value) addMaterial(e.target.value); }}>
                        <option value="">+ Tambah Material...</option>
                        {rawMaterials.filter(rm => !masukMaterials.find(m => m.material_sku === rm.material_sku)).map(rm => <option key={rm.material_sku} value={rm.material_sku}>{rm.nama} ({rm.material_sku}) — stok: {rm.stok_qty}</option>)}
                      </select>
                    </div>
                    {masukMaterials.length > 0 && <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 6 }}>Subtotal material: <span style={{ color: COLORS.cream, fontWeight: 600 }}>Rp {matTotal.toLocaleString("id-ID")}</span></div>}
                  </div>
                  {/* Biaya Tambahan */}
                  <div style={{ background: COLORS.brownDark, borderRadius: 8, padding: 14, marginBottom: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.cream, marginBottom: 10 }}>Biaya Tambahan</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                      <div><label style={{ fontSize: 10, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Ongkos Jahit (Rp)</label><input style={s.input} type="number" min="0" value={masukOngkosJahit} onChange={e => setMasukOngkosJahit(e.target.value)} /></div>
                      <div><label style={{ fontSize: 10, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Shipping Gudang (Rp)</label><input style={s.input} type="number" min="0" value={masukShippingGudang} onChange={e => setMasukShippingGudang(e.target.value)} /></div>
                      <div><label style={{ fontSize: 10, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Biaya Lain (Rp)</label><input style={s.input} type="number" min="0" value={masukBiayaLain} onChange={e => setMasukBiayaLain(e.target.value)} /></div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setMasukStep(1)} style={{ ...s.btn("secondary"), flex: 1 }}>Kembali</button>
                    <button onClick={() => { if (!masukProductSku) { showToast("Pilih produk dulu!", "danger"); return; } if (masukQtyProduced <= 0) { showToast("Isi qty!", "danger"); return; } if (masukMaterials.length === 0) { showToast("Tambah minimal 1 material!", "danger"); return; } setMasukStep(3); }} style={{ ...s.btn("primary"), flex: 2 }}>Lanjut → Summary</button>
                  </div>
                </div>
              );
            })()}

            {/* ── STEP 3: Summary & Konfirmasi ── */}
            {masukStep === 3 && (() => {
              const selProd = inventory.find(i => i.sku === masukProductSku);
              const matTotal = masukMaterials.reduce((acc, m) => acc + ((parseRp(m.qty)||0) * (parseRp(m.hpp_per_unit)||0)), 0);
              const ongkos = parseRp(masukOngkosJahit) || 0;
              const shipping = parseRp(masukShippingGudang) || 0;
              const lain = parseRp(masukBiayaLain) || 0;
              const totalCost = matTotal + ongkos + shipping + lain;
              const qty = parseInt(masukQtyProduced) || 0;
              const hppPcs = qty > 0 ? Math.round(totalCost / qty) : 0;
              const lowStockWarnings = masukMaterials.filter(m => { const rm = rawMaterials.find(r => r.material_sku === m.material_sku); return rm && (parseRp(m.qty) || 0) > (rm.stok_qty || 0); });
              return (
                <div>
                  <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 16, marginBottom: 14 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.cream, marginBottom: 10 }}>{selProd?.nama || masukProductSku} × {qty} pcs</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted }}><span>Total Material ({masukMaterials.length} jenis)</span><span style={{ color: COLORS.cream }}>Rp {matTotal.toLocaleString("id-ID")}</span></div>
                      {ongkos > 0 && <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted }}><span>Ongkos Jahit</span><span style={{ color: COLORS.cream }}>Rp {ongkos.toLocaleString("id-ID")}</span></div>}
                      {shipping > 0 && <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted }}><span>Shipping Gudang</span><span style={{ color: COLORS.cream }}>Rp {shipping.toLocaleString("id-ID")}</span></div>}
                      {lain > 0 && <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.textMuted }}><span>Biaya Lain</span><span style={{ color: COLORS.cream }}>Rp {lain.toLocaleString("id-ID")}</span></div>}
                      <div style={{ borderTop: `1px solid ${COLORS.brownLight}`, marginTop: 6, paddingTop: 8, display: "flex", justifyContent: "space-between", fontWeight: 700 }}>
                        <span style={{ color: COLORS.cream }}>Total HPP Batch</span><span style={{ color: COLORS.cream }}>Rp {totalCost.toLocaleString("id-ID")}</span>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 800, fontSize: 14 }}>
                        <span style={{ color: COLORS.success }}>HPP per pcs</span><span style={{ color: COLORS.success }}>Rp {hppPcs.toLocaleString("id-ID")}</span>
                      </div>
                    </div>
                  </div>
                  {/* Material detail */}
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.textMuted, marginBottom: 6 }}>Detail Material:</div>
                    {masukMaterials.map((m, i) => (
                      <div key={i} style={{ fontSize: 11, color: COLORS.textMuted, padding: "3px 0", display: "flex", justifyContent: "space-between" }}>
                        <span>{m.nama} — {m.qty} {m.satuan} @{(parseRp(m.hpp_per_unit)||0).toLocaleString("id-ID")}</span>
                        <span style={{ color: COLORS.cream }}>Rp {((parseRp(m.qty)||0)*(parseRp(m.hpp_per_unit)||0)).toLocaleString("id-ID")}</span>
                      </div>
                    ))}
                  </div>
                  {/* Warnings */}
                  {lowStockWarnings.length > 0 && (
                    <div style={{ background: COLORS.danger+"15", border: `1px solid ${COLORS.danger}40`, borderRadius: 8, padding: "10px 14px", marginBottom: 14 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.danger, marginBottom: 4 }}>⚠ Stok Bahan Baku Tidak Cukup</div>
                      {lowStockWarnings.map((m, i) => {
                        const rm = rawMaterials.find(r => r.material_sku === m.material_sku);
                        return <div key={i} style={{ fontSize: 11, color: COLORS.danger }}>{m.nama}: butuh {m.qty}, stok {rm?.stok_qty || 0}</div>;
                      })}
                    </div>
                  )}
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setMasukStep(2)} style={{ ...s.btn("secondary"), flex: 1 }}>Kembali</button>
                    <button onClick={handleMasukFlowA} style={{ ...s.btn("primary"), flex: 2, background: COLORS.success, color: COLORS.brownDark }}>Konfirmasi Produksi Masuk</button>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* Pengembalian Pinjaman Section */}
        {activePinjaman.length > 0 && (
          <div style={{ ...s.card, marginTop: 20, border: `1px solid ${COLORS.aquaDark}` }}>
            <div style={s.cardTitle}>⇄ Pengembalian Pinjaman</div>
            <p style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12 }}>Barang yang sedang dipinjam — klik "Kembalikan" untuk mengembalikan stok.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {activePinjaman.map(p => {
                const item = inventory.find(i => i.sku === p.sku);
                return (
                  <div key={p.id} style={{ background: COLORS.brownDark, borderRadius: 8, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.cream }}>{p.nama}</div>
                      <div style={{ fontSize: 11, color: COLORS.textMuted }}>{p.peminjam} · {p.jumlah} pcs · {p.tanggal}</div>
                    </div>
                    <button onClick={() => {
                      handleKembali(p.id);
                      const tx = { id: Date.now(), tanggal: new Date().toISOString().split("T")[0], tipe: "masuk", channel: "-", harga: item?.harga || 0, sku: p.sku, nama: p.nama, jumlah: p.jumlah, shipping: "none", shippingCost: 0, catatan: `Pengembalian pinjaman dari ${p.peminjam}`, staff: p.staff || STAFF_LIST[0] };
                      setTransactions(prev => [tx, ...prev]);
                      sbInsertTx(tx);
                      showToast(`✓ ${p.nama} dikembalikan dari ${p.peminjam} — stok +${p.jumlah}`);
                    }} style={{ background: COLORS.success, color: COLORS.brownDark, border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                      Kembalikan
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{ ...s.card, marginTop: 20 }}>
          <div style={s.cardTitle}>Riwayat Masuk Terbaru</div>
          <table style={s.table}>
            <thead><tr>{["Tanggal", "SKU", "Nama", "Jumlah", "Staff", ""].map(h => <th key={h} style={s.th}>{h}</th>)}</tr></thead>
            <tbody>
              {transactions.filter(t => t.tipe === "masuk").slice(0, 8).map(t => (
                <tr key={t.id}><td style={s.td}>{t.tanggal}</td><td style={s.td}><span style={s.skuBadge}>{t.sku}</span></td><td style={s.td}>{t.nama}</td><td style={{ ...s.td, color: COLORS.success, fontWeight: 600 }}>+{t.jumlah}</td><td style={s.td}>{t.staff}</td>
                <td style={{ ...s.td, whiteSpace: "nowrap" }}>
                  {isProductionTx(t) ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ fontSize: 9, color: COLORS.textMuted }}>🔒</span>

    laporan: () => {
      // Date filter logic
      const now = new Date();
      const todayStr = now.toISOString().split("T")[0];
      const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - now.getDay());
      const weekStr = startOfWeek.toISOString().split("T")[0];
      const monthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;

      const filteredTx = transactions.filter(t => {
        if (laporanPeriod === "semua") return true;
        if (!t.tanggal) return false;
        if (laporanPeriod === "hari") return t.tanggal === todayStr;
        if (laporanPeriod === "minggu") return t.tanggal >= weekStr;
        if (laporanPeriod === "bulan") return t.tanggal.startsWith(monthStr);
        return true;
      });

      const totalMasuk = filteredTx.filter(t => t.tipe === "masuk").reduce((a, t) => a + t.jumlah, 0);
      const totalKeluar = filteredTx.filter(t => t.tipe === "keluar").reduce((a, t) => a + t.jumlah, 0);
      const totalRusak = filteredTx.filter(t => t.tipe === "rusak").reduce((a, t) => a + t.jumlah, 0);
      const totalRevenueBruto = filteredTx.filter(t => t.tipe === "keluar").reduce((a, t) => a + (t.harga || 0) * t.jumlah, 0);
      const totalDiskon = filteredTx.filter(t => t.tipe === "keluar").reduce((a, t) => a + (t.diskon || 0), 0);
      // Sync with Keuangan: kasirRev from transactions + non-kasir incomes from incomes table
      const allKeluar = filteredTx.filter(t => t.tipe === "keluar");
      const kasirChs = [...Object.keys(CHANNEL_SOURCE_MAP), "terjual", "direct"];
      const kasirRevLaporan = filterByPeriod(
        transactions.filter(t => t.tipe === "keluar" && kasirChs.includes(t.channel)),
        laporanPeriod
      ).reduce((sum, t) => sum + (t.jumlah * t.harga), 0);
      const nonKasirIncLaporan = filterByPeriod(
        incomes.filter(i => !["b2c_direct", "event"].includes(i.source_type)),
        laporanPeriod
      ).reduce((s, i) => s + i.amount, 0);
      const totalRevenue = kasirRevLaporan + nonKasirIncLaporan - totalDiskon;
      // Expense totals synced with Keuangan
      const laporanExpenses = filterByPeriod(expenses, laporanPeriod);
      const laporanCogsTotal = laporanExpenses.filter(e => (e.account_code || "").startsWith("5-")).reduce((s, e) => s + e.amount, 0);
      const laporanOpexTotal = laporanExpenses.filter(e => (e.account_code || "").startsWith("6-")).reduce((s, e) => s + e.amount, 0);
      const laporanOtherExpTotal = laporanExpenses.filter(e => (e.account_code || "").startsWith("8-")).reduce((s, e) => s + e.amount, 0);
      const laporanTotalExp = laporanExpenses.reduce((s, e) => s + e.amount, 0);
      const laporanGrossProfit = totalRevenue - laporanCogsTotal;
      const laporanOperatingProfit = laporanGrossProfit - laporanOpexTotal;
      const laporanNetProfit = laporanOperatingProfit - laporanOtherExpTotal;
      const chFiltered = {
        kasir: allKeluar.filter(t => kasirChs.includes(t.channel)).reduce((a, t) => a + t.jumlah, 0),
        shopee: allKeluar.filter(t => t.channel === "shopee").reduce((a, t) => a + t.jumlah, 0),
        tokopedia: allKeluar.filter(t => ["tokopedia","tiktok"].includes(t.channel)).reduce((a, t) => a + t.jumlah, 0),
        consignment: allKeluar.filter(t => t.channel === "consignment").reduce((a, t) => a + t.jumlah, 0),
        b2b: allKeluar.filter(t => t.channel === "b2b").reduce((a, t) => a + t.jumlah, 0),
        kol: allKeluar.filter(t => t.channel === "kol").reduce((a, t) => a + t.jumlah, 0),
      };
      const shippingExpense = filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "plai").reduce((a, t) => a + (t.shippingCost || 0), 0);
      const shippingExpenseList = filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "plai");
      const pelangganShipRevenue = filteredTx.filter(t => t.tipe === "keluar" && t.shipping === "pelanggan").reduce((a, t) => a + (t.pelangganShipCost || 0), 0);
      const marketplaceCount = filteredTx.filter(t => t.tipe === "keluar" && t.marketplace).length;

      const handleEditSave = (updated) => {
        setTransactions(prev => prev.map(t => t.id === updated.id ? { ...t, ...updated } : t));
        setEditingTx(null);
        showToast("✓ Transaksi berhasil diupdate!");
        // Sync to Supabase
        const { id, ...rest } = updated;
        sbUpdateTx(updated.id, rest);
        // Recalculate inventory if jumlah changed
        const original = transactions.find(t => t.id === updated.id);
        if (original && original.jumlah !== updated.jumlah) {
          const diff = updated.jumlah - original.jumlah;
          if (original.tipe === "keluar" || original.tipe === "rusak") {
            // more keluar = less stock
            const item = inventory.find(i => i.sku === original.sku);
            if (item) {
              const newStok = Math.max(0, item.stok - diff);
              setInventory(prev => prev.map(i => i.sku === original.sku ? { ...i, stok: newStok } : i));
              sbUpsertInventory(original.sku, newStok);
            }
          } else if (original.tipe === "masuk") {
            const item = inventory.find(i => i.sku === original.sku);
            if (item) {
              const newStok = Math.max(0, item.stok + diff);
              setInventory(prev => prev.map(i => i.sku === original.sku ? { ...i, stok: newStok } : i));
              sbUpsertInventory(original.sku, newStok);
            }
          }
        }
      };

      // Rekap data for each period
      const txToday = transactions.filter(t => t.tanggal === todayStr);
      const tx7Days = transactions.filter(t => {
        if (!t.tanggal) return false;
        const d = new Date(t.tanggal);
        const diff = (now - d) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff < 7;
      });
      const txMonth = transactions.filter(t => t.tanggal && t.tanggal.startsWith(monthStr));

      const rekapCalc = (arr) => ({
        total: arr.length,
        masuk: arr.filter(t => t.tipe === "masuk").reduce((a, t) => a + t.jumlah, 0),
        keluar: arr.filter(t => t.tipe === "keluar").reduce((a, t) => a + t.jumlah, 0),
        rusak: arr.filter(t => t.tipe === "rusak").reduce((a, t) => a + t.jumlah, 0),

    label: () => {

      const toggleAll = () => {
        const next = {};

        setSelectedLabels(prev => ({ ...prev, ...next }));

              <button

  stok int default 0, minimum int default 3,

);

  jumlah int, peminjam text, kembali text, staff text
);
create table if not exists barcode_map (
  barcode text primary key,
  sku text not null
);
alter table inventory disable row level security;
alter table transactions disable row level security;
alter table pinjaman disable row level security;
alter table barcode_map disable row level security;

-- Migration: tambah kolom baru (aman dijalankan ulang)
DO $$ BEGIN
  ALTER TABLE transactions ADD COLUMN IF NOT EXISTS "pelangganShipCost" int DEFAULT 0;
  ALTER TABLE transactions ADD COLUMN IF NOT EXISTS marketplace boolean DEFAULT false;
EXCEPTION WHEN others THEN NULL;
END $$;`;

      const handleConnect = () => {

        if (!window.supabase) return showToast("Supabase library belum siap, refresh halaman", "danger");

          localStorage.setItem('plai_sbkey', sbInputKey.trim());
          setSbUrl(sbInputUrl.trim());
          setSbKey(sbInputKey.trim());
          const client = window.supabase.createClient(sbInputUrl.trim(), sbInputKey.trim());
          setSbClient(client);
          setSbConnected(false);
          showToast("Menghubungkan ke database...");
        } catch(e) { showToast("Error: " + e.message, "danger"); }
      };

      const handleUploadLocal = async () => {
        if (!sbClient) return showToast("Konek ke database dulu!", "danger");
        setSbSyncing(true);
        try {
          await sbClient.from('inventory').upsert(inventory);
          if (transactions.length > 0) await sbClient.from('transactions').upsert(transactions);
          if (pinjaman.length > 0) await sbClient.from('pinjaman').upsert(pinjaman);

          if (bmRows.length > 0) await sbClient.from('barcode_map').upsert(bmRows).catch(() => {});

                        style={{ width: 40, height: 22, borderRadius: 11, background: kasirMarketplace ? COLORS.aqua : COLORS.brownLight, cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                        <div style={{ width: 18, height: 18, borderRadius: 9, background: COLORS.white, position: "absolute", top: 2, left: kasirMarketplace ? 20 : 2, transition: "left 0.2s" }} />
                      </div>
                      <span style={{ fontSize: 12, color: kasirMarketplace ? COLORS.aqua : COLORS.textMuted, fontWeight: kasirMarketplace ? 600 : 400 }}>Dari Marketplace</span>
                    </div>
                    {!kasirMarketplace && (
                      <div>
                        <label style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4, display: "block" }}>Biaya Shipping dari Pelanggan (opsional)</label>
                        <input type="number" min="0" placeholder="cth: 15000" value={kasirPelangganShipCost} onChange={e => setKasirPelangganShipCost(e.target.value)} style={{ ...s.input, fontSize: 13 }} />
                        <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 3 }}>Kosongkan jika tidak perlu di-track</div>
                      </div>
                    )}
                    {kasirMarketplace && (
                      <div style={{ fontSize: 10, color: COLORS.aquaDark, marginTop: 4 }}>Shipping dihandle marketplace — tidak perlu track biaya</div>
                    )}
                  </div>
                )}
              </div>

              {/* Channel — Event only */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>📣 Channel</label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {[["event","🛍️","Event / Bazaar"]].map(([val, icon, lbl]) => (
                    <button key={val} onClick={() => setKasirChannel(val)}
                      style={{ ...s.btn(kasirChannel === val ? "primary" : "secondary"), flex: 1, fontSize: 11, padding: "7px 3px" }}>{icon} {lbl}</button>
                  ))}
                </div>
                <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>
                  Mode: Event &amp; Bazaar Offline · Tag: {CHANNEL_TAGS[kasirChannel] || "-"}
                </div>
              </div>

              {/* Staff */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>Staff</label>
                <select style={{ ...s.select, fontSize: 13 }} value={kasirStaff} onChange={e => setKasirStaff(e.target.value)}>
                  {STAFF_LIST.map(st => <option key={st}>{st}</option>)}
                </select>
              </div>

              {/* Tanggal */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>📅 Tanggal</label>
                <input type="date" style={{ ...s.input, fontSize: 13 }} value={kasirTanggal} onChange={e => setKasirTanggal(e.target.value)} max={new Date().toISOString().split("T")[0]} />
                {kasirTanggal !== new Date().toISOString().split("T")[0] && (
                  <div style={{ fontSize: 11, color: COLORS.warning, marginTop: 4 }}>⚠ Bukan tanggal hari ini</div>
                )}
              </div>

              {/* Keterangan / Event */}
              <div style={{ marginBottom: 12 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>📝 Keterangan / Event</label>
                <input type="text" style={{ ...s.input, fontSize: 13 }} placeholder="cth: Bazaar Grand Indonesia" value={kasirKeterangan} onChange={e => setKasirKeterangan(e.target.value)} />
              </div>

              {/* No. Invoice Manual */}
              <div style={{ marginBottom: 14 }}>
                <label style={{ ...s.label, marginBottom: 6 }}>🧾 No. Invoice <span style={{ color: COLORS.textMuted, fontWeight: 400 }}>(opsional)</span></label>
                <input type="text" style={{ ...s.input, fontSize: 13 }} placeholder="cth: INV/2026/03/001" value={kasirInvoiceManual} onChange={e => setKasirInvoiceManual(e.target.value)} />
                {!kasirInvoiceManual.trim() && <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 3 }}>Kosong = nomor otomatis</div>}
              </div>

              <button onClick={confirmKasir} disabled={cart.length === 0}
                style={{ ...s.btn("primary"), width: "100%", padding: "13px 0", fontSize: 15, fontWeight: 800,
                  background: cart.length === 0 ? COLORS.brownLight : COLORS.aqua, cursor: cart.length === 0 ? "not-allowed" : "pointer" }}>
                ✓ Bayar {cart.length > 0 ? fmt(total) : ""}
              </button>
            </div>
          </div>
        </div>
      );
    },
    keuangan: () => {
      const filteredExpenses = filterByPeriod(expenses, keuanganPeriod);
      // Exclude auto-income records yang dibuat oleh kasir (source_type: b2c_direct / event)
      // karena revenue kasir sudah dihitung lewat kasirRev dari transactions — hindari double-count
      const filteredIncomes = filterByPeriod(
        incomes.filter(i => !["b2c_direct", "event"].includes(i.source_type)),
        keuanganPeriod
      );
      const totalExp = filteredExpenses.reduce((s, e) => s + e.amount, 0);
      const totalInc = filteredIncomes.reduce((s, i) => s + i.amount, 0);
      // kasirRev: semua channel kasir langsung (event/wa/dm/web + legacy terjual/direct) dari transactions
      // filteredIncomes sudah exclude auto-income b2c_direct/event untuk hindari double-count
      const kasirChs = [...Object.keys(CHANNEL_SOURCE_MAP), "terjual", "direct"];
      const kasirRev = filterByPeriod(
        transactions.filter(t => t.tipe === "keluar" && kasirChs.includes(t.channel)),
        keuanganPeriod
      ).reduce((sum, t) => sum + (t.jumlah * t.harga), 0);
      const totalRevenue = kasirRev + totalInc;

      const subTabs = [
        { id: "expense", label: "Pengeluaran", icon: "📤" },
        { id: "income", label: "Pemasukan", icon: "📥" },
        { id: "summary", label: "Ringkasan", icon: "📊" },
        { id: "export", label: "Export", icon: "📁" },
      ];

      return (
        <div style={{ maxWidth: 700, margin: "0 auto" }}>
          {/* Sub-tab navigation */}
          <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
            {subTabs.map(st => (
              <button key={st.id} onClick={() => setKeuanganTab(st.id)}
                style={{ flex: 1, minWidth: 70, padding: "10px 8px", background: keuanganTab === st.id ? COLORS.aqua : COLORS.brownDark,
                  color: keuanganTab === st.id ? COLORS.brownDark : COLORS.cream, border: `1px solid ${keuanganTab === st.id ? COLORS.aqua : COLORS.brownLight}`,
                  borderRadius: 8, fontWeight: keuanganTab === st.id ? 700 : 400, fontSize: 12, cursor: "pointer", textAlign: "center" }}>
                <div style={{ fontSize: 16 }}>{st.icon}</div>
                {st.label}
              </button>
            ))}
          </div>

          {/* Period filter */}
          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {["hari", "minggu", "bulan", "semua"].map(p => (
              <button key={p} onClick={() => setKeuanganPeriod(p)}
                style={{ padding: "6px 14px", background: keuanganPeriod === p ? COLORS.aqua : "transparent",
                  color: keuanganPeriod === p ? COLORS.brownDark : COLORS.textMuted, border: `1px solid ${keuanganPeriod === p ? COLORS.aqua : COLORS.brownLight}`,
                  borderRadius: 20, fontSize: 12, fontWeight: keuanganPeriod === p ? 700 : 400, cursor: "pointer", textTransform: "capitalize" }}>
                {p}
              </button>
            ))}
          </div>

          {/* Quick stats bar */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 20 }}>
            <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, textAlign: "center", border: `1px solid ${COLORS.brownLight}` }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Pemasukan</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.success }}>{fmt(totalRevenue)}</div>
            </div>
            <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, textAlign: "center", border: `1px solid ${COLORS.brownLight}` }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Pengeluaran</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.danger }}>{fmt(totalExp)}</div>
            </div>
            <div style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, textAlign: "center", border: `1px solid ${COLORS.brownLight}` }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Laba</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: totalRevenue - totalExp >= 0 ? COLORS.success : COLORS.danger }}>{fmt(totalRevenue - totalExp)}</div>
            </div>
          </div>

          {/* ── EXPENSE TAB ── */}
          {keuanganTab === "expense" && (
            <div>
              <div style={{ background: COLORS.brownDark, borderRadius: 12, padding: 16, marginBottom: 16, border: `1px solid ${COLORS.brownLight}` }}>
                <h3 style={{ color: COLORS.aqua, marginBottom: 12, fontSize: 15 }}>📤 Catat Pengeluaran</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Tanggal</label>
                    <input type="date" value={expDate} onChange={e => setExpDate(e.target.value)}
                      style={{ ...s.input, width: "100%" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Jumlah (Rp)</label>
                    <input type="number" value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0"
                      style={{ ...s.input, width: "100%" }} />
                  </div>
                </div>
                <div style={{ marginTop: 10 }}>
                  <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Akun (Jurnal.id)</label>
                  <select value={expAccount} onChange={e => setExpAccount(e.target.value)}
                    style={{ ...s.input, width: "100%" }}>
                    <option value="">— Pilih Akun —</option>
                    <optgroup label="Cost of Sales">
                      {JURNAL_ACCOUNTS.filter(a => a.group === "COGS").map(a => (
                        <option key={a.code} value={a.code}>{a.code} — {a.name}</option>
                      ))}
                    </optgroup>
                    <optgroup label="Selling Expenses">
                      {JURNAL_ACCOUNTS.filter(a => a.group === "Selling").map(a => (
                        <option key={a.code} value={a.code}>{a.code} — {a.name}</option>
                      ))}
                    </optgroup>
                    <optgroup label="General & Admin">
                      {JURNAL_ACCOUNTS.filter(a => a.group === "G&A").map(a => (
                        <option key={a.code} value={a.code}>{a.code} — {a.name}</option>
                      ))}
                    </optgroup>
                    <optgroup label="Other">
                      {JURNAL_ACCOUNTS.filter(a => a.group === "Other").map(a => (
                        <option key={a.code} value={a.code}>{a.code} — {a.name}</option>
                      ))}
                    </optgroup>
                  </select>
                </div>
                <div style={{ marginTop: 10 }}>
                  <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Deskripsi</label>
                  <input type="text" value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="e.g. Bayar JNE, Meta Ads, Gaji Sasa..."
                    style={{ ...s.input, width: "100%" }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 10 }}>
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Metode Bayar</label>
                    <select value={expPayMethod} onChange={e => setExpPayMethod(e.target.value)}
                      style={{ ...s.input, width: "100%" }}>
                      <option value="transfer">Transfer Bank</option>
                      <option value="cash">Cash</option>
                      <option value="ewallet">E-Wallet</option>
                      <option value="cc">Kartu Kredit</option>
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Penerima</label>
                    <input type="text" value={expRecipient} onChange={e => setExpRecipient(e.target.value)} placeholder="Nama penerima"
                      style={{ ...s.input, width: "100%" }} />
                  </div>
                </div>
                <button onClick={addExpense}
                  style={{ ...s.btn("primary"), width: "100%", marginTop: 12, padding: "11px 0", fontWeight: 700 }}>
                  + Simpan Pengeluaran
                </button>
              </div>

              {/* Expense list */}
              <h3 style={{ color: COLORS.cream, marginBottom: 8, fontSize: 14 }}>Riwayat Pengeluaran ({filteredExpenses.length})</h3>
              {filteredExpenses.length === 0 && <div style={{ color: COLORS.textMuted, fontSize: 13, textAlign: "center", padding: 30 }}>Belum ada data pengeluaran</div>}
              {filteredExpenses.map(exp => (
                <div key={exp.id} style={{ background: COLORS.brownDark, borderRadius: 10, padding: 12, marginBottom: 8, border: `1px solid ${COLORS.brownLight}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 13, color: COLORS.cream }}>{exp.account_name}</div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>{exp.date} · {exp.description || "-"}{exp.recipient ? ` → ${exp.recipient}` : ""}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontWeight: 700, color: COLORS.danger, fontSize: 14 }}>-{fmt(exp.amount)}</div>
                    <button onClick={() => deleteExpense(exp.id)}
                      style={{ background: "transparent", border: "none", color: COLORS.textMuted, fontSize: 10, cursor: "pointer", marginTop: 2 }}>hapus</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── INCOME TAB ── */}
          {keuanganTab === "income" && (
            <div>
              {/* Sub-type selector */}
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                {[["marketplace","🛒 Marketplace Settlement"],["consignment","🏪 Consignment"],["other","💵 Lainnya"]].map(([id, lbl]) => (
                  <button key={id} onClick={() => setIncSubType(id)}
                    style={{ ...s.btn(incSubType === id ? "primary" : "secondary"), flex: 1, fontSize: 11, padding: "8px 4px" }}>{lbl}</button>
                ))}
              </div>

              {/* MARKETPLACE SETTLEMENT FORM */}
              {incSubType === "marketplace" && (
                <div style={{ background: COLORS.brownDark, borderRadius: 12, padding: 16, marginBottom: 16, border: `1px solid ${COLORS.aquaDark}` }}>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 4, fontSize: 14 }}>🛒 Marketplace Settlement</h3>
                  <p style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 12 }}>Catat saat uang settlement dari platform cair ke rekening. Stok sudah tercatat di Barang Keluar.</p>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Platform</label>
                      <select value={mktSettlePlatform} onChange={e => setMktSettlePlatform(e.target.value)} style={{ ...s.input, width: "100%" }}>
                        <option>Shopee</option><option>Tokopedia</option><option>TikTok Shop</option>
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Tanggal Cair</label>
                      <input type="date" value={mktSettleDate} onChange={e => setMktSettleDate(e.target.value)} style={{ ...s.input, width: "100%" }} />
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Jumlah Settlement (Rp) *</label>
                      <input type="number" value={mktSettleAmount} onChange={e => setMktSettleAmount(e.target.value)} placeholder="Nominal yang masuk ke rekening" style={{ ...s.input, width: "100%" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>No. Disbursement / Referensi</label>
                      <input type="text" value={mktSettleRef} onChange={e => setMktSettleRef(e.target.value)} placeholder="cth: DISB-20260318-xxx" style={{ ...s.input, width: "100%" }} />
                    </div>
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Catatan (opsional)</label>
                    <input type="text" value={mktSettleNotes} onChange={e => setMktSettleNotes(e.target.value)} placeholder="cth: Settlement minggu 10-16 Maret" style={{ ...s.input, width: "100%" }} />
                  </div>
                  <button onClick={addMarketplaceSettlement} style={{ ...s.btn("primary"), width: "100%", padding: "11px 0", fontWeight: 700 }}>+ Simpan Settlement</button>
                </div>
              )}

              {/* CONSIGNMENT SETTLEMENT FORM */}
              {incSubType === "consignment" && (
                <div style={{ background: COLORS.brownDark, borderRadius: 12, padding: 16, marginBottom: 16, border: `1px solid ${COLORS.brownLight}` }}>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 4, fontSize: 14 }}>🏪 Consignment Settlement</h3>
                  <p style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 12 }}>Catat laporan penjualan dari toko consignment.</p>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Nama Toko *</label>
                      <input type="text" value={consToko} onChange={e => setConsToko(e.target.value)} placeholder="cth: Hotel Tentrem" style={{ ...s.input, width: "100%" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Tanggal Laporan</label>
                      <input type="date" value={consDate} onChange={e => setConsDate(e.target.value)} style={{ ...s.input, width: "100%" }} />
                    </div>
                  </div>
                  <div style={{ marginBottom: 8 }}>
                    <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>🔗 No. Referensi Konsinyasi <span style={{ color: COLORS.textMuted, fontStyle: "italic" }}>(opsional)</span></label>
                    <input type="text" value={consRef} onChange={e => setConsRef(e.target.value)} placeholder="Isi no. invoice pengiriman barang ke toko (dari Tab Barang Keluar)" style={{ ...s.input, width: "100%" }} />
                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 3 }}>Sebagai referensi untuk mencocokkan dengan catatan pengiriman</div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 8, marginBottom: 8 }}>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Nama Produk *</label>
                      <input type="text" value={consProduk} onChange={e => setConsProduk(e.target.value)} placeholder="cth: Jersey Home XL" style={{ ...s.input, width: "100%" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Qty</label>
                      <input type="number" min="1" value={consQty} onChange={e => setConsQty(e.target.value)} style={{ ...s.input, width: "100%" }} />
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Harga Jual / pcs (Rp) *</label>
                      <input type="number" value={consHarga} onChange={e => setConsHarga(e.target.value)} placeholder="0" style={{ ...s.input, width: "100%" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>COGS / pcs (Rp)</label>
                      <input type="number" value={consCogs} onChange={e => setConsCogs(e.target.value)} placeholder="0" style={{ ...s.input, width: "100%" }} />
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Diskon (Rp)</label>
                      <input type="number" value={consDiskon} onChange={e => setConsDiskon(e.target.value)} placeholder="0" style={{ ...s.input, width: "100%" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Shipping (Rp)</label>
                      <input type="number" value={consShipping} onChange={e => setConsShipping(e.target.value)} placeholder="0" style={{ ...s.input, width: "100%" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 3 }}>Fee Consignment (%)</label>
                      <input type="number" value={consFee} onChange={e => setConsFee(e.target.value)} placeholder="22.5" style={{ ...s.input, width: "100%" }} />
                    </div>
                  </div>
                  {consHarga && consQty && (
                    <div style={{ background: COLORS.brown, borderRadius: 6, padding: "8px 12px", marginBottom: 10, fontSize: 11 }}>
                      {(() => {
                        const gross = (parseRp(consHarga)||0) * (parseInt(consQty)||1) - (parseRp(consDiskon)||0) + (parseRp(consShipping)||0);
                        const fee = Math.round((parseRp(consHarga)||0) * (parseInt(consQty)||1) * (parseFloat(consFee)||22.5) / 100);
                        const net = gross - fee;
                        return <>
                          Gross: <span style={{ color: COLORS.cream }}>Rp {gross.toLocaleString("id-ID")}</span>
                          {" · "}Fee {consFee}%: <span style={{ color: COLORS.danger }}>-Rp {fee.toLocaleString("id-ID")}</span>
                          {" · "}Net: <span style={{ color: COLORS.success, fontWeight: 700 }}>Rp {net.toLocaleString("id-ID")}</span>
                        </>;
                      })()}
                    </div>
                  )}
                  <button onClick={addConsignmentSettlement} style={{ ...s.btn("primary"), width: "100%", padding: "11px 0", fontWeight: 700 }}>+ Simpan Consignment</button>
                </div>
              )}

              {/* LAINNYA FORM (B2B manual / other) */}
              {incSubType === "other" && (
                <div style={{ background: COLORS.brownDark, borderRadius: 12, padding: 16, marginBottom: 16, border: `1px solid ${COLORS.brownLight}` }}>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 4, fontSize: 14 }}>💵 Pemasukan Lainnya</h3>
                  <p style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 12 }}>Untuk B2B payment, refund masuk, atau pemasukan lain yang tidak ada di kategori lain.</p>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <div><label style={{ fontSize: 11, color: COLORS.textMuted, display: "block", marginBottom: 4 }}>Tanggal</label>

                </div>
              </div>
            </div>
          )}
        </div>
      );
    },
  };

  const currentPage = pages[page];
  const pageTitles = {
    dashboard: "Dashboard", scan: "Quick Scan ⚡", stok: "Cek Stok", masuk: "Barang Masuk", keluar: "Barang Terjual",
    marketing: "KOL & Pinjam 📱", rusak: "Rusak / Hilang", pinjam: "Peminjaman", laporan: "Laporan",
    label: "Cetak Label Barcode", data: "Import Data", ai: "Tanya AI ✦", settings: "Pengaturan ⚙",
    kasir: "Kasir 🛒", keuangan: "Keuangan 💰"
  };

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${COLORS.brownLight}; border-radius: 4px; }
        @page { size: A4; margin: 8mm; }
        @media (max-width: 768px) {
          .plai-sidebar { display: none !important; }
          .plai-main { width: 100% !important; }
        }
      `}</style>
      <div style={s.app}>
        {/* Sidebar */}
        <div className="plai-sidebar" style={s.sidebar}>
          <div style={s.logo}>
            <div style={{ width: 32, height: 32, background: COLORS.aqua, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontWeight: 800, color: COLORS.brownDark, fontSize: 14 }}>P</div>
            {sidebarOpen && <div><div style={s.logoText}>Plai</div><div style={s.logoSub}>Inventory System</div></div>}
          </div>
          <div style={s.nav}>
            {navItems.map(item => (
              <div key={item.id} style={s.navItem(page === item.id)} onClick={() => setPage(item.id)}>
                <span style={{ fontSize: 16, flexShrink: 0 }}>{item.icon}</span>
                {sidebarOpen && <span>{item.label}</span>}
                {sidebarOpen && item.id === "stok" && lowStock.length > 0 && <span style={{ ...s.badge(COLORS.warning), marginLeft: "auto" }}>{lowStock.length}</span>}
                {sidebarOpen && item.id === "settings" && <span style={{ width: 8, height: 8, borderRadius: "50%", background: sbConnected ? COLORS.success : COLORS.danger, marginLeft: "auto", flexShrink: 0 }} />}
              </div>
            ))}
          </div>
          <div style={s.toggleBtn} onClick={() => setSidebarOpen(!sidebarOpen)}>
            {sidebarOpen ? "◀" : "▶"}
          </div>
        </div>

        {/* Main */}
        <div className="plai-main" style={s.main}>
          <div style={s.header}>
            <div>
              <div style={s.headerTitle}>{pageTitles[page]}</div>
              {page === "kasir" && <div style={{ fontSize: 12, color: COLORS.warning, marginTop: 2, fontWeight: 600 }}>Khusus Event / Bazaar</div>}
              <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{new Date().toLocaleDateString("id-ID", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</div>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              {lowStock.length > 0 && <span style={s.badge(COLORS.warning)}>⚠ {lowStock.length} stok rendah</span>}
              {outOfStock.length > 0 && <span style={s.badge(COLORS.danger)}>● {outOfStock.length} habis</span>}
            </div>
          </div>
          <div style={s.content}>
            {!sbConnected && (
              <div style={{ background: "#7f1d1d", border: "1px solid #dc2626", borderRadius: 10, padding: "12px 16px", marginBottom: 12, color: "#fca5a5", fontSize: 13, fontWeight: 600 }}>
                ⚠ Tidak terhubung ke database. Data tidak akan tersimpan. Hubungkan Supabase di tab Pengaturan.
              </div>
            )}
            {currentPage ? currentPage() : null}
          </div>
        </div>

        {/* Mobile Bottom Nav — only shown on small screens */}
        <div style={{ display: "none", position: "fixed", bottom: 0, left: 0, right: 0, background: COLORS.brown, borderTop: `1px solid ${COLORS.brownLight}`, zIndex: 9000, padding: "6px 0 env(safe-area-inset-bottom, 6px) 0" }}
          className="mobile-nav">
          {[
            { id: "scan", icon: "⚡", label: "Scan" },
            { id: "stok", icon: "◫", label: "Stok" },
            { id: "keluar", icon: "🛍", label: "Terjual" },
            { id: "masuk", icon: "↓", label: "Masuk" },
            { id: "laporan", icon: "≡", label: "Laporan" },
            { id: "kasir", icon: "🛒", label: "Kasir" },
            { id: "keuangan", icon: "💰", label: "Keuangan" },
            { id: "settings", icon: "⚙", label: "Lainnya" },
          ].map(item => (
            <div key={item.id} onClick={() => setPage(item.id)}
              style={{ flex: 1, textAlign: "center", padding: "6px 0", cursor: "pointer", color: page === item.id ? COLORS.aqua : COLORS.textMuted, fontSize: 10, fontWeight: page === item.id ? 700 : 400, transition: "color 0.15s" }}>
              <div style={{ fontSize: 18, marginBottom: 2 }}>{item.icon}</div>
              <div>{item.label}</div>
            </div>
          ))}
        </div>
        <style>{`@media (max-width: 768px) { .mobile-nav { display: flex !important; } }`}</style>

        {/* Toast */}
        {toast && (
          <div style={{ position: "fixed", bottom: 24, right: 24, background: toast.type === "danger" ? COLORS.danger : toast.type === "warning" ? COLORS.warning : COLORS.success, color: COLORS.brownDark, padding: "12px 20px", borderRadius: 10, fontWeight: 600, fontSize: 13, boxShadow: "0 4px 20px rgba(0,0,0,0.3)", zIndex: 9999 }}>
            {toast.msg}
          </div>
        )}

        {/* ── Print Preview Overlay ── */}
        {printItems && (
          <div style={{ position: "fixed", inset: 0, background: "#f5f5f5", zIndex: 10000, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Toolbar — disembunyikan saat print */}
            <div className="no-print" style={{ background: COLORS.brown, padding: "14px 24px", display: "flex", gap: 12, alignItems: "center", borderBottom: `1px solid ${COLORS.brownLight}`, flexShrink: 0 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: COLORS.cream, fontSize: 15 }}>🏷️ {printItems.length} Label Siap Print</div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>Klik <strong style={{ color: COLORS.aqua }}>Print / Save PDF</strong> → di dialog printer pilih <strong style={{ color: COLORS.aqua }}>"Save as PDF"</strong></div>
              </div>
              <button
                onClick={() => {
                  const rows = printItems.map(item => `
                    <div class="label">
                      <div class="brand">PLAI SPORTS</div>
                      <div class="name">${item.nama}</div>
                      <img src="${item.barcodeUrl}" style="width:100%;height:48px;object-fit:contain;display:block;" />
                      <div class="sku">${item.sku}</div>
                      ${labelShowPrice ? `<div class="price">Rp ${item.harga.toLocaleString("id-ID")}</div>` : ""}
                    </div>`).join("");
                  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
                    <title>Label Plai Sports</title>
                    <style>
                      *{box-sizing:border-box;margin:0;padding:0;}
                      body{font-family:Arial,sans-serif;background:#fff;}
                      .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px;}
                      .label{border:0.5px solid #ccc;border-radius:4px;padding:7px 5px 5px;text-align:center;page-break-inside:avoid;break-inside:avoid;}
                      .brand{font-size:7px;letter-spacing:2px;color:#aaa;text-transform:uppercase;margin-bottom:2px;}
                      .name{font-size:8.5px;font-weight:bold;line-height:1.25;min-height:20px;margin-bottom:4px;word-break:break-word;}
                      .sku{font-size:7.5px;color:#555;font-family:monospace;margin-top:2px;}
                      .price{font-size:10px;font-weight:bold;color:#2a1d14;margin-top:3px;}
                      @page{size:A4;margin:8mm;}
                    </style>
                  </head><body>
                    <div class="grid">${rows}</div>
                    <script>window.onload=function(){window.print()}<\/script>
                  </body></html>`;
                  const blob = new Blob([html], { type: "text/html" });
                  window.open(URL.createObjectURL(blob), "_blank");
                }}
                style={{ background: COLORS.aqua, color: COLORS.brownDark, border: "none", borderRadius: 8, padding: "10px 22px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
              >🖨️ Print / Save PDF</button>
              <button
                onClick={() => setPrintItems(null)}
                style={{ background: COLORS.brownLight, color: COLORS.cream, border: "none", borderRadius: 8, padding: "10px 16px", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
              >✕ Tutup</button>
            </div>

            {/* Label grid — ini yang terprint */}
            <div style={{ flex: 1, overflow: "auto", padding: 16 }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, maxWidth: 900, margin: "0 auto" }}>
                {printItems.map(item => (
                  <div key={item.sku} style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 6, padding: "8px 6px 6px", textAlign: "center" }}>
                    <div style={{ fontSize: 7, letterSpacing: 2, color: "#aaa", textTransform: "uppercase", marginBottom: 2 }}>PLAI SPORTS</div>
                    <div style={{ fontSize: 8.5, fontWeight: "bold", lineHeight: 1.25, minHeight: 20, marginBottom: 4, wordBreak: "break-word" }}>{item.nama}</div>
                    <img src={item.barcodeUrl} style={{ width: "100%", height: 50, objectFit: "contain", display: "block" }} alt={item.sku} />
                    <div style={{ fontSize: 7.5, color: "#555", fontFamily: "monospace", marginTop: 2 }}>{item.sku}</div>
                    {labelShowPrice && <div style={{ fontSize: 10, fontWeight: "bold", color: "#2a1d14", marginTop: 3 }}>Rp {item.harga.toLocaleString("id-ID")}</div>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Barcode Registration Modal */}
        {/* Barcode Registration Modal (single or bulk) */}
        {(barcodeRegister || bulkRegisterMode) && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
            <div style={{ background: COLORS.brown, borderRadius: 16, padding: 20, width: "100%", maxWidth: 440, maxHeight: "90vh", overflow: "auto" }}>

              {/* Bulk mode header with counter */}
              {bulkRegisterMode && (
                <div style={{ background: COLORS.aqua+"15", border: `1px solid ${COLORS.aquaDark}`, borderRadius: 10, padding: 12, marginBottom: 14, textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: COLORS.aqua, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>MODE BULK REGISTER</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.cream }}>{bulkRegisterLog.length}</div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>barcode terdaftar sesi ini</div>
                  {bulkRegisterLog.length > 0 && (
                    <div style={{ maxHeight: 80, overflowY: "auto", marginTop: 8, textAlign: "left" }}>
                      {bulkRegisterLog.slice(-5).map((log, i) => (
                        <div key={i} style={{ fontSize: 10, color: COLORS.success, fontFamily: "monospace", padding: "1px 0" }}>✓ {log.barcode} → {log.nama}</div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {barcodeRegister ? (
                <>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 4, fontSize: 16 }}>
                    {bulkRegisterMode ? "📷 Scan Terdeteksi" : "Daftarkan Barcode Baru"}
                  </h3>
                  <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 16 }}>
                    Barcode <span style={{ fontFamily: "monospace", color: COLORS.cream, fontWeight: 700 }}>{barcodeRegister.code}</span> belum terdaftar. Pilih item:
                  </p>
                  <input
                    style={{ ...s.input, marginBottom: 12 }}
                    placeholder="Cari item..."
                    value={barcodeRegister.search || ""}
                    onChange={e => setBarcodeRegister(prev => ({ ...prev, search: e.target.value }))}
                    autoFocus
                  />
                  <div style={{ maxHeight: 280, overflowY: "auto", borderRadius: 8, border: `1px solid ${COLORS.brownLight}` }}>
                    {inventory.filter(i => {
                      if (i.discontinued) return false;
                      if (!barcodeRegister.search) return true;
                      const q = barcodeRegister.search.toLowerCase();
                      return i.sku.toLowerCase().includes(q) || i.nama.toLowerCase().includes(q);
                    }).slice(0, 50).map(item => (
                      <div key={item.sku}
                        style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${COLORS.brownLight}30`, display: "flex", justifyContent: "space-between", alignItems: "center" }}
                        onClick={() => {
                          setBarcodeMap(prev => ({ ...prev, [barcodeRegister.code]: item.sku }));
                          showToast(`✓ ${barcodeRegister.code} → ${item.nama}`);
                          if (bulkRegisterMode) {
                            setBulkRegisterLog(prev => [...prev, { barcode: barcodeRegister.code, nama: item.nama }]);
                            setBarcodeRegister(null);
                            // Auto reopen camera for next scan
                            setTimeout(() => { setCameraTarget("bulkregister"); setCameraOpen(true); }, 300);
                          } else {
                            setBarcodeRegister(null);
                          }
                        }}>
                        <div>
                          <div style={{ color: COLORS.cream, fontWeight: 600, fontSize: 13 }}>{item.nama}</div>
                          <div style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "monospace" }}>{item.sku}</div>
                        </div>
                        <div style={{ color: getStokColor(item), fontWeight: 700, fontSize: 14 }}>{item.stok}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                    <button onClick={() => {
                      setBarcodeRegister(null);
                      if (bulkRegisterMode) {
                        // Skip this barcode, reopen camera
                        setTimeout(() => { setCameraTarget("bulkregister"); setCameraOpen(true); }, 300);
                      }
                    }} style={{ ...s.btn("secondary"), flex: 1 }}>
                      {bulkRegisterMode ? "Skip →" : "Batal"}
                    </button>
                    {bulkRegisterMode && (
                      <button onClick={() => { setBarcodeRegister(null); setBulkRegisterMode(false); setBulkRegisterLog([]); }}
                        style={{ ...s.btn("primary"), flex: 1 }}>
                        Selesai ({bulkRegisterLog.length} terdaftar)
                      </button>
                    )}
                  </div>
                </>
              ) : bulkRegisterMode ? (
                <>
                  <h3 style={{ color: COLORS.aqua, marginBottom: 8, fontSize: 16 }}>📷 Bulk Register Barcode</h3>
                  <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 16 }}>Scan barcode satu per satu. Setelah scan, pilih item, lalu kamera otomatis buka lagi untuk scan berikutnya.</p>
                  <button onClick={() => { setCameraTarget("bulkregister"); setCameraOpen(true); }}
                    style={{ ...s.btn("primary"), width: "100%", padding: "14px 0", fontSize: 15, marginBottom: 10 }}>
                    📸 Mulai Scan
                  </button>
                  <button onClick={() => { setBulkRegisterMode(false); setBulkRegisterLog([]); }}
                    style={{ ...s.btn("secondary"), width: "100%" }}>
                    Selesai ({bulkRegisterLog.length} terdaftar)
                  </button>
                </>
              ) : null}
            </div>
          </div>
        )}

        {/* Camera Barcode Scanner Overlay */}
        {cameraOpen && (
          <CameraScanner
            onScan={(code) => {
              setCameraOpen(false);
              setTimeout(() => {
                document.querySelectorAll("video").forEach(v => {
                  if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
                });
              }, 100);
              if (cameraTarget === "bulkregister") {
                // Bulk register mode: always go to registration
                const existing = findByBarcode(code);
                if (existing) {
                  showToast(`✓ "${code}" sudah terdaftar → ${existing.nama}`);
                  setBulkRegisterLog(prev => [...prev, { barcode: code, nama: existing.nama + " (sudah ada)" }]);
                  setTimeout(() => { setCameraTarget("bulkregister"); setCameraOpen(true); }, 500);
                } else {
                  setBarcodeRegister({ code: code.trim() });
                }
                return;
              }
              const found = findByBarcode(code);
              if (found) {
                showToast(`📷 ${found.nama}`);
                if (cameraTarget === "quickscan") {
                  setScanResult(found);
                  setScanJumlah(1);
                  setTimeout(() => scanJumlahRef.current?.focus(), 100);
                } else if (cameraTarget === "kasir") {
                  addToCart(found.sku);
                } else if (cameraTarget === "stok") {
                  setStokHighlighted(found.sku);
                  setStokSearch(found.nama);
                  setTimeout(() => setStokHighlighted(""), 3000);
                } else if (cameraTarget === "form") {
                  // Trigger form scan via global ref
                  if (window.__plaiFormScanCallback) window.__plaiFormScanCallback(found.sku);
                }
              } else {
                // Unknown barcode — offer registration
                if (/^\d{6,}$/.test(code.trim())) {
                  setBarcodeRegister({ code: code.trim() });
                  showToast(`Barcode "${code}" belum terdaftar`, "warning");
                } else {
                  showToast(`"${code}" tidak ditemukan`, "danger");
                }
              }
            }}
            onClose={() => {
              setCameraOpen(false);
              // Extra safety: kill any lingering camera streams
              setTimeout(() => {
                document.querySelectorAll("video").forEach(v => {
                  if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
                });
              }, 100);
            }}
          />
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PlaiInventory));

  </script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
